# firm_context.template.yaml — Copy this to firm_context.yaml and fill in your firm's details.
#
# schema_version: do not change this number. It lets setup.py --check warn you
# when a newer version of the template has fields your file doesn't have yet.
schema_version: 2
# ─────────────────────────────────────────────────────────────────────────────
# This file controls every place the pipeline refers to a person, firm, or
# investment focus. No Python script should need to be edited for a new firm.
#
# HOW TO USE:
#   cp firm_context.template.yaml firm_context.yaml
#   # Edit firm_context.yaml with your firm's details
#   # Run: pip install pyyaml  (required to parse YAML at runtime)
#
# Fields marked [REQUIRED] must be filled in before running any pipeline.
# Fields marked [OPTIONAL] fall back to sensible defaults if omitted.
# ─────────────────────────────────────────────────────────────────────────────

# ── WHO YOU ARE ───────────────────────────────────────────────────────────────

principal:
  name: "YOUR NAME HERE"                             # [REQUIRED] e.g. "Jane Smith"
  email: "you@yourfirm.com"                          # [REQUIRED] principal's primary email
  role: "YOUR ROLE HERE"                             # [REQUIRED] e.g. "managing director, infrastructure PE"
  background: "YOUR BACKGROUND"                      # [OPTIONAL] e.g. "~12 years, $5B+ deployed"
  prior_firm: "YOUR PRIOR FIRM"                      # [OPTIONAL] used in speaker-ID heuristics
  investor_frame: "principal investor"               # [OPTIONAL] "principal investor" | "analyst" | "LP"
  job_search_active: false                           # [OPTIONAL] true → pipeline flags recruiter calls as high-priority
  investment_focus:                                  # [REQUIRED] list in priority order
    - "SECTOR 1 (e.g. power & utilities — ERCOT/PJM/MISO)"
    - "SECTOR 2 (e.g. digital infrastructure — data centers, fiber)"
    - "SECTOR 3 (e.g. midstream / LNG)"
    - "SECTOR 4 (e.g. energy transition)"

# ── YOUR FIRM ─────────────────────────────────────────────────────────────────

firm:
  name: "YOUR FIRM FULL NAME"                        # [REQUIRED] e.g. "Meridian Infrastructure Partners"
  short_name: "MIP"                                  # [OPTIONAL] abbreviation used in prompts and owner whitelist

# ── YOUR TEAM ─────────────────────────────────────────────────────────────────
# The first non-principal member with "deal" in their role is treated as the
# deal lead for speaker-attribution rules on internal calls.
# Add or remove members as needed.

team:
  - name: "CO-FOUNDER OR DEAL LEAD NAME"
    role: "co-founder, deal lead"                    # [REQUIRED for deal attribution]
    background: "ex-[Prior Firm]"                    # [OPTIONAL] e.g. "ex-KKR Infrastructure"
    internal_call_role: >
      drives the agenda — deal-status updates, bidding strategy, pipeline reviews
  - name: "SECOND TEAM MEMBER"
    role: "fundraising / LP lead"                    # [OPTIONAL] used in owner attribution
    background: ""
    internal_call_role: ""

# ── OWNER WHITELIST ───────────────────────────────────────────────────────────
# Exact strings accepted in the owner field of extracted action items.
# Use first names or short forms — keep consistent with how speakers identify themselves.
# "external" is always valid and need not be listed here.

owner_whitelist:
  - "YOUR_FIRST_NAME"                                # principal first name
  - "DEAL_LEAD_SHORT_NAME"                           # deal lead first name or short form
  - "THIRD_TEAM_MEMBER"                              # add/remove as needed

# ── WORKSTREAM CATEGORIES ─────────────────────────────────────────────────────
# Labels used in the category and workstream fields of extracted JSON.
# Must match what you call things internally — if your ops team says "Portfolio"
# not "Deal" for active investments, change deal: to "Portfolio".

workstream_categories:
  deal: "YOUR FIRM DEALS"                            # e.g. "Meridian" or "Portfolio" or "Firm Deals"
  recruiting: "Recruiting"                           # keep as "Recruiting" unless your firm uses different terminology
  other: "Other"

# ── KEY PEOPLE TO FLAG ────────────────────────────────────────────────────────
# Any call mentioning these people triggers a flagged action item in the output.

key_people:
  - name: "DEAL LEAD NAME"
    context: "Firm co-founder, deal lead"
    flag_in_actions: true
  - name: "KEY EXTERNAL CONTACT 1"
    context: "Brief description — e.g. LP relationship, government contact, strategic partner"
    flag_in_actions: true
  # Add more as needed

# ── COUNTERPARTY ALIASES ──────────────────────────────────────────────────────
# Maps raw counterparty strings to canonical display names for dashboard clustering.
# Include both company names AND the key individual's name for each deal —
# so any mention of the person (in an email or transcript) routes to the right cluster.
# First match wins — list more specific needles before broad ones.

counterparty_aliases:
  - needles: ["deal company name", "deal nickname", "deal abbreviation", "lead contact full name"]
    canonical: "Deal Display Name"
  - needles: ["second deal name", "second deal abbreviation", "second deal contact name"]
    canonical: "Second Deal Display Name"
  # Add one entry per active deal / LP / key counterparty

# ── PEER / CO-INVESTOR FIRMS ──────────────────────────────────────────────────
# Mentions of these firms in call transcripts trigger competitive intel flags.

peer_firms:
  - "Peer Firm 1"
  - "Peer Firm 2"
  - "Peer Firm 3"
  - "Peer Firm 4"
  # Add competitors / co-investors relevant to your strategy

# ── DRAFT VOICE ───────────────────────────────────────────────────────────────
# Used by cos_capture_pipeline.py when it auto-drafts email replies on your behalf.
# These rules shape tone, sign-off, and what to never include. All optional —
# sensible defaults are applied if omitted.

draft_voice:
  tone: "professional, concise, warm but not flowery"
  preferred_signoff: "Best,\n[principal_first_name]"
  default_greeting: "Hi [first_name],"   # [first_name] auto-resolves to recipient
  brevity: "2-4 sentences for routine replies; up to 8 for substantive responses"
  always_include:
    - "If sender asked a specific question, answer it directly in the first sentence"
    - "If declining or pushing out a meeting, propose at least one alternative"
  never_include:
    - "Apologies for late reply (just respond)"
    - "Hope you're well / hope your week is going great (skip pleasantries)"
    - "Looking forward to hearing from you (assume they will)"
    - "Promises about specific deal terms without explicit principal sign-off"
    - "Speculation about firm strategy not already public"
  attach_resume_to:
    # Email patterns where the script should attach the latest resume from Drive
    - "recruiting@*"
    - "talent@*"
  context_to_include_in_replies:
    # Up to 3 short sentences of context Claude leans on when drafting.
    # Useful for: how you sign off, recurring caveats, things to reference.
    - "If discussing fund formation, note that Fund I is in early stage."
    - "Never commit to specific deal terms over email without a follow-up call."

# ── ANALYTICAL DEFAULTS ────────────────────────────────────────────────────────
# Controls the memo format and analytical framing for call transcripts.
# All fields are OPTIONAL — omit the entire block to use the shipped defaults.
#
# HOW UPDATES WORK:
#   The defaults live in _firm_context.py on GitHub. When an improvement is pushed
#   (e.g. better section guidance, a new default section), you get it on:
#       git fetch upstream && git merge upstream/main
#   Your overrides here are in a gitignored file — they are NEVER touched by a merge.
#   To accept a new default: delete the matching key here and git pull.
#   To keep your version: leave the key here; it takes precedence over any upstream change.
#
# EXAMPLE — law firm that wants different memo sections:
#   prompt_overrides:
#     memo_sections:
#       - "MATTER OVERVIEW"
#       - "KEY LEGAL ISSUES"
#       - "OPEN QUESTIONS"
#       - "RECOMMENDED NEXT STEPS"
#     section_guidance:
#       "MATTER OVERVIEW": "One paragraph. Lead with the legal risk and business impact."
#       "KEY LEGAL ISSUES": "Bullet each issue. Cite statute or precedent where known."
#       "OPEN QUESTIONS": "Facts still needed before advising. Verb-first."
#       "RECOMMENDED NEXT STEPS": "Specific actions. Named owner and deadline."
#     memo_focus_supplement: "Flag any mention of regulatory deadlines or court dates."

prompt_overrides:
  # memo_sections: leave commented to use defaults (the six-section investor framework)
  # Uncomment and edit to override:
  # memo_sections:
  #   - "THE CORE ARGUMENT"
  #   - "POINTS OF CONSENSUS"
  #   - "POINTS OF DISAGREEMENT OR TENSION"
  #   - "OPEN QUESTIONS AND UNRESOLVED ISSUES"
  #   - "WHAT YOU WOULD NEED TO FORM A VIEW"
  #   - "KEY NAMES AND FIRMS"

  # section_guidance: leave commented to use defaults
  # Uncomment specific sections you want to customize (others keep their defaults):
  # section_guidance:
  #   "THE CORE ARGUMENT": "Your custom guidance here."

  # memo_focus_supplement: optional extra instruction appended to every memo prompt.
  # Useful for firm-specific watch items that apply to all calls.
  # memo_focus_supplement: "Always flag any mention of FERC Order 1920 or DOE loan guarantees."
  memo_focus_supplement: ""

# ── TRANSCRIPT SOURCES ─────────────────────────────────────────────────────────
# Tells the pipeline WHERE to look for call transcripts.
#
# ┌─────────────────────────────────────────────────────────────────────────┐
# │ IMPORTANT: The pipeline ONLY reads the specific folders listed here.    │
# │ Every other file in your Google Drive is completely untouched.          │
# │ Saving a transcript anywhere else = it will not be picked up.           │
# └─────────────────────────────────────────────────────────────────────────┘
#
# HOW TO SAVE TRANSCRIPTS SO THEY GET CAPTURED:
#   Otter AI   → Zapier: New Otter recording → Upload to your folder_id below
#   Beside AI  → Beside settings → Drive sync → point at your folder_id
#   Fireflies  → Fireflies integrations → Drive → select your folder
#   Grain      → Grain workspace settings → Drive export → your folder
#   Read AI    → Read AI settings → Drive integration → your folder
#   Manual     → Paste transcript text into a .txt file, save to any folder_id below
#   Desktop    → Use local_folder source pointing at ~/recordings
#
# SUPPORTED FILE FORMATS: .txt  .vtt  .srt  .md  .rtf  Google Docs
# IGNORED AUTOMATICALLY:  .m4a  .mp3  .wav  .pdf  .xlsx  .png  (audio/binary)
#
# HOW TO FIND A FOLDER ID:
#   Open the folder in Google Drive → copy the last part of the URL:
#   drive.google.com/drive/folders/THIS_IS_THE_FOLDER_ID
#
# See docs/WHAT_GETS_CAPTURED.md for the full reference.
#
# Supported source types:
#   "google_drive_folder" — any service syncing to Drive (Otter, Beside, Fireflies…)
#   "local_folder"        — a directory on this machine (desktop recorder, manual)

transcript_sources:
  - type: "google_drive_folder"
    name: "Otter AI"                          # label shown in logs and memo headers
    folder_ids:
      - "YOUR_OTTER_ROOT_FOLDER_ID"           # ← save/sync Otter recordings here
      - "YOUR_OTTER_DEAL_FOLDER_ID"           # deal/investment calls subfolder (optional)
      - "YOUR_OTTER_RECRUITING_FOLDER_ID"     # recruiting calls subfolder (optional)
      - "YOUR_OTTER_OTHER_FOLDER_ID"          # other calls subfolder (optional)
    root_folder_id: "YOUR_OTTER_ROOT_FOLDER_ID"  # processed files get moved out of here
    category_hint: "auto"                     # auto-detect; or set "Recruiting"/"Deal"/"Other"
    # Optional: per-subfolder category hints (override the source-level category_hint).
    # Useful when subfolders are already sorted by category — saves the LLM from
    # re-detecting what's already known. Omit for single-folder sources.
    folder_hints:
      "YOUR_OTTER_DEAL_FOLDER_ID":       "Deal"         # or your workstream_categories.deal value
      "YOUR_OTTER_RECRUITING_FOLDER_ID": "Recruiting"
      "YOUR_OTTER_OTHER_FOLDER_ID":      "Other"
    # Optional: after processing a root-folder file, move it to the right subfolder.
    # Omit to keep all files in root after processing.
    category_folders:
      "Deal":       "YOUR_OTTER_DEAL_FOLDER_ID"
      "Recruiting": "YOUR_OTTER_RECRUITING_FOLDER_ID"
      "Other":      "YOUR_OTTER_OTHER_FOLDER_ID"

  # ── Add more sources — one block per recording service ──────────────────────
  #
  # Beside AI example:
  # - type: "google_drive_folder"
  #   name: "Beside AI"
  #   folder_ids:
  #     - "YOUR_BESIDE_AI_FOLDER_ID"          # ← configure Beside Drive sync to this folder
  #   category_hint: "auto"
  #
  # Fireflies / Grain / Read AI / Fathom — same pattern as Beside AI above.
  # Each service has a Drive integration setting where you paste the folder ID.
  #
  # Desktop recorder (call_recorder.py) or manual transcript files:
  # - type: "local_folder"
  #   name: "Desktop Recorder"
  #   path: "~/recordings"                    # ← save .txt transcript files here
  #   category_hint: "auto"

# ── PERSONAL CONTENT & BRIEFING ───────────────────────────────────────────────
# Per-person configuration. Each team member sets this in their own copy of
# firm_context.yaml (on their machine). Changes here do not need to be pushed
# to the shared config repo — keep them local or push if the whole team shares
# the same interests.
#
# podcast_feeds here ADDS TO (not replaces) any feeds in firm_config.json.
# To override firm-level feeds entirely, set firm_config.json podcast_feeds to {}.

personal:
  content_feeds:
    podcasts:
      # Add RSS feeds you want transcribed and summarized daily
      # - name: "Catalyst"
      #   rss: "https://feeds.megaphone.fm/your-feed-url"
      #   drive_doc_id: "GOOGLE_DOC_ID_FOR_SUMMARIES"  # optional — uses default if omitted
      # - name: "Your Favorite Show"
      #   rss: "https://example.com/feed.rss"
    blogs:
      # Add RSS/Atom feeds for blogs, newsletters, research sites
      # Entries are fetched daily and appended to your briefing
      # - name: "RBN Energy Daily"
      #   url: "https://rbnenergy.com/feed"
      #   type: "rss"
      # - name: "Substack Newsletter"
      #   url: "https://newsletter.substack.com/feed"
      #   type: "rss"

  daily_briefing:
    enabled: true
    delivery_email: ""          # defaults to principal email if blank
    delivery_time: "07:30"      # local time HH:MM
    include_sections:
      - "podcasts"              # new podcast episodes transcribed overnight
      - "calls_today"           # calls scheduled today (from calendar)
      - "market_updates"        # blog/RSS items from content_feeds.blogs
      - "cost_summary"          # weekly API spend (Fridays only)
