<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>{{STR:topnav.brand}} — Deal Pipeline</title>
<style>
/* Per-route tweaks only. Tokens, fonts, topnav, body bg come from design-system.css. */
*{box-sizing:border-box;}
body{color:var(--ink);font-size:14px;}
.page-wrap{padding:0;}
/* ── Two-column pipeline grid ── */
.deal-grid{display:grid;grid-template-columns:46fr 54fr;gap:20px;align-items:start;}
.deal-col{min-width:0;}
@media(max-width:1100px){.deal-grid{grid-template-columns:1fr;}}
.deal-panel-hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;padding-bottom:9px;border-bottom:1px solid var(--rule);}
.deal-panel-hdr>span:first-child{font-family:var(--font-data);font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:0.16em;color:var(--ink);}
.deal-panel-count{font-family:var(--font-data);font-size:10px;font-weight:500;color:var(--ink-faint);background:var(--bg);padding:2px 8px;border-radius:10px;}

/* ── Header ── */
.header{display:flex;justify-content:space-between;align-items:flex-start;margin:8px 0 20px;padding-bottom:18px;border-bottom:1px solid var(--rule);}
.header-left{display:flex;align-items:flex-start;gap:14px;}
.tc-monogram{width:42px;height:42px;border-radius:6px;background:var(--navy);border:1px solid var(--gold-border);display:flex;align-items:center;justify-content:center;font-family:var(--font-display);font-size:14px;font-weight:700;color:var(--gold);letter-spacing:-0.5px;flex-shrink:0;}
.header-title h1{font-family:var(--font-display);font-size:22px;font-weight:700;color:var(--ink);letter-spacing:-0.6px;}
.header-title .sub{font-family:var(--font-body);font-size:12px;color:var(--ink-mid);margin-top:5px;font-weight:400;}
.header-right{display:flex;align-items:center;gap:8px;flex-wrap:wrap;justify-content:flex-end;}
.week-badge{font-family:var(--font-data);font-size:10px;padding:5px 12px;border-radius:999px;border:1px solid var(--gold-border);background:var(--gold-light);color:var(--gold);font-weight:700;text-transform:uppercase;letter-spacing:0.12em;}
.refresh-btn{background:transparent;border:1px solid var(--rule);color:var(--ink-mid);font-family:var(--font-data);font-size:11px;text-transform:uppercase;letter-spacing:0.12em;font-weight:700;padding:6px 12px;border-radius:var(--radius-sm);cursor:pointer;display:flex;align-items:center;gap:6px;transition:all 0.15s;}
.refresh-btn:hover{border-color:var(--gold);color:var(--gold);}
.refresh-btn.spinning svg{animation:spin 0.6s linear infinite;}
@keyframes spin{to{transform:rotate(360deg);}}

/* ── Stat cards (mapped to .tc-stat-tile) ── */
.stats-bar{display:grid;grid-template-columns:repeat(5,1fr);gap:14px;margin-bottom:20px;}
.stat-card.is-dimmed{opacity:0.45;filter:grayscale(0.3);}

/* ── Tabs ── */
.tab-bar{display:flex;gap:0;margin-bottom:20px;border-bottom:1px solid var(--rule);}
.tab-btn{background:transparent;border:none;border-bottom:2px solid transparent;color:var(--ink-mid);font-family:var(--font-body);font-size:13px;font-weight:500;padding:10px 22px;cursor:pointer;margin-bottom:-1px;transition:all 0.15s;}
.tab-btn:hover{color:var(--ink);}
.tab-btn.active{color:var(--ink);border-bottom-color:var(--gold);font-weight:600;}

/* ── Filter rows ── */
.filter-row{display:flex;gap:6px;margin-bottom:8px;flex-wrap:wrap;align-items:center;}
.filter-label{font-family:var(--font-data);font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:0.16em;color:var(--ink-faint);min-width:54px;}

/* legacy .card wrapper kept as alias to .tc-card */
.card{background:var(--paper);border:1px solid var(--rule);border-radius:var(--radius-md);padding:18px 20px;box-shadow:var(--shadow-card);}
.card:hover{border-color:var(--ink-ghost);box-shadow:var(--shadow-lift);}
.card-section-label{font-family:var(--font-data);font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:0.18em;color:var(--ink-faint);margin-bottom:10px;}

/* ── Score colors ── */
.sc-green{color:var(--green);}
.sc-amber{color:var(--amber);}
.sc-red{color:var(--red);}

/* ── Status badges (legacy class names; restyled to tokens) ── */
.status-badge{font-family:var(--font-data);font-size:9px;font-weight:700;padding:2px 8px;border-radius:999px;border:1px solid var(--rule);letter-spacing:0.12em;text-transform:uppercase;}
.sb-active{background:var(--green-bg);color:var(--green);border-color:var(--green-bd);}
.sb-reviewing{background:var(--amber-bg);color:var(--amber);border-color:var(--amber-bd);}
.sb-watching{background:var(--slate-bg);color:var(--slate);border-color:var(--slate-bd);}
.sb-new{background:var(--navy-light);color:var(--navy);border-color:var(--navy-border);}
.sb-passed{background:var(--slate-bg);color:var(--slate);border-color:var(--slate-bd);}
.sb-killed{background:var(--red-bg);color:var(--red);border-color:var(--red-bd);}

/* ── Deal status badges (Executable / Potential / Thematic Watch) ── */
.ds-badge{font-family:var(--font-data);font-size:8px;font-weight:700;padding:2px 7px;border-radius:999px;border:1px solid;letter-spacing:0.12em;text-transform:uppercase;}
.ds-executable{background:var(--green-bg);color:var(--green);border-color:var(--green-bd);}
.ds-potential{background:var(--navy-light);color:var(--navy);border-color:var(--navy-border);}
.ds-thematic{background:var(--slate-bg);color:var(--slate);border-color:var(--slate-bd);}

/* ── Investor angle ── */
.inv-angle{font-family:var(--font-body);font-size:11px;font-style:italic;line-height:1.45;margin-top:2px;}

/* ── Direction badges ── */
.dir-new,.dir-up,.dir-down{font-family:var(--font-data);font-size:9px;padding:2px 7px;border-radius:999px;font-weight:700;border:1px solid;text-transform:uppercase;letter-spacing:0.1em;}
.dir-new{background:var(--navy-light);color:var(--navy);border-color:var(--navy-border);}
.dir-up{background:var(--green-bg);color:var(--green);border-color:var(--green-bd);}
.dir-down{background:var(--red-bg);color:var(--red);border-color:var(--red-bd);}

/* ── Theme card ── */
.theme-card{background:var(--paper);border:1px solid var(--rule);border-radius:var(--radius-md);margin-bottom:16px;overflow:hidden;box-shadow:var(--shadow-card);transition:border-color 0.15s,box-shadow 0.15s;}
.theme-card:hover{border-color:var(--ink-ghost);box-shadow:var(--shadow-lift);}
.theme-header{padding:18px 20px;}
.theme-week-panel{background:var(--bg);border-top:1px solid var(--rule-light);padding:12px 20px;}
.theme-struct-toggle{background:var(--bg);border-top:1px solid var(--rule-light);padding:8px 20px;cursor:pointer;display:flex;justify-content:space-between;align-items:center;}
.theme-struct-body{background:var(--bg);border-top:1px solid var(--rule-light);padding:12px 20px;display:grid;grid-template-columns:1fr 1fr 1fr;gap:14px;}
.struct-label{font-family:var(--font-data);font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:0.16em;color:var(--ink-faint);margin-bottom:4px;}
.struct-val{font-family:var(--font-body);font-size:12px;color:var(--ink-mid);line-height:1.5;}

/* ── Conviction / timing chips (mapped to pill semantics) ── */
.chip-high{font-family:var(--font-data);font-size:10px;padding:3px 9px;background:var(--red-bg);color:var(--red);border-radius:999px;font-weight:700;border:1px solid var(--red-bd);text-transform:uppercase;letter-spacing:0.12em;}
.chip-low{font-family:var(--font-data);font-size:10px;padding:3px 9px;background:var(--amber-bg);color:var(--amber);border-radius:999px;font-weight:700;border:1px solid var(--amber-bd);text-transform:uppercase;letter-spacing:0.12em;}
.chip-timing{font-family:var(--font-data);font-size:10px;padding:3px 9px;background:var(--navy-light);color:var(--navy);border-radius:999px;border:1px solid var(--navy-border);text-transform:uppercase;letter-spacing:0.12em;}
.chip-subsector{font-family:var(--font-data);font-size:10px;color:var(--ink-faint);text-transform:uppercase;letter-spacing:0.14em;}

/* ── Score large (Courier) ── */
.score-large{font-family:var(--font-data);font-size:30px;font-weight:700;line-height:1;font-variant-numeric:tabular-nums;}
.score-small-label{font-family:var(--font-data);font-size:9px;color:var(--ink-faint);margin-top:2px;text-transform:uppercase;letter-spacing:0.14em;}

/* ── Score bar (mapped to .tc-health-bar look) ── */
.score-bar-wrap{display:flex;align-items:center;gap:8px;}
.score-bar-track{width:64px;height:3px;background:var(--rule-light);border-radius:2px;overflow:hidden;}
.score-bar-fill{height:100%;border-radius:2px;}
.score-bar-num{font-family:var(--font-data);font-weight:700;font-size:13px;min-width:26px;font-variant-numeric:tabular-nums;color:var(--ink);}

/* ── Deal row ── */
.deal-row{border-bottom:1px solid var(--rule-light);cursor:pointer;transition:background 0.12s;}
.deal-row:last-child{border-bottom:none;}
.deal-row:hover{background:var(--bg);}
.deal-row-inner{padding:11px 16px 11px 0;}
.deal-row-expanded{background:var(--bg);padding:0 16px 14px 16px;border-bottom:1px solid var(--rule-light);}

/* ── Collapsible chevron ── */
.chevron{display:inline-block;transition:transform 0.15s ease;color:var(--ink-faint);font-size:11px;}
.chevron.open{transform:rotate(0deg);}
.chevron.closed{transform:rotate(-90deg);}

/* ── Vote buttons (gold-on-hover ghost) ── */
.vote-btn{background:transparent;border:1px solid var(--rule);border-radius:var(--radius-sm);cursor:pointer;padding:2px 7px;font-family:var(--font-data);font-size:12px;line-height:16px;color:var(--ink-mid);transition:all 0.12s;}
.vote-btn:hover{border-color:var(--gold);color:var(--gold);}
.vote-btn.up-active{border-color:var(--green-bd);color:var(--green);background:var(--green-bg);}
.vote-btn.down-active{border-color:var(--red-bd);color:var(--red);background:var(--red-bg);}

/* ── Live deal cross-link → ── */
.live-deal-link{font-family:var(--font-data);font-size:9px;font-weight:700;color:var(--gold);text-transform:uppercase;letter-spacing:0.16em;text-decoration:none;margin-left:auto;padding-left:8px;white-space:nowrap;}
.live-deal-link:hover{color:var(--gold-mid);text-decoration:underline;}

/* ── Insight signal chips ── */
.sig-strength{font-family:var(--font-data);font-size:9px;padding:2px 7px;background:var(--green-bg);color:var(--green);border:1px solid var(--green-bd);border-radius:999px;font-weight:700;flex-shrink:0;letter-spacing:0.1em;text-transform:uppercase;}
.sig-weakens{font-family:var(--font-data);font-size:9px;padding:2px 7px;background:var(--red-bg);color:var(--red);border:1px solid var(--red-bd);border-radius:999px;font-weight:700;flex-shrink:0;letter-spacing:0.1em;text-transform:uppercase;}
.sig-neutral{font-family:var(--font-data);font-size:9px;padding:2px 7px;background:var(--slate-bg);color:var(--slate);border:1px solid var(--slate-bd);border-radius:999px;font-weight:700;flex-shrink:0;letter-spacing:0.1em;text-transform:uppercase;}

/* ── Glowing dots (toned down for paper aesthetic) ── */
.dot-green{width:7px;height:7px;border-radius:50%;background:var(--green);display:inline-block;}
.dot-blue{width:7px;height:7px;border-radius:50%;background:var(--navy);display:inline-block;}
.dot-amber{width:7px;height:7px;border-radius:50%;background:var(--amber);display:inline-block;}
.dot-red{width:7px;height:7px;border-radius:50%;background:var(--red);display:inline-block;}

/* ── IC memo card ── */
.memo-card{background:var(--paper);border:1px solid var(--rule);border-radius:var(--radius-md);overflow:hidden;margin-bottom:32px;box-shadow:var(--shadow-card);}
.memo-header{padding:22px 26px;}
.memo-body{background:var(--bg);border-top:2px solid;}
.memo-body-inner{padding:18px 26px 10px;}
.memo-bullet-row{display:flex;gap:0;margin-bottom:10px;border-radius:var(--radius-md);overflow:hidden;background:var(--paper);}
.memo-bullet-label{padding:12px 10px;display:flex;flex-direction:column;align-items:center;justify-content:flex-start;min-width:92px;flex-shrink:0;}
.memo-bullet-icon{font-family:var(--font-data);font-size:14px;margin-bottom:4px;}
.memo-bullet-lname{font-family:var(--font-data);font-size:8px;font-weight:700;letter-spacing:0.16em;text-align:center;line-height:1.3;text-transform:uppercase;}
.memo-bullet-content{padding:12px 14px;flex:1;font-family:var(--font-body);font-size:12px;color:var(--ink-mid);line-height:1.65;}
.memo-footer{display:flex;justify-content:space-between;align-items:center;padding:12px 26px;border-top:1px solid var(--rule);background:var(--paper);}

/* ── Changed-update box ── */
.update-box{border-radius:0 var(--radius-sm) var(--radius-sm) 0;padding:7px 11px;margin-top:6px;font-family:var(--font-body);font-size:11.5px;line-height:1.55;color:var(--ink-mid);}

/* ── Textarea / select in expanded deal ── */
.deal-notes{width:100%;min-height:44px;background:var(--paper);border:1px solid var(--rule);border-radius:var(--radius-sm);color:var(--ink);font-family:var(--font-body);font-size:12px;padding:7px 10px;resize:vertical;box-sizing:border-box;transition:border-color 0.15s;}
.deal-notes:focus{border-color:var(--gold);outline:none;}
.deal-select{font-family:var(--font-data);font-size:11px;padding:3px 8px;border-radius:var(--radius-sm);border:1px solid var(--rule);background:var(--paper);color:var(--ink-mid);cursor:pointer;transition:border-color 0.15s;}
.deal-select:focus{outline:none;border-color:var(--gold);}

/* ── Loading ── */
#root-loading{min-height:60vh;background:var(--bg);display:flex;align-items:center;justify-content:center;font-family:var(--font-body);color:var(--ink-faint);font-size:14px;}

/* ── Focus banner ── */
.focus-banner{display:flex;align-items:center;gap:10px;margin-bottom:16px;padding:9px 14px;border-radius:var(--radius-md);font-family:var(--font-body);font-size:12px;background:var(--navy-light);border:1px solid var(--navy-border);color:var(--navy);}
.focus-clear-btn{margin-left:auto;font-family:var(--font-data);font-size:10px;text-transform:uppercase;letter-spacing:0.12em;background:transparent;border:1px solid currentColor;padding:3px 12px;border-radius:var(--radius-sm);cursor:pointer;font-weight:700;transition:opacity 0.12s;}
.focus-clear-btn:hover{opacity:0.7;}

/* ── Per-theme row layout ── */
.theme-row-wrapper{display:flex;align-items:stretch;background:var(--paper);border:1px solid var(--rule);border-radius:var(--radius-md);overflow:hidden;margin-bottom:16px;box-shadow:var(--shadow-card);transition:border-color 0.15s,box-shadow 0.15s;position:relative;}
.theme-row-wrapper:hover{border-color:var(--ink-ghost);box-shadow:var(--shadow-lift);}
.theme-row-wrapper .theme-card{flex:0 0 57%;margin-bottom:0!important;border:none!important;border-radius:0!important;box-shadow:none!important;border-right:1px solid var(--rule)!important;background:transparent;}
.theme-row-wrapper .theme-card:hover{border-color:transparent!important;box-shadow:none!important;}
.theme-targets-panel{flex:0 0 43%;min-width:0;display:flex;flex-direction:column;background:var(--paper);}
.theme-targets-hdr{padding:9px 14px;border-bottom:1px solid var(--rule-light);background:var(--bg);display:flex;justify-content:space-between;align-items:center;}
.tab-btn-memos{margin-left:auto;border:1px solid var(--rule)!important;border-bottom:1px solid transparent!important;border-radius:var(--radius-sm) var(--radius-sm) 0 0;background:var(--bg)!important;}
.tab-btn-memos:hover{color:var(--gold);}
.tab-btn-memos.active{color:var(--gold)!important;border-color:var(--gold-border)!important;border-bottom-color:transparent!important;background:var(--paper)!important;font-weight:700!important;}
@media(max-width:1100px){.theme-row-wrapper{flex-direction:column;}.theme-row-wrapper .theme-card{flex:none!important;border-right:none!important;border-bottom:1px solid var(--rule)!important;}.theme-targets-panel{flex:none;}}

/* ── Separator ── */
.memo-sep{display:flex;align-items:center;gap:12px;margin-bottom:32px;opacity:0.5;}
.memo-sep-line{flex:1;height:1px;background:var(--rule);}

/* ── Table of Contents card ── */
.toc-card{background:var(--paper);border:1px solid var(--rule);border-radius:var(--radius-md);padding:22px 26px;margin-bottom:28px;box-shadow:var(--shadow-card);position:relative;overflow:hidden;}
.toc-stripe{position:absolute;top:0;left:0;width:4px;bottom:0;background:var(--gold);}
.toc-row{display:flex;align-items:center;gap:10px;padding:7px 10px;border-radius:var(--radius-sm);cursor:pointer;margin-bottom:3px;border:1px solid transparent;transition:all 0.12s;}
.toc-row:hover{background:var(--bg);border-color:var(--rule-light);}

/* ── Empty state ── */
.empty-state{padding:48px;text-align:center;color:var(--ink-faint);font-family:var(--font-body);font-size:14px;font-style:italic;}
</style>
</head>
<body>
{{TOPNAV}}
<div class="tc-shell">
  <main class="tc-shell-inner">
    <div id="root"><div id="root-loading">Loading deal pipeline...</div></div>
  </main>
</div>

<script>
const DATA = {}; // __END_DATA__
</script>

<script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script>
(function(){
'use strict';
var createElement=React.createElement, useState=React.useState, useEffect=React.useEffect, useMemo=React.useMemo, useCallback=React.useCallback;

// ── localStorage helpers ───────────────────────────────────
var LS = {
  get: function(k){ try{ return localStorage.getItem(k); }catch(e){ return null; } },
  set: function(k,v){ try{ localStorage.setItem(k,v); }catch(e){} }
};

// ── Live-deal cross-reference (populated from /dashboard-data.json) ──
// Maps lowercased ticker AND id -> live deal id (used to render → LIVE link).
var LIVE_DEALS = {};
(function(){
  try {
    fetch("/dashboard-data.json", {credentials:"same-origin"})
      .then(function(r){ if(!r.ok) throw new Error("HTTP "+r.status); return r.json(); })
      .then(function(d){
        var deals = (d && d.deals) || [];
        deals.forEach(function(dl){
          if(!dl) return;
          var liveId = dl.id || dl.ticker;
          if(!liveId) return;
          if(dl.ticker) LIVE_DEALS[String(dl.ticker).toLowerCase()] = liveId;
          if(dl.id)     LIVE_DEALS[String(dl.id).toLowerCase()]     = liveId;
          if(dl.name)   LIVE_DEALS[String(dl.name).toLowerCase()]   = liveId;
        });
      })
      .catch(function(){ /* silent — link simply does not appear */ });
  } catch(e){ /* silent */ }
})();
function liveDealIdFor(t){
  if(!t) return null;
  var keys = [];
  if(t.ticker) keys.push(String(t.ticker).toLowerCase());
  if(t.id != null) keys.push(String(t.id).toLowerCase());
  if(t.name) keys.push(String(t.name).toLowerCase());
  for(var i=0;i<keys.length;i++){ if(LIVE_DEALS[keys[i]]) return LIVE_DEALS[keys[i]]; }
  return null;
}

// ── Taxonomy ──────────────────────────────────────────────
var THEME_COLORS = {
  "miso-power":"#f0883e","pjm-power":"#7c3aed","wecc-power":"#2563eb",
  "epc-rollup":"#16a34a","eu-lng-fsru":"#2563eb","us-lng-pf":"#d97706",
  "dc-queue":"#dc2626","captive-power":"#d97706","der-grid-edge":"#16a34a"
};
var SECTORS = ["All","Power","LNG / Gas","Construction","Digital Infra"];
var SECTOR_THEME_IDS = {
  "Power":["miso-power","pjm-power","wecc-power"],
  "LNG / Gas":["eu-lng-fsru","us-lng-pf"],
  "Construction":["epc-rollup","captive-power"],
  "Digital Infra":["dc-queue","der-grid-edge"]
};
var SECTOR_SUBSECTORS = {
  "Power":["All","MISO","PJM","WECC"],
  "LNG / Gas":["All","EU LNG & FSRU","US LNG PF"],
  "Construction":["All","EPC Roll-up","Captive Power"],
  "Digital Infra":["All","DC Queue","DER / Grid-Edge"]
};
var SUBSECTOR_ID = {
  "MISO":"miso-power","PJM":"pjm-power","WECC":"wecc-power",
  "EU LNG & FSRU":"eu-lng-fsru","US LNG PF":"us-lng-pf",
  "EPC Roll-up":"epc-rollup","Captive Power":"captive-power",
  "DC Queue":"dc-queue","DER / Grid-Edge":"der-grid-edge"
};
var THEME_SUBSECTOR = {
  "miso-power":"MISO","pjm-power":"PJM","wecc-power":"WECC",
  "eu-lng-fsru":"EU LNG & FSRU","us-lng-pf":"US LNG PF",
  "epc-rollup":"EPC Roll-up","captive-power":"Captive Power",
  "dc-queue":"DC Queue","der-grid-edge":"DER / Grid-Edge"
};

// ── Investor profiles ─────────────────────────────────────
// Sourced from window.__DEAL_CONFIG__.investors at runtime.
var DC = window.__DEAL_CONFIG__ || {};
var _INV_RAW = (DC.investors && DC.investors.length) ? DC.investors : [];
var INVESTORS = ["All"].concat(_INV_RAW.map(function(x){ return x.label; }));
var INVESTOR_LABEL = _INV_RAW.reduce(function(m,x){ m[x.label] = x.group || x.label; return m; }, {"All":"All"});
var INVESTOR_MAP   = _INV_RAW.reduce(function(m,x){ m[x.label] = x.id; return m; }, {});
var INVESTOR_COLOR = _INV_RAW.reduce(function(m,x){ m[x.label] = x.color || '#64748b'; return m; }, {});

// ── Sparkline ─────────────────────────────────────────────
function Sparkline(p){
  var hist=p.hist||[];
  if(hist.length<2) return createElement("span",{style:{fontSize:9,color:"#94a3b8"}},
    hist.length===0?"No history":("W"+hist[0].week+": "+hist[0].score));
  var W=p.w||200,H=p.h||52,PX=12,PY=8;
  var scores=hist.map(function(h){return h.score;});
  var mn=Math.min.apply(null,scores)-4,mx=Math.max.apply(null,scores)+4;
  var n=hist.length;
  var xs=hist.map(function(_,i){return PX+i*(W-PX*2)/(n-1);});
  var ys=hist.map(function(h){return (H-14)-(h.score-mn)/(mx-mn)*((H-14)-PY);});
  var d=xs.map(function(x,i){return(i===0?"M":"L")+x.toFixed(1)+","+ys[i].toFixed(1);}).join(" ");
  var trend=scores[scores.length-1]-scores[0];
  var lc=trend>0?"#16a34a":trend<0?"#dc2626":"#2563eb";
  return createElement("svg",{width:W,height:H,style:{overflow:"visible",display:"block"}},
    createElement("path",{d:d,stroke:lc,strokeWidth:2,fill:"none",strokeLinejoin:"round",strokeLinecap:"round"}),
    hist.map(function(h,i){return createElement("g",{key:i},
      createElement("circle",{cx:xs[i].toFixed(1),cy:ys[i].toFixed(1),r:3,fill:lc}),
      createElement("text",{x:xs[i].toFixed(1),y:(ys[i]-6).toFixed(1),textAnchor:"middle",fontSize:9,fill:"#64748b"},h.score),
      createElement("text",{x:xs[i].toFixed(1),y:H-1,textAnchor:"middle",fontSize:7.5,fill:"#94a3b8"},"W"+h.week));}));
}
