<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>YG · Status</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
* { box-sizing: border-box; margin: 0; padding: 0; }
html { background: #f0f2f7; }
body { font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f0f2f7; color: #0f1e38; min-height: 100vh; padding: 0 24px 32px; font-size: 14px; -webkit-font-smoothing: antialiased; -moz-osx-font-smoothing: grayscale; }

/* ── Brand accent bar ── */
.accent-bar { height: 3px; background: #c9973a; margin: 0 -36px 32px; position: sticky; top: 0; z-index: 50; }

/* ── YG monogram ── */
.yg-monogram { width: 42px; height: 42px; border-radius: 4px; background: #0f1e38; display: flex; align-items: center; justify-content: center; font-size: 13px; font-weight: 800; color: #c9973a; letter-spacing: -0.5px; flex-shrink: 0; }

/* ── New item highlight ── */
.is-new-item { position: relative; }
.is-new-item::before { content: ''; position: absolute; left: -24px; top: 0; bottom: 0; width: 2px; background: #2563eb; border-radius: 1px; opacity: 0.7; }
.new-badge { display: inline-block; font-size: 8px; font-weight: 700; color: #2563eb; background: rgba(37,99,235,0.08); border: 1px solid rgba(37,99,235,0.2); padding: 1px 5px; border-radius: 3px; letter-spacing: 0.6px; text-transform: uppercase; margin-left: 5px; vertical-align: middle; }

/* ── Strikethrough item state ── */
.item-stricken { opacity: 0.45; transition: opacity 0.2s; }
.item-stricken .fu-company, .item-stricken .fu-person, .item-stricken .fu-what,
.item-stricken .r-name, .item-stricken .r-contact, .item-stricken .rel-card-name { text-decoration: line-through; color: #94a3b8 !important; }
.item-stricken .fu-due, .item-stricken .r-next, .item-stricken .rel-card-next { opacity: 0; }
.strike-lbl { font-size: 8px; font-weight: 700; color: #94a3b8; text-transform: uppercase; letter-spacing: 0.5px; margin-top: 3px; }

/* ── Strike / delete button pair ── */
.action-btns { display: flex; flex-direction: column; gap: 3px; align-items: flex-end; flex-shrink: 0; }
.strikethru-btn { background: none; border: 1px solid #e2e8f2; cursor: pointer; color: #94a3b8; font-size: 10px; line-height: 1; padding: 2px 6px; border-radius: 4px; transition: all 0.12s; font-family: inherit; white-space: nowrap; }
.strikethru-btn:hover { color: #16a34a; border-color: rgba(22,163,74,0.3); background: rgba(22,163,74,0.06); }
.strikethru-btn.active { color: #94a3b8; border-color: #e2e8f2; text-decoration: line-through; }

/* ── Header ── */
.header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 32px; padding-bottom: 24px; border-bottom: 1px solid #e2e8f2; }
.header-left h1 { font-size: 22px; font-weight: 700; color: #0f1e38; letter-spacing: -0.6px; }
.header-left .sub { font-size: 12px; color: #64748b; margin-top: 5px; font-weight: 400; }
.header-right { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; justify-content: flex-end; }
.refresh-btn { background: none; border: 1px solid #cbd5e1; color: #64748b; font-size: 12px; padding: 4px 10px; border-radius: 6px; cursor: pointer; display: flex; align-items: center; gap: 5px; transition: all 0.15s; }
.refresh-btn:hover { border-color: #94a3b8; color: #374151; }
.refresh-btn.spinning svg { animation: spin 0.6s linear infinite; }
@keyframes spin { to { transform: rotate(360deg); } }
.sec-refresh-btn { background: none; border: none; color: #94a3b8; padding: 1px 3px; cursor: pointer; display: inline-flex; align-items: center; border-radius: 3px; opacity: 0.5; transition: opacity 0.15s, color 0.15s; flex-shrink: 0; }
.sec-refresh-btn:hover { opacity: 1; color: #475569; }
.sec-refresh-btn.spinning svg { animation: spin 0.5s linear infinite; }
.sec-refresh-btn:disabled { cursor: default; }
.badge { font-size: 11px; padding: 5px 14px; border-radius: 20px; border: 1px solid; font-weight: 600; letter-spacing: 0.1px; }
.badge-blue  { background: rgba(74,158,255,0.08);  color: #4a9eff; border-color: rgba(74,158,255,0.2); }
.badge-green { background: rgba(34,197,94,0.08);   color: #22c55e; border-color: rgba(34,197,94,0.2); }
.badge-red   { background: rgba(239,68,68,0.08);   color: #ef4444; border-color: rgba(239,68,68,0.2); }

/* ── Filter Pills ── */
.filter-bar { display: flex; gap: 6px; margin-bottom: 24px; }
.pill { background: #ffffff; border: 1px solid #e2e8f2; color: #64748b; font-size: 12px; font-weight: 500; padding: 7px 18px; border-radius: 20px; cursor: pointer; transition: all 0.15s ease; box-shadow: 0 1px 3px rgba(15,30,56,0.05); }
.pill:hover { border-color: #c6d4e8; color: #1e293b; background: #f8fafc; }
.pill.active      { background: #0f1e38; color: #ffffff; border-color: #0f1e38; font-weight: 600; box-shadow: 0 2px 8px rgba(15,30,56,0.25); }
.pill.tomac-active{ background: rgba(22,163,74,0.08); color: #15803d; border-color: rgba(22,163,74,0.3); font-weight: 600; }
.pill.fund-active { background: rgba(167,139,250,0.10); color: #7c3aed; border-color: rgba(167,139,250,0.35); font-weight: 600; }

/* ── Grid ── */
.grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 18px; margin-bottom: 18px; }
.grid-3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 18px; margin-bottom: 18px; }
.full { grid-column: 1 / -1; }

/* ── Card ── */
.card { background: #ffffff; border: 1px solid #e2e8f2; border-radius: 14px; padding: 22px 24px; transition: border-color 0.2s ease, box-shadow 0.2s ease; box-shadow: 0 2px 12px rgba(15,30,56,0.06), 0 1px 3px rgba(15,30,56,0.04); }
.card:hover { border-color: #c6d4e8; box-shadow: 0 6px 24px rgba(15,30,56,0.1), 0 2px 6px rgba(15,30,56,0.06); }
.card-title { font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: 1.1px; color: #64748b; margin-bottom: 16px; display: flex; align-items: center; gap: 8px; }
.card-title .dot { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; }
.dot-red    { background: #ef4444; }
.dot-yellow { background: #f59e0b; }
.dot-green  { background: #22c55e; }
.dot-blue   { background: #4a9eff; }
.dot-purple { background: #a78bfa; }
.card-count { margin-left: auto; font-size: 11px; font-weight: 400; text-transform: none; letter-spacing: 0; color: #94a3b8; }
.no-items { font-size: 12px; color: #94a3b8; font-style: italic; padding: 4px 0; }

/* ── Calls ── */
.call-item { display: flex; align-items: flex-start; gap: 14px; padding: 11px 0; border-bottom: 1px solid #f1f5f9; }
.call-item:last-child { border-bottom: none; }
.call-time { font-size: 11px; color: #2563eb; font-weight: 700; white-space: nowrap; min-width: 90px; padding-top: 2px; font-variant-numeric: tabular-nums; }
.call-time.tomac { color: #16a34a; }
.call-who  { font-size: 13px; font-weight: 600; color: #0f1e38; }
.call-with { font-size: 11px; color: #64748b; margin-top: 3px; }

/* ── Follow-ups ── */
.fu-item { display: grid; grid-template-columns: 140px 1fr 72px; gap: 8px; align-items: start; padding: 6px 4px; border-bottom: 1px solid #f1f5f9; }
.fu-item:last-child { border-bottom: none; }
.fu-item:hover { background: #f8fafc; border-radius: 5px; }
.fu-dot { display: none; }
.fu-company { font-size: 11px; font-weight: 600; color: #0f1e38; line-height: 1.3; }
.fu-person  { font-size: 10px; color: #94a3b8; margin-top: 1px; }
.fu-who  { font-size: 11px; font-weight: 600; color: #0f1e38; }
.fu-what { font-size: 11px; color: #475569; line-height: 1.4; }
.fu-due  { font-size: 9px; margin-top: 2px; font-weight: 600; }
.due-today { color: #dc2626; }
.due-soon  { color: #d97706; }
.due-later { color: #94a3b8; font-weight: 400; }
.src { font-size: 10px; background: #f1f5f9; color: #64748b; padding: 2px 8px; border-radius: 4px; margin-left: 6px; vertical-align: middle; border: 1px solid #e2e8f2; }

/* ── Deal section tabs ── */
.tc-tabs { display: flex; margin-bottom: 16px; border-bottom: 1px solid #e2e8f2; }
.tc-tab { font-size: 12px; font-weight: 600; padding: 9px 18px; cursor: pointer; border-bottom: 2px solid transparent; color: #64748b; margin-bottom: -1px; transition: all 0.15s ease; letter-spacing: 0.2px; }
.tc-tab.active-deal { color: #16a34a; border-color: #16a34a; }
.tc-tab.active-fund { color: #7c3aed; border-color: #7c3aed; }
.tc-tab.active-port { color: #0ea5e9; border-color: #0ea5e9; }
.tc-tab:hover { color: #1e293b; }
.dp-row { display:grid; grid-template-columns:52px 1fr auto auto; gap:10px; align-items:center; padding:9px 0; border-bottom:1px solid #f1f5f9; }
.dp-row:last-child { border-bottom:none; }
.dp-ticker { font-size:11px; font-weight:700; font-family:monospace; padding:3px 7px; border-radius:6px; }
.dp-health { font-size:14px; font-weight:800; text-align:center; }
.dp-health-lbl { font-size:8px; color:#94a3b8; letter-spacing:0.3px; text-align:center; }

/* ── Deal rows ── */
.deal-row { display: flex; align-items: flex-start; gap: 12px; padding: 12px 0; border-bottom: 1px solid #f1f5f9; cursor: pointer; border-radius: 8px; transition: all 0.15s ease; }
.deal-row:last-child { border-bottom: none; }
.deal-row:hover { background: #f8fafc; margin: 0 -10px; padding: 12px 10px; }
.deal-status { font-size: 10px; font-weight: 700; padding: 3px 9px; border-radius: 5px; flex-shrink: 0; margin-top: 2px; letter-spacing: 0.3px; }
.s-sourcing  { background: rgba(74,158,255,0.1);   color: #4a9eff;  border: 1px solid rgba(74,158,255,0.2); }
.s-diligence { background: rgba(245,158,11,0.1);   color: #f59e0b;  border: 1px solid rgba(245,158,11,0.2); }
.s-memo      { background: rgba(34,197,94,0.1);    color: #22c55e;  border: 1px solid rgba(34,197,94,0.2); }
.s-pass      { background: rgba(113,113,122,0.08); color: #71717a;  border: 1px solid rgba(113,113,122,0.12); }
.s-active    { background: rgba(251,146,60,0.1);   color: #fb923c;  border: 1px solid rgba(251,146,60,0.2); }
.s-nurturing { background: rgba(74,158,255,0.08);  color: #4a9eff;  border: 1px solid rgba(74,158,255,0.15); }
.s-watching  { background: rgba(167,139,250,0.08); color: #a78bfa;  border: 1px solid rgba(167,139,250,0.15); }
.s-tracking  { background: rgba(113,113,122,0.06); color: #71717a;  border: 1px solid rgba(113,113,122,0.1); }
.deal-info .dname { font-size: 13px; font-weight: 600; color: #0f1e38; }
.deal-info .dmeta { font-size: 11px; color: #64748b; margin-top: 3px; }
.deal-next { font-size: 11px; color: #475569; margin-top: 5px; line-height: 1.45; }
.deal-next::before { content: '→ '; color: #94a3b8; }
.deal-arrow { font-size: 18px; color: #cbd5e1; margin-left: auto; flex-shrink: 0; padding-top: 2px; transition: color 0.15s ease; }
.deal-row:hover .deal-arrow { color: #64748b; }

/* ── Timeline ── */
.timeline { position: relative; padding-left: 18px; }
.timeline::before { content: ''; position: absolute; left: 4px; top: 4px; bottom: 4px; width: 1px; background: #e2e8f2; }
.tl-item { position: relative; padding: 0 0 16px 14px; }
.tl-item:last-child { padding-bottom: 0; }
.tl-dot { position: absolute; left: -13px; top: 5px; width: 8px; height: 8px; border-radius: 50%; background: #ffffff; border: 2px solid #94a3b8; }
.tl-date { font-size: 10px; color: #94a3b8; margin-bottom: 4px; font-weight: 700; letter-spacing: 0.4px; text-transform: uppercase; }
.tl-text { font-size: 12px; color: #475569; line-height: 1.6; }
.next-touchpoint { background: rgba(22,163,74,0.04); border: 1px solid rgba(22,163,74,0.18); border-radius: 10px; padding: 14px 16px; margin-top: 4px; }
.next-touchpoint .nt-label { font-size: 9px; font-weight: 700; text-transform: uppercase; letter-spacing: 1px; color: #16a34a; margin-bottom: 7px; opacity: 0.9; }
.next-touchpoint .nt-text { font-size: 13px; color: #15803d; font-weight: 500; line-height: 1.45; }

/* ── Calendar ── */
.cal-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 6px; margin-top: 4px; }
.cal-day { background: #f8fafc; border: 1px solid #e2e8f2; border-radius: 10px; padding: 10px 8px; min-height: 76px; transition: border-color 0.15s ease; }
.cal-day:hover { border-color: #c6d4e8; }
.cal-day.today { border-color: rgba(37,99,235,0.4); background: rgba(37,99,235,0.04); }
.cal-label { font-size: 10px; font-weight: 700; color: #94a3b8; margin-bottom: 6px; letter-spacing: 0.3px; }
.cal-day.today .cal-label { color: #2563eb; }
.cal-ev { font-size: 9px; padding: 3px 6px; border-radius: 4px; margin-bottom: 3px; line-height: 1.45; font-weight: 500; }
.ev-job     { background: rgba(37,99,235,0.08);   color: #1d4ed8; }
.ev-tomac   { background: rgba(22,163,74,0.08);   color: #15803d; }
.ev-personal{ background: rgba(124,58,237,0.07);  color: #6d28d9; }
.cal-empty  { font-size: 10px; color: #cbd5e1; margin-top: 4px; }

/* ── Recruiting Pipeline ── */
.pipeline { display: flex; gap: 10px; overflow-x: auto; padding-bottom: 4px; align-items: flex-start; }
.p-stage { flex: 1; min-width: 140px; }
.p-stage.p-stage-wide { flex: 2.2; min-width: 280px; }
.p-stage-wide .p-cards-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 7px; }
.p-stage-wide .p-cards-grid .r-card { margin-bottom: 0; }
.p-label { font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.6px; padding-bottom: 8px; border-bottom: 2px solid; margin-bottom: 8px; }
.p-label.outreach   { border-color: #cbd5e1;               color: #64748b; }
.p-label.screening  { border-color: rgba(217,119,6,0.4);   color: #b45309; }
.p-label.interviews { border-color: rgba(37,99,235,0.4);   color: #2563eb; }
.p-label.offer      { border-color: rgba(22,163,74,0.4);   color: #16a34a; }
.p-label.closed     { border-color: #e2e8f2;               color: #94a3b8; }
.r-card { background: #f8fafc; border: 1px solid #e2e8f2; border-radius: 10px; padding: 10px 12px; margin-bottom: 7px; cursor: pointer; transition: all 0.15s ease; }
.r-card:hover { border-color: #c6d4e8; background: #f1f5f9; }
.r-name    { font-size: 12px; font-weight: 600; color: #1e293b; }
.r-contact { font-size: 11px; color: #64748b; margin-top: 3px; }
.r-next    { font-size: 10px; color: #2563eb; margin-top: 5px; }
.r-next::before { content: '→ '; }
.stale-badge { font-size: 9px; background: rgba(220,38,38,0.07); color: #dc2626; padding: 1px 5px; border-radius: 3px; margin-left: 4px; }
.archive-toggle { font-size: 11px; color: #94a3b8; cursor: pointer; margin-top: 14px; padding: 8px 0; border-top: 1px solid #f1f5f9; display: flex; align-items: center; gap: 6px; background: none; border-left: none; border-right: none; border-bottom: none; width: 100%; text-align: left; transition: color 0.15s ease; }
.archive-toggle:hover { color: #64748b; }
.archive-section { margin-top: 10px; }
.archive-row { display: flex; align-items: center; gap: 8px; padding: 5px 0; border-bottom: 1px solid #f8fafc; }
.archive-row:last-child { border-bottom: none; }
.archive-name    { font-size: 11px; color: #94a3b8; }
.archive-contact { font-size: 10px; color: #cbd5e1; }
.archive-note    { font-size: 10px; color: #cbd5e1; margin-left: auto; max-width: 200px; text-align: right; }

/* ── Corrections ── */
.correction-box { margin-top: 0; }
.correction-box textarea { width: 100%; background: #f8fafc; border: 1px solid #e2e8f2; border-radius: 8px; color: #1e293b; font-size: 13px; font-family: inherit; padding: 12px 14px; resize: vertical; min-height: 80px; outline: none; transition: border-color 0.15s ease; }
.correction-box textarea:focus { border-color: rgba(37,99,235,0.4); }
.correction-box textarea::placeholder { color: #cbd5e1; }
.correction-actions { display: flex; gap: 10px; margin-top: 10px; align-items: center; }
.btn { font-size: 12px; padding: 7px 16px; border-radius: 6px; cursor: pointer; border: 1px solid; font-family: inherit; font-weight: 500; transition: all 0.15s ease; }
.btn-primary { background: rgba(37,99,235,0.07); color: #2563eb; border-color: rgba(37,99,235,0.2); }
.btn-primary:hover { background: rgba(37,99,235,0.13); }
.btn-ghost { background: none; color: #64748b; border-color: #e2e8f2; }
.btn-ghost:hover { color: #1e293b; border-color: #c6d4e8; }
.queued-list { margin-top: 12px; }
.queued-item { background: #f8fafc; border: 1px solid #e2e8f2; border-radius: 6px; padding: 9px 12px; margin-bottom: 6px; font-size: 12px; color: #475569; display: flex; gap: 10px; align-items: flex-start; }
.queued-item .q-date { color: #94a3b8; flex-shrink: 0; font-size: 11px; }
.queued-note { font-size: 11px; color: #94a3b8; margin-left: auto; }

/* ── Modal ── */
.modal-overlay { position: fixed; inset: 0; background: rgba(15,30,56,0.55); display: flex; align-items: center; justify-content: center; z-index: 1000; padding: 24px; }
.modal-overlay.hidden { display: none; }
.modal { background: #ffffff; border: 1px solid #e2e8f2; border-radius: 6px; max-width: 600px; width: 100%; max-height: 82vh; overflow-y: auto; padding: 30px; box-shadow: 0 8px 24px rgba(15,30,56,0.18); }
.modal-header { display: flex; align-items: flex-start; justify-content: space-between; margin-bottom: 24px; }
.modal-title { font-size: 18px; font-weight: 700; color: #0f1e38; }
.modal-stage { font-size: 11px; padding: 3px 10px; border-radius: 12px; margin-top: 6px; display: inline-block; }
.modal-close { background: #f1f5f9; border: 1px solid #e2e8f2; color: #64748b; font-size: 16px; cursor: pointer; padding: 4px 9px; border-radius: 6px; transition: all 0.15s ease; line-height: 1.4; }
.modal-close:hover { color: #0f1e38; border-color: #c6d4e8; }
.modal-section { margin-bottom: 22px; }
.modal-section-label { font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.9px; color: #94a3b8; margin-bottom: 10px; }
.modal-field { font-size: 13px; color: #475569; margin-bottom: 6px; line-height: 1.5; }
.modal-field span { color: #1e293b; font-weight: 500; }
.modal-note { font-size: 12px; color: #475569; padding: 7px 0; border-bottom: 1px solid #f1f5f9; }
.modal-note:last-child { border-bottom: none; }
.modal-note .note-date { color: #94a3b8; font-size: 11px; margin-right: 8px; }
.modal-note-add { width: 100%; background: #f8fafc; border: 1px solid #e2e8f2; border-radius: 6px; color: #1e293b; font-size: 12px; font-family: inherit; padding: 8px 10px; resize: none; margin-top: 8px; outline: none; transition: border-color 0.15s ease; }
.modal-note-add:focus { border-color: rgba(37,99,235,0.4); }

/* ── To-Do List ── */
.todo-input-row { display: flex; gap: 8px; margin-bottom: 12px; }
.todo-input { flex: 1; background: #f8fafc; border: 1px solid #e2e8f2; border-radius: 6px; color: #1e293b; font-size: 13px; font-family: inherit; padding: 8px 12px; outline: none; transition: border-color 0.15s ease; }
.todo-input:focus { border-color: rgba(37,99,235,0.4); }
.todo-item { display: flex; align-items: flex-start; gap: 10px; padding: 9px 0; border-bottom: 1px solid #f1f5f9; }
.todo-item:last-child { border-bottom: none; }
.todo-check { width: 17px; height: 17px; min-width: 17px; border-radius: 5px; border: 1.5px solid #cbd5e1; background: none; cursor: pointer; display: flex; align-items: center; justify-content: center; margin-top: 1px; transition: all 0.15s ease; }
.todo-check:hover { border-color: #16a34a; }
.todo-check.done { background: rgba(22,163,74,0.1); border-color: #16a34a; }
.todo-check.done::after { content: '✓'; font-size: 10px; color: #16a34a; font-weight: 700; }
.todo-text { font-size: 13px; color: #1e293b; flex: 1; line-height: 1.45; }
.todo-text.done { color: #94a3b8; text-decoration: line-through; }
.todo-clear { font-size: 11px; color: #94a3b8; cursor: pointer; margin-left: auto; background: none; border: none; padding: 0; font-family: inherit; transition: color 0.15s ease; }
.todo-clear:hover { color: #1e293b; }
.todo-empty { font-size: 12px; color: #94a3b8; font-style: italic; padding: 2px 0; }

/* ── Calendar workstream tags ── */
.ev-ws { font-size: 8px; font-weight: 700; letter-spacing: 0.4px; padding: 1px 5px; border-radius: 3px; margin-right: 3px; vertical-align: middle; display: inline-block; }
.ev-ws-tomac { background: rgba(34,197,94,0.12);  color: #22c55e; }
.ev-ws-job   { background: rgba(74,158,255,0.12); color: #4a9eff; }

/* ── LP Tracker Table ── */
.lp-table { width: 100%; border-collapse: collapse; margin-top: 8px; }
.lp-table th { font-size: 9px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.6px; color: #94a3b8; padding: 6px 8px; border-bottom: 1px solid #e2e8f2; text-align: left; }
.lp-table td { font-size: 11px; color: #475569; padding: 7px 8px; border-bottom: 1px solid #f1f5f9; vertical-align: middle; }
.lp-table tr:last-child td { border-bottom: none; }
.lp-status { font-size: 9px; font-weight: 700; padding: 2px 7px; border-radius: 4px; white-space: nowrap; }
.lp-committed  { background: rgba(34,197,94,0.1);    color: #22c55e; }
.lp-soft       { background: rgba(245,158,11,0.1);   color: #f59e0b; }
.lp-interested { background: rgba(74,158,255,0.1);   color: #4a9eff; }
.lp-passed     { background: rgba(113,113,122,0.08); color: #71717a; }
.lp-tracking   { background: rgba(113,113,122,0.05); color: #52525b; }

/* ── Relationship Health ── */
.rel-item { display: flex; align-items: center; flex-wrap: wrap; gap: 6px 10px; padding: 9px 0; border-bottom: 1px solid #f1f5f9; }
.rel-item:last-child { border-bottom: none; }
.rel-name { font-size: 13px; font-weight: 600; color: #1e293b; flex: 1; min-width: 120px; }
.rel-last { font-size: 11px; color: #94a3b8; }
.rel-days { font-size: 11px; font-weight: 700; padding: 2px 9px; border-radius: 5px; flex-shrink: 0; }
.rel-warm { background: rgba(217,119,6,0.08); color: #b45309; }
.rel-cold { background: rgba(220,38,38,0.08); color: #dc2626; }
.rel-ws-tag { font-size: 9px; padding: 1px 6px; border-radius: 3px; flex-shrink: 0; }

/* ── Deal thesis ── */
.deal-thesis { font-size: 12px; color: #475569; line-height: 1.65; padding: 14px 16px; background: #f8fafc; border: 1px solid #e2e8f2; border-radius: 10px; }

/* ── Stats Bar ── */
.stats-bar { display: grid; grid-template-columns: repeat(5, 1fr); gap: 14px; margin-bottom: 28px; }
.stat-card { background: #ffffff; border: 1px solid #e2e8f2; border-radius: 14px; padding: 20px 14px 16px; text-align: center; transition: all 0.2s ease; cursor: pointer; box-shadow: 0 2px 12px rgba(15,30,56,0.06); }
.stat-card:hover { border-color: #c6d4e8; transform: translateY(-3px); box-shadow: 0 8px 28px rgba(15,30,56,0.12); }
.stat-card.stat-active { transform: translateY(-3px); }
.stat-card.stat-dimmed { opacity: 0.3; transform: none !important; filter: grayscale(0.4); }
.stat-num { font-size: 36px; font-weight: 700; line-height: 1; margin-bottom: 8px; font-variant-numeric: tabular-nums; letter-spacing: -1.5px; }
.stat-label { font-size: 10px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.8px; color: #71717a; }
.stat-sub { font-size: 10px; color: #52525b; margin-top: 4px; }
.stat-hint { font-size: 9px; color: #94a3b8; margin-top: 6px; letter-spacing: 0.2px; }
.stat-focus-hint { font-size: 9px; margin-top: 6px; font-weight: 700; letter-spacing: 0.3px; }

/* ── Focus Banner ── */
.focus-banner { display: flex; align-items: center; gap: 12px; margin-bottom: 22px; padding: 10px 16px; border-radius: 8px; }
.focus-clear-btn { margin-left: auto; font-size: 11px; background: none; border: 1px solid; padding: 4px 12px; border-radius: 5px; cursor: pointer; font-family: inherit; font-weight: 500; transition: all 0.12s; }
.focus-clear-btn:hover { opacity: 0.7; }

/* ── Keyboard Shortcuts hint ── */
.kbd { display: inline-block; font-size: 9px; background: #f1f5f9; border: 1px solid #e2e8f2; border-radius: 3px; padding: 1px 5px; color: #64748b; font-family: monospace; margin: 0 1px; }

/* ── Collapsible card titles ── */
.card-title-btn { cursor: pointer; user-select: none; }
.card-title-btn:hover .collapse-chevron { color: #a1a1aa !important; }
.collapse-chevron { transition: transform 0.15s ease; }
.collapse-chevron.open { transform: rotate(0deg); }
.collapse-chevron.closed { transform: rotate(-90deg); }

/* ── Rel Health Grid ── */
.rel-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 10px; margin-top: 4px; }
.rel-card { background: #f8fafc; border: 1px solid #e2e8f2; border-radius: 12px; padding: 14px 16px; transition: border-color 0.15s ease; }
.rel-card:hover { border-color: #c6d4e8; }
.rel-card.rel-cold  { border-color: rgba(220,38,38,0.3); background: rgba(220,38,38,0.02); }
.rel-card.rel-warm  { border-color: rgba(217,119,6,0.25); background: rgba(217,119,6,0.02); }
.rel-card.rel-green { border-color: rgba(22,163,74,0.25); background: rgba(22,163,74,0.02); }
.rel-card-top { display: flex; align-items: flex-start; justify-content: space-between; margin-bottom: 4px; }
.rel-card-name { font-size: 12px; font-weight: 600; color: #1e293b; line-height: 1.3; flex: 1; margin-right: 8px; }
.rel-days-big { font-size: 24px; font-weight: 700; line-height: 1; flex-shrink: 0; font-variant-numeric: tabular-nums; }
.rel-card-meta { font-size: 10px; color: #71717a; margin-top: 3px; }
.rel-card-next { font-size: 10px; color: #52525b; margin-top: 6px; padding-top: 6px; border-top: 1px solid rgba(255,255,255,0.04); }
.rel-card.rel-cold  { border-color: rgba(239,68,68,0.2); }
.rel-card.rel-warm  { border-color: rgba(245,158,11,0.15); }
.rel-card.rel-green { border-color: rgba(34,197,94,0.15); }

/* ── Cadence View ── */
.cadence-bar { display: flex; align-items: center; gap: 6px; margin-bottom: 22px; }
.cadence-tab { font-size: 11px; font-weight: 600; padding: 5px 14px; border-radius: 6px; cursor: pointer; border: 1px solid #e2e8f2; background: #ffffff; color: #64748b; font-family: inherit; transition: all 0.15s ease; letter-spacing: 0.2px; box-shadow: 0 1px 3px rgba(15,30,56,0.05); }
.cadence-tab:hover { color: #1e293b; border-color: #c6d4e8; }
.cadence-tab.active { background: #0f1e38; color: #ffffff; border-color: #0f1e38; box-shadow: 0 2px 8px rgba(15,30,56,0.2); }
.cadence-sep { font-size: 11px; color: #cbd5e1; }

/* ── Follow-up redesign ── */
.fu-company { font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.6px; color: #a1a1aa; margin-bottom: 3px; }
.fu-person   { font-size: 13px; font-weight: 600; color: #fafafa; }
.fu-what     { font-size: 12px; color: #71717a; margin-top: 3px; line-height: 1.45; }
.fu-due      { font-size: 11px; margin-top: 5px; font-weight: 600; }

/* ── Dismiss / remove button ── */
.dismiss-btn { background: none; border: none; cursor: pointer; color: #cbd5e1; font-size: 14px; line-height: 1; padding: 2px 4px; border-radius: 4px; transition: color 0.12s; flex-shrink: 0; font-family: inherit; }
.dismiss-btn:hover { color: #dc2626; }

/* ── Recruiting card controls ── */
.r-card { position: relative; }
.r-card-controls { position: absolute; top: 6px; right: 6px; display: none; gap: 4px; }
.r-card:hover .r-card-controls { display: flex; }
.r-stage-btn { font-size: 9px; padding: 2px 5px; border-radius: 3px; cursor: pointer; border: 1px solid rgba(255,255,255,0.1); background: rgba(255,255,255,0.04); color: #71717a; font-family: inherit; transition: all 0.12s; }
.r-stage-btn:hover { color: #fafafa; border-color: rgba(255,255,255,0.2); }
.r-dismiss-btn { font-size: 11px; padding: 2px 5px; border-radius: 3px; cursor: pointer; border: 1px solid rgba(239,68,68,0.2); background: none; color: #3f3f46; font-family: inherit; transition: all 0.12s; }
.r-dismiss-btn:hover { color: #ef4444; border-color: rgba(239,68,68,0.4); background: rgba(239,68,68,0.06); }

.hidden { display: none !important; }
.updated { font-size: 11px; color: #94a3b8; text-align: center; margin-top: 28px; padding-top: 18px; border-top: 1px solid #e2e8f2; }

/* ── Rel Health cards (navy theme) ── */
.rel-card { background: rgba(148,163,184,0.04); border: 1px solid rgba(148,163,184,0.09); border-radius: 12px; padding: 14px 16px; transition: border-color 0.15s ease; }
.rel-card:hover { border-color: rgba(148,163,184,0.16); }

/* ── Deal rows (navy theme) ── */
.deal-row:hover { background: #f8fafc; }

/* ── Correction box (navy theme) ── */
.correction-box textarea { background: rgba(148,163,184,0.05); border: 1px solid rgba(148,163,184,0.1); }
.correction-box textarea:focus { border-color: rgba(29,111,204,0.45); }
.queued-item { background: rgba(148,163,184,0.04); border: 1px solid rgba(148,163,184,0.08); }

/* ── Todo (navy theme) ── */
.todo-input { background: rgba(148,163,184,0.05); border: 1px solid rgba(148,163,184,0.1); }
.todo-input:focus { border-color: rgba(29,111,204,0.45); }

/* ── Synopsis sections ── */
.synopsis-card { position: relative; overflow: hidden; border-top: 1px solid #e2e8f2; }
.syn-bullets { display: flex; flex-direction: column; gap: 9px; margin-top: 4px; }
.syn-bullet { display: flex; gap: 10px; align-items: flex-start; font-size: 12.5px; color: #94a3b8; line-height: 1.55; }
.syn-dot { color: #c9973a; font-weight: 800; flex-shrink: 0; margin-top: 0px; font-size: 14px; line-height: 1.1; }
.synopsis-link { font-size: 11px; font-weight: 600; text-decoration: none; letter-spacing: 0.1px; transition: opacity 0.15s ease; }
.synopsis-link:hover { opacity: 0.75; }

/* ── Theme chips ── */
.themes-grid { display: flex; flex-direction: column; gap: 12px; margin-top: 4px; }
.theme-row { display: flex; gap: 12px; align-items: flex-start; padding: 10px 12px; background: rgba(148,163,184,0.03); border: 1px solid rgba(148,163,184,0.07); border-radius: 10px; transition: border-color 0.15s ease; }
.theme-row:hover { border-color: rgba(148,163,184,0.13); }
.theme-tag-pill { font-size: 9.5px; font-weight: 700; padding: 3px 10px; border-radius: 20px; white-space: nowrap; flex-shrink: 0; letter-spacing: 0.4px; text-transform: uppercase; margin-top: 2px; }
.theme-text { font-size: 12px; color: #94a3b8; line-height: 1.55; flex: 1; }

/* ── Priority Targets ── */
.pt-sub-hdr { font-size: 9px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.9px; padding: 7px 0 6px; border-bottom: 2px solid; margin: 8px 0 0; display: flex; align-items: center; gap: 6px; cursor: pointer; user-select: none; }
.pt-sub-hdr:first-child { margin-top: 2px; }
.pt-col-hdr { display: grid; grid-template-columns: 140px 1fr 110px 68px; gap: 8px; padding: 4px 4px 6px; border-bottom: 1px solid #e2e8f2; margin-top: 4px; }
.pt-col-hdr span { font-size: 9px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.6px; color: #94a3b8; }
.pt-row { display: grid; grid-template-columns: 140px 1fr 110px 68px; gap: 8px; align-items: start; padding: 7px 4px; border-bottom: 1px solid #f1f5f9; cursor: pointer; border-radius: 5px; transition: background 0.12s, border 0.12s; }
.pt-row[draggable="true"] { cursor: grab; }
.pt-row[draggable="true"]:active { cursor: grabbing; }
.pt-row.drag-over { border-top: 2px solid #2563eb; background: rgba(37,99,235,0.04); }
.pt-row.dragging { opacity: 0.4; }
.pt-row[draggable="true"] { cursor: grab; }
.pt-row[draggable="true"]:active { cursor: grabbing; }
.pt-move { display: inline-flex; gap: 2px; margin-left: 6px; vertical-align: middle; }
.pt-move-btn { background: transparent; border: 1px solid #e2e8f2; color: #94a3b8; font-size: 8px; line-height: 1; padding: 2px 4px; border-radius: 3px; cursor: pointer; }
.pt-move-btn:hover { background: #f1f5f9; color: #0f1e38; border-color: #cbd5e1; }
@media (hover: none) and (pointer: coarse) { .pt-move-btn { padding: 4px 6px; font-size: 10px; } }
/* Task column button */
.pt-task-btn { font-size: 9px; font-weight: 700; padding: 3px 7px; border-radius: 4px; border: 1px solid; cursor: pointer; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; font-family: inherit; background: none; transition: all 0.12s; line-height: 1.4; display: block; width: 100%; text-align: center; }
.pt-task-email    { color: #4a9eff; border-color: rgba(74,158,255,0.35); }
.pt-task-email:hover { background: rgba(74,158,255,0.1); }
.pt-task-complete { color: #22c55e; border-color: rgba(34,197,94,0.35); }
.pt-task-complete:hover { background: rgba(34,197,94,0.1); }
.pt-task-schedule { color: #a78bfa; border-color: rgba(167,139,250,0.35); }
.pt-task-schedule:hover { background: rgba(167,139,250,0.1); }
.pt-task-write    { color: #f59e0b; border-color: rgba(245,158,11,0.35); }
.pt-task-write:hover { background: rgba(245,158,11,0.1); }
.pt-task-msg      { color: #22c55e; border-color: rgba(34,197,94,0.35); }
.pt-task-msg:hover { background: rgba(34,197,94,0.1); }
.pt-task-linkedin { color: #4a9eff; border-color: rgba(74,158,255,0.35); }
.pt-task-linkedin:hover { background: rgba(74,158,255,0.1); }
.pt-row:last-child { border-bottom: none; }
.pt-row:hover { background: #f8fafc; }
.pt-firm { font-size: 11px; font-weight: 600; color: #0f1e38; line-height: 1.3; }
.pt-paren { font-size: 10px; color: #94a3b8; font-weight: 400; }
.pt-ntb-inline { font-size: 9px; font-weight: 600; margin-left: 4px; }
.pt-nextstep { font-size: 11px; color: #475569; line-height: 1.4; }
.pt-act-cell { display: flex; align-items: flex-start; justify-content: space-between; gap: 3px; }
.pt-act-body { flex: 1; min-width: 0; }
.pt-act-text { font-size: 10px; font-weight: 600; color: #f59e0b; line-height: 1.35; }
.pt-act-none { font-size: 10px; color: #d1d5db; }
.pt-act-date { font-size: 9px; color: #94a3b8; font-weight: 400; margin-top: 1px; }
.pt-act-date.overdue { color: #dc2626; font-weight: 700; }
.pt-act-date.soon    { color: #d97706; font-weight: 600; }
.pt-del-btn { flex-shrink: 0; background: none; border: none; cursor: pointer; color: #d1d5db; font-size: 13px; line-height: 1; padding: 0 1px; transition: color 0.1s; font-family: inherit; }
.pt-del-btn:hover { color: #ef4444; }
.pt-rec-tag { display: inline-block; font-size: 9px; color: #64748b; background: #f1f5f9; border: 1px solid #e2e8f2; padding: 1px 5px; border-radius: 3px; margin: 1px 2px 1px 0; line-height: 1.4; }
.pt-rec-tag.owe-me { color: #2563eb; background: rgba(37,99,235,0.06); border-color: rgba(37,99,235,0.2); }
.pt-rec-tag.i-owe  { color: #d97706; background: rgba(217,119,6,0.06); border-color: rgba(217,119,6,0.2); }
.pt-rec-tag.no-resp{ color: #6b7280; background: rgba(107,114,128,0.06); border-color: rgba(107,114,128,0.2); }
.pt-owner { font-size: 8px; font-weight: 800; text-transform: uppercase; letter-spacing: 0.4px; display: inline-block; padding: 1px 5px; border-radius: 3px; margin-top: 3px; }
/* Owner-color tiers — assigned by index into firm_context.team[] (principal
   first, then team[] in order). owner-tier-N picked at runtime via
   TEAM_FIRST_NAMES.indexOf(owner) % 3. */
.owner-tier-0 { background: rgba(245,158,11,0.1); color: #d97706; border: 1px solid rgba(245,158,11,0.25); }
.owner-tier-1 { background: rgba(34,197,94,0.1);  color: #15803d; border: 1px solid rgba(34,197,94,0.25); }
.owner-tier-2 { background: rgba(74,158,255,0.1); color: #2563eb; border: 1px solid rgba(74,158,255,0.25); }
.owner-other  { background: rgba(148,163,184,0.1);color: #64748b; border: 1px solid rgba(148,163,184,0.2); }
/* Row left-border accent by owner tier (deal panel only) */
.pt-row-tier-1 { border-left: 3px solid rgba(34,197,94,0.35) !important; padding-left: 5px; }
.pt-row-tier-2 { border-left: 3px solid rgba(74,158,255,0.35) !important; padding-left: 5px; }
/* Today highlight — amber tint on any row due today */
.pt-row.pt-row-today { background: rgba(245,158,11,0.06); border-left: 3px solid rgba(245,158,11,0.55) !important; padding-left: 5px; }
.pt-row.pt-row-today:hover { background: rgba(245,158,11,0.11); }
/* Employer name in recruiter status column */
.pt-rec-employer { font-size: 11px; font-weight: 700; color: #0f1e38; line-height: 1.3; }
/* Timeline entries in modals */
.itl-list { margin-top: 4px; }
.itl-entry { display: flex; gap: 10px; padding: 5px 0; border-bottom: 1px solid rgba(255,255,255,0.04); align-items: flex-start; font-size: 12px; }
.itl-entry:last-child { border-bottom: none; }
.itl-date { font-size: 10px; font-weight: 600; color: #64748b; white-space: nowrap; min-width: 80px; padding-top: 1px; font-variant-numeric: tabular-nums; }
.itl-date.itl-future { color: #4a9eff; }
.itl-date.itl-today  { color: #22c55e; }
.itl-date.itl-overdue{ color: #ef4444; }
.itl-text { color: #cbd5e1; line-height: 1.4; flex: 1; }
.itl-call-badge { font-size: 9px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.3px; color: #a78bfa; background: rgba(167,139,250,0.1); border: 1px solid rgba(167,139,250,0.2); padding: 1px 5px; border-radius: 3px; margin-right: 6px; flex-shrink: 0; }
.itl-action-badge { font-size: 9px; font-weight: 700; color: #f59e0b; background: rgba(245,158,11,0.1); border: 1px solid rgba(245,158,11,0.2); padding: 1px 5px; border-radius: 3px; margin-right: 6px; flex-shrink: 0; }
.pt-badge { font-size: 8px; font-weight: 700; padding: 1px 4px; border-radius: 3px; letter-spacing: 0.3px; text-transform: uppercase; display: inline-block; vertical-align: middle; margin-left: 3px; }
.pt-badge-action { background: rgba(220,38,38,0.09); color: #dc2626; border: 1px solid rgba(220,38,38,0.2); }
.pt-badge-call   { background: rgba(74,158,255,0.09); color: #4a9eff; border: 1px solid rgba(74,158,255,0.2); }
.pt-divider { border: none; border-top: 1px solid #e2e8f2; margin: 12px 0 2px; }
.pt-subsection { }
/* ── Priority Panels (3-column grid) ── */
.priority-panels { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 18px; margin-bottom: 18px; }
.priority-panels .card { margin-bottom: 0; max-width: none !important; min-width: 0; overflow-wrap: break-word; }
/* ── Action Items: sort toggle ── */
.fu-sort-btn { font-size: 9px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px; padding: 2px 8px; border-radius: 4px; border: 1px solid #e2e8f2; background: #f8fafc; color: #64748b; cursor: pointer; transition: all 0.12s; font-family: inherit; white-space: nowrap; }
.fu-sort-btn:hover { border-color: #94a3b8; color: #374151; }
.fu-sort-btn.timeline-active { background: #1e3a5f; color: #c9973a; border-color: #1e3a5f; }
/* ── Action Items: tomorrow flag ── */
.fu-tmrw { display: inline-flex; align-items: center; gap: 2px; font-size: 8px; font-weight: 800; color: #dc2626; background: rgba(220,38,38,0.09); border: 1px solid rgba(220,38,38,0.25); padding: 1px 5px; border-radius: 3px; letter-spacing: 0.4px; text-transform: uppercase; margin-left: 5px; vertical-align: middle; }

/* ═══════════════════════════════════════════════════════════════════════
   TOMAC COVE RE-SKIN OVERLAY — cream paper palette via shared tokens.
   All colors use var(--token) from design-system.css. No hex codes.
   ═══════════════════════════════════════════════════════════════════════ */

/* Global surface */
html, body { background: var(--bg) !important; color: var(--ink) !important; font-family: var(--font-body) !important; }
body { padding: 0 !important; }

/* Kill the gradient accent bar */
.accent-bar { display: none !important; }

/* Remove bright dots on card titles — replace with semantic rule squares */
.card-title .dot { display: none !important; }
.card-title { color: var(--ink-faint) !important; font-family: var(--font-data) !important; font-size: 10px !important; letter-spacing: 0.16em !important; text-transform: uppercase !important; }
.card { background: var(--paper) !important; border: 1px solid var(--rule) !important; border-radius: var(--radius-md) !important; box-shadow: var(--shadow-card) !important; }
.card:hover { border-color: var(--ink-ghost) !important; box-shadow: var(--shadow-lift) !important; }

/* Header block — cream */
.header { border-bottom: 1px solid var(--rule) !important; }
.header-left h1 { color: var(--ink) !important; font-family: var(--font-display) !important; }
.header-left .sub { color: var(--ink-faint) !important; font-family: var(--font-data) !important; letter-spacing: 0.12em; text-transform: uppercase; font-size: 10px; }

/* Badges (keep semantic tint, but via tokens) */
.badge-blue  { background: var(--navy-light)  !important; color: var(--navy)  !important; border-color: var(--navy-border)  !important; }
.badge-green { background: var(--green-bg)    !important; color: var(--green) !important; border-color: var(--green-bd)     !important; }
.badge-red   { background: var(--red-bg)      !important; color: var(--red)   !important; border-color: var(--red-bd)       !important; }
.badge { font-family: var(--font-data); text-transform: uppercase; letter-spacing: 0.12em; }

/* Filter pills → tc-pill */
.filter-bar { gap: 6px; margin: 0 0 20px; }
.pill { background: var(--white) !important; border: 1px solid var(--rule) !important; color: var(--ink-mid) !important; font-family: var(--font-data) !important; font-size: 10.5px !important; font-weight: 700 !important; text-transform: uppercase !important; letter-spacing: 0.12em !important; padding: 5px 14px !important; border-radius: 999px !important; box-shadow: none !important; }
.pill:hover { border-color: var(--gold-border) !important; color: var(--gold) !important; background: var(--gold-light) !important; }
.pill.active, .pill.tomac-active { background: var(--navy) !important; color: var(--white) !important; border-color: var(--navy) !important; box-shadow: none !important; }

/* Cadence tabs → pill style */
.cadence-bar { margin-bottom: 16px; }
.cadence-tab { background: var(--white) !important; border: 1px solid var(--rule) !important; color: var(--ink-mid) !important; font-family: var(--font-data) !important; font-size: 10.5px !important; font-weight: 700 !important; text-transform: uppercase !important; letter-spacing: 0.12em !important; border-radius: 999px !important; box-shadow: none !important; }
.cadence-tab:hover { border-color: var(--gold-border) !important; color: var(--gold) !important; }
.cadence-tab.active { background: var(--navy) !important; color: var(--white) !important; border-color: var(--navy) !important; }
.cadence-sep { color: var(--rule) !important; }

/* ── Stat tiles ── */
.stats-bar { gap: 10px; margin-bottom: 24px; }
.stat-card { background: var(--paper) !important; border: 1px solid var(--rule) !important; border-radius: var(--radius-md) !important; padding: 14px 16px 12px !important; text-align: left !important; box-shadow: none !important; transition: border-color 0.12s ease, box-shadow 0.12s ease !important; }
.stat-card:hover { transform: none !important; border-color: var(--ink-ghost) !important; box-shadow: var(--shadow-card) !important; }
.stat-card.stat-active { transform: none !important; border-color: var(--navy) !important; box-shadow: 0 0 0 1px var(--navy) inset !important; }
.stat-card.stat-dimmed { filter: none !important; opacity: 0.45 !important; }
.stat-num { font-family: var(--font-data) !important; font-size: 28px !important; font-weight: 700 !important; letter-spacing: -0.01em !important; line-height: 1.05 !important; margin-bottom: 4px !important; }
.stat-label { font-family: var(--font-data) !important; font-size: 10px !important; font-weight: 700 !important; letter-spacing: 0.16em !important; text-transform: uppercase !important; color: var(--ink-faint) !important; }
.stat-sub { font-family: var(--font-body) !important; color: var(--ink-mid) !important; font-size: 12px !important; }
.stat-hint, .stat-focus-hint { font-family: var(--font-data) !important; font-size: 9px !important; letter-spacing: 0.1em !important; color: var(--ink-faint) !important; }

/* ── Follow-up rows ── */
.fu-item { border-bottom-color: var(--rule-light) !important; }
.fu-item:hover { background: var(--gold-light) !important; }
.fu-company { font-family: var(--font-display) !important; text-transform: none !important; letter-spacing: 0 !important; font-size: 13px !important; font-weight: 700 !important; color: var(--ink) !important; }
.fu-person { color: var(--ink-faint) !important; font-family: var(--font-body) !important; font-style: italic; }
.fu-what { color: var(--ink-mid) !important; }
.due-today { color: var(--red) !important; }
.due-soon { color: var(--amber) !important; }
.due-later { color: var(--ink-faint) !important; }

/* ── Priority-target rows (job search + personal) ── */
.pt-col-hdr { border-bottom: 1px solid var(--rule-light) !important; }
.pt-col-hdr span { font-family: var(--font-data) !important; color: var(--ink-faint) !important; letter-spacing: 0.16em !important; }
.pt-row { border-bottom-color: var(--rule-light) !important; }
.pt-row:hover { background: var(--gold-light) !important; }
.pt-row.pt-row-today { background: var(--amber-bg) !important; border-left: 3px solid var(--amber) !important; }
.pt-row.pt-row-today:hover { background: var(--amber-bg) !important; }
.pt-row-tier-1 { border-left: 3px solid var(--green) !important; }
.pt-row-tier-2 { border-left: 3px solid var(--navy) !important; }

/* Tier 1/2/3 indicators on priority-target rows */
.pt-tier-dot { display: inline-block; width: 6px; height: 6px; border-radius: 50%; margin-right: 8px; vertical-align: middle; transform: translateY(-1px); flex-shrink: 0; }
.pt-tier-dot--1 { background: var(--red); }
.pt-tier-dot--2 { background: var(--amber); }
.pt-tier-dot--3 { background: var(--ink-ghost); }
.pt-row[data-tier="1"]:not(.pt-row-today) { background: rgba(122,32,32,0.04) !important; }
.pt-row[data-tier="1"]:not(.pt-row-today):hover { background: rgba(122,32,32,0.08) !important; }
.pt-firm { font-family: var(--font-display) !important; font-size: 13px !important; font-weight: 700 !important; color: var(--ink) !important; letter-spacing: 0 !important; }
.pt-paren { font-family: var(--font-body) !important; font-style: italic !important; color: var(--ink-faint) !important; }
.pt-nextstep { color: var(--ink-mid) !important; }

/* Sub-section headers → tc-section-label */
.pt-sub-hdr { font-family: var(--font-data) !important; font-size: 10px !important; letter-spacing: 0.18em !important; color: var(--ink-faint) !important; border-bottom: 1px solid var(--rule-light) !important; }
.pt-sub-hdr[style*="#ef4444"], .pt-sub-hdr[style*="ef4444"] { color: var(--red) !important; }
.pt-sub-hdr[style*="#22c55e"], .pt-sub-hdr[style*="22c55e"] { color: var(--green) !important; }
.pt-sub-hdr[style*="#f59e0b"], .pt-sub-hdr[style*="f59e0b"] { color: var(--amber) !important; }
.pt-sub-hdr[style*="#a78bfa"], .pt-sub-hdr[style*="a78bfa"] { color: var(--slate) !important; }
.pt-sub-hdr[style*="#7c3aed"], .pt-sub-hdr[style*="7c3aed"] { color: var(--slate) !important; }
.pt-sub-hdr[style*="#64748b"], .pt-sub-hdr[style*="64748b"] { color: var(--ink-faint) !important; }

/* Action date chips (urgency) */
.pt-act-date.overdue { color: var(--red) !important; font-family: var(--font-data) !important; text-transform: uppercase; letter-spacing: 0.1em; }
.pt-act-date.soon    { color: var(--amber) !important; font-family: var(--font-data) !important; text-transform: uppercase; letter-spacing: 0.1em; }
.pt-act-date         { font-family: var(--font-data) !important; }
.pt-act-text { color: var(--amber) !important; font-family: var(--font-body) !important; }

/* Task buttons — single Courier uppercase ghost style */
.pt-task-btn { font-family: var(--font-data) !important; font-weight: 700 !important; letter-spacing: 0.12em !important; text-transform: uppercase !important; font-size: 9px !important; border-radius: var(--radius-sm) !important; }
.pt-task-email, .pt-task-linkedin { color: var(--navy) !important; border-color: var(--navy-border) !important; }
.pt-task-email:hover, .pt-task-linkedin:hover { background: var(--navy-light) !important; }
.pt-task-complete, .pt-task-msg { color: var(--green) !important; border-color: var(--green-bd) !important; }
.pt-task-complete:hover, .pt-task-msg:hover { background: var(--green-bg) !important; }
.pt-task-schedule { color: var(--slate) !important; border-color: var(--slate-bd) !important; }
.pt-task-schedule:hover { background: var(--slate-bg) !important; }
.pt-task-write { color: var(--amber) !important; border-color: var(--amber-bd) !important; }
.pt-task-write:hover { background: var(--amber-bg) !important; }

/* Deal-stage chips (for deal-tab legacy rows / sub pills) */
.deal-status, .s-sourcing, .s-diligence, .s-memo, .s-pass, .s-active, .s-nurturing, .s-watching, .s-tracking {
  font-family: var(--font-data) !important;
  font-size: 9px !important; font-weight: 700 !important;
  letter-spacing: 0.12em !important; text-transform: uppercase !important;
  border-radius: 999px !important;
}
.s-sourcing  { background: var(--slate-bg) !important; color: var(--slate) !important; border: 1px solid var(--slate-bd) !important; }
.s-diligence { background: var(--navy-light) !important; color: var(--navy) !important; border: 1px solid var(--navy-border) !important; }
.s-memo, .s-active { background: var(--gold-light) !important; color: var(--gold) !important; border: 1px solid var(--gold-border) !important; }
.s-pass, .s-tracking { background: var(--paper) !important; color: var(--ink-faint) !important; border: 1px solid var(--rule) !important; }
.s-nurturing, .s-watching { background: var(--amber-bg) !important; color: var(--amber) !important; border: 1px solid var(--amber-bd) !important; }

/* Calendar cells */
.cal-day { background: var(--paper) !important; border-color: var(--rule) !important; }
.cal-day:hover { border-color: var(--ink-ghost) !important; }
.cal-day.today { border-color: var(--gold) !important; background: var(--gold-light) !important; }
.cal-label { font-family: var(--font-data) !important; color: var(--ink-faint) !important; letter-spacing: 0.14em !important; }
.cal-day.today .cal-label { color: var(--gold) !important; }
.ev-job     { background: var(--navy-light) !important; color: var(--navy) !important; }
.ev-tomac   { background: var(--green-bg) !important;   color: var(--green) !important; }
.ev-personal{ background: var(--slate-bg) !important;   color: var(--slate) !important; }
.ev-ws-tomac { background: var(--green-bg) !important; color: var(--green) !important; }
.ev-ws-job   { background: var(--navy-light) !important; color: var(--navy) !important; }

/* Deal-section tabs inside the Dealflow/Fundraising card */
.tc-tabs { border-bottom-color: var(--rule) !important; }
.tc-tab { font-family: var(--font-body) !important; color: var(--ink-mid) !important; font-weight: 400 !important; text-transform: none !important; letter-spacing: 0 !important; }
.tc-tab:hover { color: var(--ink) !important; }
.tc-tab.active-deal, .tc-tab.active-fund, .tc-tab.active-port {
  color: var(--ink) !important;
  border-color: var(--gold) !important;
  font-weight: 600 !important;
}

/* Deal rows inside deal-tab panel */
.deal-row { border-bottom-color: var(--rule-light) !important; }
.deal-row:hover { background: var(--gold-light) !important; }
.deal-info .dname { font-family: var(--font-display) !important; font-size: 14px !important; font-weight: 700 !important; color: var(--ink) !important; }
.deal-info .dmeta { color: var(--ink-mid) !important; font-family: var(--font-body) !important; font-style: italic; }
.deal-next { color: var(--amber) !important; font-family: var(--font-body) !important; }
.deal-next::before { content: '→ ' !important; color: var(--gold) !important; font-family: var(--font-data) !important; }

/* Dividers inside cards */
.pt-divider { border-top-color: var(--rule-light) !important; }

/* ── Deal panel middle column — MINI DEAL CARDS ── */
.tc-mini-header {
  padding: 10px 0 12px;
  border-bottom: 1px solid var(--rule-light);
  margin-bottom: 10px;
}
.tc-mini-header-line {
  font-family: var(--font-data);
  font-size: 11px;
  letter-spacing: 0.06em;
  color: var(--ink-mid);
}
.tc-mini-header-line .tc-mh-num { color: var(--ink); font-weight: 700; }
.tc-mini-header-line .tc-mh-sep { color: var(--rule); padding: 0 6px; }
.tc-mini-header-line .tc-mh-crit { color: var(--red); font-weight: 700; }

.tc-mini-card {
  display: block;
  background: var(--paper);
  border: 1px solid var(--rule);
  border-radius: var(--radius-md);
  padding: 10px 12px 11px;
  margin-bottom: 8px;
  position: relative;
  text-decoration: none;
  color: inherit;
  box-shadow: var(--shadow-card);
  transition: transform 0.12s ease, box-shadow 0.12s ease, border-color 0.12s ease;
}
.tc-mini-card:hover {
  transform: translateY(-1px);
  box-shadow: var(--shadow-lift);
  border-color: var(--ink-ghost);
  color: inherit;
}
.tc-mini-card-head {
  display: flex;
  align-items: baseline;
  justify-content: space-between;
  gap: 8px;
  margin-bottom: 6px;
}
.tc-mini-name {
  font-family: var(--font-display);
  font-size: 15px;
  font-weight: 700;
  color: var(--ink);
  line-height: 1.2;
  letter-spacing: -0.005em;
}
.tc-mini-sector {
  font-family: var(--font-body);
  font-style: italic;
  font-size: 11px;
  color: var(--ink-faint);
  margin-top: 1px;
}
.tc-mini-strip-capital {
  display: flex;
  align-items: baseline;
  gap: 8px;
  padding: 5px 8px;
  font-family: var(--font-data);
  font-size: 11px;
  background: var(--gold-light);
  border: 1px solid var(--gold-border);
  color: var(--gold);
  border-radius: var(--radius-sm);
  margin: 6px 0;
}
.tc-mini-strip-capital .tc-mini-cap-label { font-size: 9px; letter-spacing: 0.16em; font-weight: 700; }
.tc-mini-strip-capital .tc-mini-cap-value { color: var(--ink); font-weight: 700; }
.tc-mini-strip-capital .tc-mini-cap-timing { margin-left: auto; font-size: 9px; letter-spacing: 0.14em; text-transform: uppercase; color: var(--amber); }
.tc-mini-health-row {
  display: flex;
  align-items: center;
  gap: 8px;
  margin: 6px 0 4px;
  font-family: var(--font-data);
  font-size: 10.5px;
  color: var(--ink-mid);
}
.tc-mini-health-row .tc-track { flex: 1; height: 3px; background: var(--rule-light); border-radius: 2px; overflow: hidden; }
.tc-mini-health-row .tc-fill { height: 100%; background: var(--navy); border-radius: 2px; }
.tc-mini-health-row .tc-fill--green { background: var(--green); }
.tc-mini-health-row .tc-fill--amber { background: var(--amber); }
.tc-mini-health-row .tc-fill--red   { background: var(--red); }
.tc-mini-health-row .tc-score { font-weight: 700; color: var(--ink); min-width: 22px; text-align: right; }
.tc-mini-health-row .tc-owner { color: var(--ink-faint); }
.tc-mini-health-row .tc-days  { color: var(--ink-faint); margin-left: auto; }
.tc-mini-health-row .tc-days.is-stale { color: var(--amber); }
.tc-mini-next {
  display: flex;
  align-items: baseline;
  gap: 6px;
  font-family: var(--font-body);
  font-size: 12px;
  color: var(--amber);
  margin-top: 6px;
  line-height: 1.35;
}
.tc-mini-next::before { content: "→"; color: var(--gold); font-weight: 700; font-family: var(--font-data); }
.tc-mini-stage {
  font-family: var(--font-data);
  font-size: 9px;
  font-weight: 700;
  letter-spacing: 0.14em;
  text-transform: uppercase;
  padding: 3px 8px;
  border-radius: 999px;
  border: 1px solid var(--rule);
  background: var(--white);
  color: var(--ink-mid);
  white-space: nowrap;
  flex-shrink: 0;
}
.tc-mini-stage--slate { background: var(--slate-bg); color: var(--slate); border-color: var(--slate-bd); }
.tc-mini-stage--navy  { background: var(--navy-light); color: var(--navy); border-color: var(--navy-border); }
.tc-mini-stage--gold  { background: var(--gold-light); color: var(--gold); border-color: var(--gold-border); }

/* Deal origination — row stack inside deal column */
.tc-orig-row {
  display: grid;
  grid-template-columns: 1fr auto;
  gap: 8px;
  align-items: baseline;
  padding: 8px 2px;
  border-bottom: 1px solid var(--rule-light);
  cursor: pointer;
  transition: background 0.1s ease;
}
.tc-orig-row:last-child { border-bottom: none; }
.tc-orig-row:hover { background: var(--gold-light); }
.tc-orig-name { font-family: var(--font-display); font-size: 13px; font-weight: 700; color: var(--ink); }
.tc-orig-sub  { font-family: var(--font-body); font-style: italic; font-size: 11px; color: var(--ink-faint); margin-top: 1px; }
.tc-orig-next { font-family: var(--font-body); font-size: 11px; color: var(--ink-mid); margin-top: 2px; }
.tc-orig-full-link {
  display: block;
  text-align: center;
  padding: 8px 0;
  margin-top: 10px;
  font-family: var(--font-data);
  font-size: 10px;
  font-weight: 700;
  letter-spacing: 0.14em;
  text-transform: uppercase;
  color: var(--gold);
  border: 1px solid var(--gold-border);
  border-radius: var(--radius-sm);
  background: var(--gold-light);
}
.tc-orig-full-link:hover { background: var(--gold); color: var(--white); }

/* Portfolio tab — TCIP mini cards */
.tc-port-card .tc-mini-name { font-family: var(--font-data); letter-spacing: 0.04em; font-size: 13px; }
.tc-port-card .tc-port-name-sub { font-family: var(--font-display); letter-spacing: -0.005em; font-size: 14px; font-weight: 700; color: var(--ink); margin-left: 6px; }
.tc-port-stale { color: var(--amber); font-size: 9px; margin-left: 4px; font-family: var(--font-data); }
.tc-port-health-pill { font-family: var(--font-data); font-size: 11px; font-weight: 700; letter-spacing: 0.04em; padding: 3px 10px; }
.tc-port-actions { font-family: var(--font-body); font-style: italic; font-size: 11px; color: var(--ink-faint); margin-top: 4px; }
.tc-port-actions--crit { color: var(--red); font-weight: 700; font-style: normal; font-family: var(--font-data); letter-spacing: 0.04em; }
.tc-port-header { display: flex; flex-wrap: wrap; align-items: baseline; }
.tc-port-date { font-family: var(--font-data); font-size: 9px; color: var(--ink-faint); letter-spacing: 0.08em; font-weight: 400; text-transform: none; }
.tc-port-header-meta { margin-left: auto; font-family: var(--font-data); font-size: 10px; color: var(--ink-mid); letter-spacing: 0.04em; text-transform: none; font-weight: 400; }
.tc-port-link { color: var(--gold); font-weight: 700; text-decoration: none; }
.tc-port-link:hover { color: var(--ink); }
.tc-port-compile-btn { background: none; border: 1px solid var(--gold-border); color: var(--gold); border-radius: var(--radius-sm); padding: 1px 7px; font-size: 9px; font-family: var(--font-data); cursor: pointer; margin-left: 6px; }
.tc-port-compile-btn:hover { background: var(--gold-light); }
.tc-portfolio-compile-link { color: var(--gold); font-weight: 700; font-family: var(--font-data); text-decoration: none; }
.tc-port-summary { margin-top: 10px; padding: 8px 12px; border-radius: var(--radius-sm); font-family: var(--font-data); font-size: 10px; letter-spacing: 0.04em; background: var(--paper); border: 1px solid var(--rule-light); color: var(--ink-faint); }
.tc-port-summary--crit { background: var(--red-bg); border-color: var(--red-bd); color: var(--red); font-weight: 700; }

/* Fundraising tab — LP/capital mini cards */
.tc-fund-card { cursor: pointer; }
.tc-fund-card--master { border-color: var(--gold-border); background: var(--gold-light); }
.tc-fund-card--master .tc-mini-name { font-size: 16px; }

/* Urgency pills (Personal / Job-search status) */
.tc-urg-today    { color: var(--red) !important; }
.tc-urg-overdue  { color: var(--red) !important; }
.tc-urg-tomorrow { color: var(--amber) !important; }

/* Footer */
.updated { border-top-color: var(--rule) !important; color: var(--ink-faint) !important; font-family: var(--font-data) !important; font-size: 10px !important; letter-spacing: 0.12em; }
.updated .kbd { background: var(--paper) !important; border-color: var(--rule) !important; color: var(--ink-faint) !important; }

/* Recruiting tag chips */
.pt-rec-tag { font-family: var(--font-data); font-size: 9px; letter-spacing: 0.08em; }
.pt-rec-tag.owe-me { background: var(--navy-light) !important; color: var(--navy) !important; border-color: var(--navy-border) !important; }
.pt-rec-tag.i-owe  { background: var(--amber-bg) !important; color: var(--amber) !important; border-color: var(--amber-bd) !important; }
.pt-rec-tag.no-resp{ background: var(--slate-bg) !important; color: var(--slate) !important; border-color: var(--slate-bd) !important; }
.pt-rec-employer { font-family: var(--font-display) !important; color: var(--ink) !important; font-size: 12px !important; }
.pt-owner { font-family: var(--font-data) !important; letter-spacing: 0.12em !important; }
.owner-tier-0 { background: var(--amber-bg) !important; color: var(--amber) !important; border-color: var(--amber-bd) !important; }
.owner-tier-1 { background: var(--green-bg) !important; color: var(--green) !important; border-color: var(--green-bd) !important; }
.owner-tier-2 { background: var(--navy-light) !important; color: var(--navy) !important; border-color: var(--navy-border) !important; }
.owner-other  { background: var(--slate-bg) !important; color: var(--slate) !important; border-color: var(--slate-bd) !important; }

/* Synopsis cards */
.synopsis-card { background: var(--paper) !important; }
.syn-bullet { color: var(--ink-mid) !important; }
.syn-dot { color: var(--gold) !important; }

/* Refresh / sort buttons */
.refresh-btn, .fu-sort-btn { font-family: var(--font-data); color: var(--ink-mid); border-color: var(--rule); background: var(--white); }
.refresh-btn:hover, .fu-sort-btn:hover { border-color: var(--gold); color: var(--gold); }
.fu-sort-btn.timeline-active { background: var(--navy) !important; color: var(--gold-light) !important; border-color: var(--navy) !important; }

/* Print: inherits design-system.css @media print */

/* ── Mobile ─────────────────────────────────────────────── */
@media (max-width: 780px) {
  .priority-panels           { grid-template-columns: 1fr !important; }
  .grid-2, .grid-3           { grid-template-columns: 1fr !important; }
  .stats-bar                 { grid-template-columns: repeat(2, 1fr) !important; }
  .pt-col-hdr                { display: none !important; }
  .pt-row                    { grid-template-columns: 1fr auto !important; gap: 4px; }
  .pt-row > :nth-child(2)    { grid-column: 1 / -1; font-size: 12px; color: var(--ink-mid); }
  .pt-row > :nth-child(3),
  .pt-row > :nth-child(4)    { display: none; }
  .fu-item                   { grid-template-columns: 1fr auto !important; }
  .fu-item > :first-child    { grid-column: 1 / -1; font-size: 12px; margin-bottom: 2px; }
  .dp-row                    { grid-template-columns: 1fr auto !important; }
  .dp-row > :nth-child(3),
  .dp-row > :nth-child(4)    { display: none; }
  .cal-grid                  { grid-template-columns: repeat(4, 1fr) !important; }
  .p-stage-wide .p-cards-grid{ grid-template-columns: 1fr !important; }
  .modal                     { max-width: 96vw !important; padding: 18px !important; }
  #filter-bar                { flex-wrap: wrap; gap: 6px; }
}
@media (max-width: 480px) {
  .stats-bar                 { grid-template-columns: 1fr 1fr !important; }
  .cal-grid                  { grid-template-columns: repeat(3, 1fr) !important; }
}
</style>
</head>
<body>

{{TOPNAV}}

<div class="tc-shell">
<main class="tc-shell-inner">
<div id="root"></div>
</main>
</div>

<!-- Modal -->
<div id="modal" class="modal-overlay hidden" onclick="closeModal(event)">
  <div class="modal" id="modal-content"></div>
</div>

<script>
// ══════════════════════════════════════════════════════
// DATA — injected by capture pipeline each morning
// ══════════════════════════════════════════════════════
const DATA = {}; // __END_DATA__;

// ══════════════════════════════════════════════════════
// PRIORITY TARGETS CONFIG — manually curated, never overwritten by pipeline
// Edit this block to update priority targets and recruiter status
// ══════════════════════════════════════════════════════
// RECRUIT_CONFIG is injected from config/recruit-config.yaml at serve time.
// Edit that file — never hardcode data here.
const RECRUIT_CONFIG = window.__RECRUIT_CONFIG__ || {priorityTargets:{inDiscussion:[],waitingToHear:[],doIChase:[]},recruiters:[]};


// ══════════════════════════════════════════════════════
// USER SETTINGS — injected from config/strings.yaml at serve time
// ══════════════════════════════════════════════════════
const PREFERRED_EMAIL = '{{STR:settings.preferred_email}}'; // 'gmail' | 'native' | 'outlook'

// Convert a mailto: URL to a web-compose URL based on PREFERRED_EMAIL.
// 'gmail'   → https://mail.google.com/mail/?view=cm&to=...&su=...&body=...
// 'outlook' → https://outlook.office.com/mail/deeplink/compose?to=...&subject=...&body=...
// 'native'  → unchanged (system default mail app)
function resolveMailto(url) {
  if (!url || !url.startsWith('mailto:')) return url;
  if (PREFERRED_EMAIL !== 'gmail' && PREFERRED_EMAIL !== 'outlook') return url;
  try {
    const bare = url.slice(7); // strip 'mailto:'
    const qi   = bare.indexOf('?');
    const to   = qi === -1 ? bare : bare.slice(0, qi);
    const qs   = qi === -1 ? '' : bare.slice(qi + 1);
    const params = new URLSearchParams(qs);
    if (PREFERRED_EMAIL === 'gmail') {
      const gm = new URL('https://mail.google.com/mail/');
      gm.searchParams.set('view', 'cm');
      if (to)                    gm.searchParams.set('to',   decodeURIComponent(to));
      if (params.get('subject')) gm.searchParams.set('su',   params.get('subject'));
      if (params.get('body'))    gm.searchParams.set('body', params.get('body'));
      return gm.toString();
    } else {
      const ol = new URL('https://outlook.office.com/mail/deeplink/compose');
      if (to)                    ol.searchParams.set('to',      decodeURIComponent(to));
      if (params.get('subject')) ol.searchParams.set('subject', params.get('subject'));
      if (params.get('body'))    ol.searchParams.set('body',    params.get('body'));
      return ol.toString();
    }
  } catch(e) { return url; }
}

// ══════════════════════════════════════════════════════
// TOMAC COVE CONFIG — capital raising, origination, live deals
// ══════════════════════════════════════════════════════
// TOMAC_CONFIG is injected from config/tomac-config.yaml at serve time.
// Edit that file — never hardcode data here.
const TOMAC_CONFIG = window.__TOMAC_CONFIG__ || {liveDeals:[],dealOrigination:[],capitalRaisingAdvisors:[],prospectiveInvestors:[]};

// ══════════════════════════════════════════════════════
// PERSONAL ACTIONS CONFIG — personal obligations, admin, finance
// ══════════════════════════════════════════════════════
const PERSONAL_CONFIG = {
  // items hydrated from data/user-state/personal-items.json via window.__PERSONAL_ITEMS_INITIAL__
  // Resolved items are filtered server-side against email-resolutions.json before injection
  // Edit personal-items.json to add/remove items — do not hardcode here
  items: (function() {
    try { return window.__PERSONAL_ITEMS_INITIAL__ || []; } catch(e) { return []; }
  })(),
  // claudeCode items are hydrated from data/user-state/build-backlog.json via
  // window.__BUILD_BACKLOG_INITIAL__ — see _build_backlog_append_ endpoint + capture-pipeline Round 0
  claudeCode: (function() {
    try {
      var src = (window.__BUILD_BACKLOG_INITIAL__ && window.__BUILD_BACKLOG_INITIAL__.items) || [];
      return src.map(function(it) {
        return {
          name:          it.name || '',
          contact:       '',
          lastAction:    it.addedAt || '',
          nextTouchBase: it.nextTouchBase || '',
          nextStep:      it.nextStep || '',
          myAction:      it.myAction || '',
          task:          '',
        };
      });
    } catch (e) { return []; }
  })(),
};

// ══════════════════════════════════════════════════════
// STATE
// ══════════════════════════════════════════════════════
let state = {
  // Initial filter is path-driven: /personal/ defaults to 'personal'
  // (broadened 2026-04-28 to include job + personal + untagged workstreams,
  // covers what was previously /search/'s 'job' filter), everywhere else
  // defaults to 'all'.
  filter: (location.pathname.indexOf('/personal') === 0) ? 'personal' : 'all',
                          // 'all' | 'fundraising' | 'tomac' | 'personal'
  cadence: 'daily',       // 'daily' | 'weekly'
  showArchived: false,
  statFocus: null,        // null | 'deals' | 'overdue' | 'todos' | 'recruiting' | 'lp'
  actionOnly: localStorage.getItem('cos_action_only') === '1',
  corrections:      JSON.parse(localStorage.getItem('cos_corrections')       || '[]'),
  todos:            JSON.parse(localStorage.getItem('cos_todos')             || '[]'),
  dismissedRel:     JSON.parse(localStorage.getItem('cos_dismissed_rel')    || '[]'),
  dismissedRecruit: JSON.parse(localStorage.getItem('cos_dismissed_recruit')|| '[]'),
  dismissedActions:  JSON.parse(localStorage.getItem('cos_dismissed_actions') || '[]'),
  immediateActions:  JSON.parse(localStorage.getItem('cos_immediate_actions') || '[]'),
  stageOverrides:   JSON.parse(localStorage.getItem('cos_stage_overrides')  || '{}'),
  collapsed:        JSON.parse(localStorage.getItem('cos_collapsed')         || '{}'),
  expanded:         JSON.parse(localStorage.getItem('cos_expanded')          || '{}'),
  tcTab:            localStorage.getItem('cos_tc_tab') || 'deal',  // 'deal' | 'fund' | 'portfolio'
  sortFollowUps:    localStorage.getItem('cos_sort_followups') || 'bucket',
  struckthroughActions:  JSON.parse(localStorage.getItem('cos_strikethru_actions')  || '{}'),
  struckthroughRel:      JSON.parse(localStorage.getItem('cos_strikethru_rel')      || '{}'),
  struckthroughRecruit:  JSON.parse(localStorage.getItem('cos_strikethru_recruit')  || '{}'),
  targetOrder:           JSON.parse(localStorage.getItem('cos_target_order')         || '{}'),
  targetSection:         JSON.parse(localStorage.getItem('cos_target_section')       || '{}'),
};

// Reflect path in document.title so the browser tab matches the route.
if (location.pathname.indexOf('/personal') === 0) document.title = 'YG · Personal';

// Hydrate server-persisted row ordering from /order/save (window.__ORDER_INITIAL__
// is injected server-side). Server is authoritative: a column present on the
// server overrides the local copy so reorders roam with the account.
(function hydrateServerOrder() {
  try {
    var srv = window.__ORDER_INITIAL__;
    if (srv && typeof srv === 'object') {
      state.targetOrder = Object.assign({}, state.targetOrder, srv);
    }
  } catch (e) {}
})();

function saveOrderToServer(sk) {
  try {
    var list = (state.targetOrder && state.targetOrder[sk]) || [];
    fetch('/order/save', {
      method: 'POST',
      headers: {'Content-Type':'application/json'},
      body: JSON.stringify({column: sk, order: list})
    }).catch(function(){});
  } catch (e) {}
}

// Move a named row up (dir=-1) or down (+1) within a sub-section, then persist
// both locally and server-side. Used by the mobile/keyboard arrow fallback on
// touch devices where HTML5 drag is unreliable.
function ptMove(sk, name, dir) {
  if (!state.targetOrder) state.targetOrder = {};
  var list = (state.targetOrder[sk] && state.targetOrder[sk].length > 0)
    ? [...state.targetOrder[sk]]
    : _ptCurrentOrder(sk);
  var idx = list.indexOf(name);
  if (idx < 0) { list.push(name); idx = list.length - 1; }
  var newIdx = idx + dir;
  if (newIdx < 0 || newIdx >= list.length) return;
  list.splice(idx, 1);
  list.splice(newIdx, 0, name);
  state.targetOrder[sk] = list;
  localStorage.setItem('cos_target_order', JSON.stringify(state.targetOrder));
  saveOrderToServer(sk);
  render();
}

// Compute the currently-rendered order of names in a sub-section by DOM walk;
// used as a seed when no explicit order has been saved yet.
function _ptCurrentOrder(sk) {
  var out = [];
  document.querySelectorAll('[data-pt-sk="' + sk + '"] [data-pt-name]').forEach(function(el){
    out.push(el.getAttribute('data-pt-name'));
  });
  return out;
}

// ══════════════════════════════════════════════════════
// UTILS
// ══════════════════════════════════════════════════════
const FC = (window.__FIRM_CONTEXT__ || {});
const PRINCIPAL_NAME = (FC.principal && FC.principal.name) || 'Principal';
const PRINCIPAL_FIRST = PRINCIPAL_NAME.split(' ')[0];
const FIRM_LABEL = (FC.workstream_categories && FC.workstream_categories.deal)
                || (FC.firm && (FC.firm.short_name || FC.firm.name))
                || 'Pipeline';
const TEAM_FIRST_NAMES = [PRINCIPAL_FIRST]
  .concat(((FC.team || []).map(t => (t && t.name || '').split(' ')[0]).filter(Boolean)));

function esc(s) {
  if (!s) return '';
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function dueClass(due) {
  if (!due) return 'due-later';
  if (due <= DATA.today) return 'due-today';
  const d = new Date(due), t = new Date(DATA.today);
  d.setHours(0); t.setHours(0);
  return (d - t) <= 3 * 86400000 ? 'due-soon' : 'due-later';
}

function dueLabel(due) {
  if (!due) return 'No date';
  if (due <= DATA.today) return 'Due today';
  return 'Due ' + due;
}

function wsMatch(item) {
  const f = state.filter;
  if (f === 'all') return true;
  if (f === 'tomac') return item.workstream === 'tomac';
  if (f === 'fundraising') return item.workstream === 'fundraising' || item.workstream === 'tomac';
  // 'personal' — Personal tab content (2026-04-28): job-search items, personal
  // action items, and anything untagged. Excludes tomac/fundraising/system.
  if (f === 'personal') return !item.workstream || item.workstream === 'personal' || item.workstream === 'job';
  return true;
}

function daysSince(dateStr) {
  if (!dateStr) return null;
  const last = new Date(dateStr);
  const now  = new Date(DATA.today);
  const d = Math.floor((now - last) / 86400000);
  return d >= 0 ? d : null;
}

function actionKey(f) {
  return (f.who + '|' + (f.due || '')).replace(/"/g, '');
}

// Tombstone filter — returns true if an item has been server-side deleted.
// Paired with window.__deleteItem calls in the dismiss* functions.
function __isDel(source, content) {
  return typeof window.__isDeleted === 'function' && window.__isDeleted(source, content);
}

// ══════════════════════════════════════════════════════
// RENDER
// ══════════════════════════════════════════════════════
function cleanStrikethroughs() {
  const today = DATA.today;
  let dirty = false;
  for (const [key, date] of Object.entries(state.struckthroughActions)) {
    if (date < today) { if (!state.dismissedActions.includes(key)) state.dismissedActions.push(key); delete state.struckthroughActions[key]; dirty = true; }
  }
  for (const [name, date] of Object.entries(state.struckthroughRel)) {
    if (date < today) { if (!state.dismissedRel.includes(name)) state.dismissedRel.push(name); delete state.struckthroughRel[name]; dirty = true; }
  }
  for (const [name, date] of Object.entries(state.struckthroughRecruit)) {
    if (date < today) { if (!state.dismissedRecruit.includes(name)) state.dismissedRecruit.push(name); delete state.struckthroughRecruit[name]; dirty = true; }
  }
  if (dirty) {
    localStorage.setItem('cos_strikethru_actions',  JSON.stringify(state.struckthroughActions));
    localStorage.setItem('cos_strikethru_rel',       JSON.stringify(state.struckthroughRel));
    localStorage.setItem('cos_strikethru_recruit',   JSON.stringify(state.struckthroughRecruit));
    localStorage.setItem('cos_dismissed_actions',    JSON.stringify(state.dismissedActions));
    localStorage.setItem('cos_dismissed_rel',        JSON.stringify(state.dismissedRel));
    localStorage.setItem('cos_dismissed_recruit',    JSON.stringify(state.dismissedRecruit));
  }
}

function render() {
  cleanStrikethroughs();
  const calls = DATA.upcomingCalls.filter(wsMatch);
  const fus   = DATA.followUps.filter(f => !(f.what || '').startsWith('[RESOLVED]') && wsMatch(f));
  const f = state.filter;
  const isPersonal    = location.pathname.indexOf('/personal') === 0;
  const isTCPipeline  = location.pathname.indexOf('/tomac-cove') === 0;
  const tomac = (f === 'personal' || isPersonal) ? [] : DATA.tomac;
  // On Personal tab panels (Job Search + Personal + TC Cove) render before Topics.
  // Panels are injected directly in the root HTML, not via buildDailyLayout,
  // so pass showRec=false to avoid double-rendering them inside the body.
  const showRec = false;

  // TC Pipeline tab gets its own full-page layout
  if (isTCPipeline) {
    document.getElementById('root').innerHTML = `
      <div class="accent-bar"></div>
      ${buildHeader()}
      ${buildStatsBar()}
      ${state.statFocus ? buildFocusBanner() : buildCadenceBar()}
      ${buildFilterBar()}
      ${buildTCPipelineLayout()}
      <div class="updated">Auto-generated · ${esc(DATA.generatedAt)} · Sources: Deal Pipeline · Drive</div>
    `;
    applyActionOnly();
    return;
  }

  let body;
  if (state.statFocus) {
    body = buildFocusedLayout(state.statFocus, calls, fus, tomac, showRec);
  } else if (state.cadence === '48h') {
    const cutoff = (() => { const d = new Date(DATA.today); d.setDate(d.getDate() - 1); return d.toISOString().slice(0,10); })();
    const recentFus = fus.filter(f => f.addedDate && f.addedDate >= cutoff);
    const recentCalls = calls.filter(c => c.addedDate && c.addedDate >= cutoff || !c.addedDate);
    body = buildDailyLayout(recentCalls, recentFus, tomac, showRec);
  } else {
    body = buildDailyLayout(calls, fus, tomac, showRec);
  }

  // Personal tab: Priority Panels (Job Search + Personal) render BEFORE the
  // Topics watchlist so they appear at top of page. Topics then separates the
  // panels from Awaiting/Todos below.
  const personalPanels = isPersonal
    ? `<div class="priority-panels">${buildJobSearchPanel()}${buildPersonalPanel()}${buildTomacPanel()}</div>`
    : '';

  document.getElementById('root').innerHTML = `
    <div class="accent-bar"></div>
    ${buildHeader()}
    ${buildStatsBar()}
    ${state.statFocus ? buildFocusBanner() : buildCadenceBar()}
    ${buildFilterBar()}
    ${personalPanels}
    ${buildTopicsPanel()}
    ${body}
    ${state.statFocus ? '' : buildCorrections()}
    <div class="updated">Auto-generated · ${esc(DATA.generatedAt)} · Sources: Gmail · Calendar · Drive · <span class="kbd">a</span>all <span class="kbd">j</span>jobs <span class="kbd">t</span>tomac <span class="kbd">Esc</span>clear</div>
  `;
  applyActionOnly();
}

// Hide rows that aren't flagged as actions when the "Actions only" toggle is on.
// An "action" row is one containing a descendant with class .itl-action-badge,
// .pt-badge-action, or a hand-rolled data-action="1" marker.
function applyActionOnly() {
  if (!state.actionOnly) return;
  const isActionRow = el => !!el.querySelector('.itl-action-badge,.pt-badge-action,[data-action="1"]');
  // Candidate row selectors across the cos-dashboard layout
  const rowSel = '.flash-row, .fu-row, .rel-row, .pt-row, .itl-row, .todo-row, .call-row';
  document.querySelectorAll(rowSel).forEach(row => {
    if (!isActionRow(row)) row.style.display = 'none';
  });
  // After hiding rows, hide any card whose body is now empty of visible rows.
  document.querySelectorAll('.card, .tc-card').forEach(card => {
    const rows = card.querySelectorAll(rowSel);
    if (rows.length && Array.from(rows).every(r => r.style.display === 'none')) {
      card.style.display = 'none';
    }
  });
}

// ── Synopsis: Morning Briefing card ──────────────────────────────────────
function buildBriefingSynopsis() {
  const s = DATA.briefingSynopsis;
  if (!s || !s.bullets || s.bullets.length === 0) return '';
  const bullets = s.bullets.map(b => `
    <div class="syn-bullet">
      <span class="syn-dot">›</span>
      <span>${esc(b)}</span>
    </div>`).join('');
  const sid = 'brief-synopsis';
  const sc  = state.collapsed[sid];
  // Footer pointers — themes / origination drill-down lives on /deals/, deal
  // portfolio detail on /tomac-cove/. Briefing tab is the morning catch-up.
  const footerLinks = `
    <div style="margin-top:12px;padding-top:10px;border-top:1px solid rgba(148,163,184,0.12);display:flex;gap:14px;align-items:center;flex-wrap:wrap;font-size:11px">
      <a href="/briefing/" style="color:#c9973a;text-decoration:none;font-weight:600">Read full briefing →</a>
      <span style="color:#cbd5e1">·</span>
      <a href="/deals/" style="color:#22c55e;text-decoration:none;font-weight:600">Themes &amp; origination →</a>
      <span style="color:#cbd5e1">·</span>
      <a href="/tomac-cove/" style="color:#0f1e38;text-decoration:none;font-weight:600">Deal portfolio →</a>
    </div>`;
  return `
