}

// Stat-card focus → render the single section the user clicked into.
// Stat keys here must match STAT_META keys above. Fundraising stat focuses
// on the deal section with state.tcTab='fund' (set by clickStat); the
// section's tab strip then surfaces fundraising content. (2026-04-28)
// ══════════════════════════════════════════════════════
// TC PIPELINE LAYOUT  (/tomac-cove/)
// ══════════════════════════════════════════════════════
// Three sections rendered in order:
//   1. Live Deals — mini-card tiles from DATA.dealPortfolio.deals
//   2. Dealflow Details — transcript-derived next-step prose from DATA.tomac
//   3. Originating Deals — TOMAC_CONFIG.dealOrigination rows
// Clicking a Live Deal tile scrolls to and flashes the matching
// Dealflow Details row. Matching is by normalised name substring.
function buildTCPipelineLayout() {
  const tc    = TOMAC_CONFIG;
  const today = DATA.today;
  const { urgencyLabel } = _ptHelpers(today);
  const dp    = DATA.dealPortfolio || {};
  const ORIGINATION_ONLY = [];
  const deals = ((dp.deals) || []).filter(d =>
    !ORIGINATION_ONLY.some(n => (d.name||'').toLowerCase().includes(n))
  );
  const tomac = Array.isArray(DATA.tomac) ? DATA.tomac : [];

  // Stats header
  const tcipGpMid = d => {
    const p = d.tcip_profit || {};
    return ((p.fee_income&&p.fee_income.mid)||0) + ((p.carry_income&&p.carry_income.mid)||0) + ((p.upside&&p.upside.mid)||0);
  };
  let capitalInPlay = 0, midProfit = 0, criticalCount = 0;
  deals.forEach(d => {
    capitalInPlay += (d.capital_summary && d.capital_summary.immediate_high) || 0;
    midProfit += tcipGpMid(d);
    criticalCount += (d.actions||[]).filter(a => a.priority === 'Critical' && a.status === 'Open').length;
  });
  const fmtM = n => '$' + (n / 1e6).toFixed(0) + 'M';

  // Stage badge class
  function stageClass(stage, stageIndex) {
    const idx = typeof stageIndex === 'number' ? stageIndex : null;
    if (idx !== null) {
      if (idx <= 1) return 'tc-mini-stage--slate';
      if (idx <= 3) return 'tc-mini-stage--navy';
      return 'tc-mini-stage--gold';
    }
    const s = (stage||'').toLowerCase();
    if (s.includes('sourc')||s.includes('watch')) return 'tc-mini-stage--slate';
    if (s.includes('dilig')||s.includes('advis')) return 'tc-mini-stage--navy';
    return 'tc-mini-stage--gold';
  }

  function daysSince(dateStr) {
    if (!dateStr) return null;
    try { return Math.round((new Date(today)-new Date(dateStr))/86400000); } catch(e) { return null; }
  }

  // Normalise name for matching tiles → detail rows
  const _norm = s => (s||'').toLowerCase().replace(/[^a-z0-9]/g,'');

  // Mini card: clicking scrolls to matching detail row on this page
  function miniCardTC(d) {
    const h      = d.health || 0;
    const hClass = h >= 85 ? 'tc-fill--green' : h >= 70 ? '' : h >= 55 ? 'tc-fill--amber' : 'tc-fill--red';
    const cs     = d.capital_summary || {};
    const amount = cs.immediate_amount || '';
    const timing = cs.immediate_timing || '';
    const ds     = daysSince(d.last_activity);
    const staleCls  = (ds !== null && ds > 10) ? ' is-stale' : '';
    const stageCls  = stageClass(d.stage, d.stage_index);
    const { label: urgLbl } = urgencyLabel(d.next_milestone_due);
    const nextLabel = d.next_milestone ? esc(d.next_milestone) : '';
    const nextSuffix = urgLbl ? ` <span style="color:var(--ink-faint);font-size:10px">· ${esc(urgLbl)}</span>` : '';
    const slug = _norm(d.name);
    return `
    <div class="tc-mini-card" style="cursor:pointer" onclick="scrollToTCDeal('${slug}')" title="Click to highlight deal details">
      <div class="tc-mini-card-head">
        <div>
          <div class="tc-mini-name">${esc(d.name)}</div>
          ${d.sector ? `<div class="tc-mini-sector">${esc(d.sector)}${d.geography ? ' · '+esc(d.geography) : ''}</div>` : ''}
        </div>
        <span class="tc-mini-stage ${stageCls}">${esc(d.stage||'')}</span>
      </div>
      ${amount ? `
      <div class="tc-mini-strip-capital">
        <span class="tc-mini-cap-label">CAPITAL</span>
        <span class="tc-mini-cap-value">${esc(amount)}</span>
        ${timing ? `<span class="tc-mini-cap-timing">${esc(timing)}</span>` : ''}
      </div>` : ''}
      <div class="tc-mini-health-row">
        <div class="tc-track"><div class="tc-fill ${hClass}" style="width:${h}%"></div></div>
        <span class="tc-score">${h}</span>
        <span class="tc-owner">${esc(d.owner||'—')}</span>
        <span class="tc-days${staleCls}">${ds !== null ? ds+'d' : '—'}</span>
      </div>
      ${nextLabel ? `<div class="tc-mini-next">${nextLabel}${nextSuffix}</div>` : ''}
    </div>`;
  }

  // Dealflow detail rows (from DATA.tomac) with stable IDs for scroll targeting
  const _normName = s => (s||'').toLowerCase().replace(/[^a-z0-9]/g,'');
  const portfolioDeals = (dp.deals)||[];
  const portfolioByName = {};
  portfolioDeals.forEach(p => {
    const n = _normName(p.name); if (n) portfolioByName[n] = p;
    const t = _normName(p.ticker||''); if (t) portfolioByName[t] = p;
  });
  const _findPortfolio = d => {
    const n = _normName(d.name);
    if (n && portfolioByName[n]) return portfolioByName[n];
    for (const k in portfolioByName) {
      if (k && n && (k.indexOf(n) >= 0 || n.indexOf(k) >= 0)) return portfolioByName[k];
    }
    return null;
  };

  const detailRows = tomac.map((d, i) => {
    const stCls = {Sourcing:'sourcing',Diligence:'diligence','IC Memo':'memo',Closed:'pass',Pass:'pass'}[d.stage]||'sourcing';
    const lu = d.latestUpdate;
    const freshBadge = d.freshSignal
      ? `<span style="padding:1px 6px;margin-left:6px;font-size:0.62rem;background:#2e7d32;color:#fff;border-radius:3px;font-weight:600">FRESH</span>` : '';
    const latestStrip = lu && lu.text
      ? `<div class="deal-latest" style="font-size:0.72rem;color:var(--ink-mid);margin-top:2px;padding-left:4px;border-left:2px solid #2e7d32"><span style="color:#2e7d32;font-weight:600">Latest${lu.date?' ('+esc(lu.date)+')':''}:</span> ${esc(lu.text)}</div>` : '';
    const portfolio   = _findPortfolio(d);
    const partnerLine = portfolio && portfolio.potential_partner
      ? `<div style="font-size:0.72rem;color:var(--ink-mid);margin-top:3px"><span style="color:var(--ink-faint);font-family:var(--font-data);text-transform:uppercase;letter-spacing:0.06em;font-size:0.62rem">Partner</span> <span style="font-weight:600">${esc(portfolio.potential_partner)}</span></div>` : '';
    const deckLink  = (portfolio && portfolio.deck_url)
      ? `<a href="${esc(portfolio.deck_url)}" target="_blank" rel="noreferrer" onclick="event.stopPropagation()" style="color:var(--navy);text-decoration:none;font-family:var(--font-data);font-size:0.66rem">📄 Deck</a>`
      : `<span style="color:var(--ink-ghost);font-family:var(--font-data);font-size:0.66rem">📄 Deck</span>`;
    const modelLink = (portfolio && portfolio.model_url)
      ? `<a href="${esc(portfolio.model_url)}" target="_blank" rel="noreferrer" onclick="event.stopPropagation()" style="color:var(--navy);text-decoration:none;font-family:var(--font-data);font-size:0.66rem">📊 Model</a>`
      : `<span style="color:var(--ink-ghost);font-family:var(--font-data);font-size:0.66rem">📊 Model</span>`;
    const slug = _normName(d.name);
    return `
    <div class="deal-row" id="tcflow-${slug}" onclick="showDeal(${i})">
      <div class="deal-status s-${stCls}">${esc(d.stage)}</div>
      <div class="deal-info" style="flex:1">
        <div class="dname">${esc(d.name)}${freshBadge}</div>
        <div class="dmeta">${esc(d.sector)} · ${esc(d.size)}</div>
        <div class="deal-next">${esc(d.nextStep)}</div>
        ${latestStrip}${partnerLine}
        <div class="deal-docs" style="display:flex;gap:14px;margin-top:5px">${deckLink}${modelLink}</div>
      </div>
      <div class="deal-arrow">›</div>
    </div>`;
  }).join('');

  // Origination rows
  const origItems = (tc.dealOrigination||[]).filter(t => {
    const k = 'tc_origination|'+(t.name||'');
    return !state.dismissedRecruit.includes(k) && !__isDel('recruit', k);
  });
  function origRow(t) {
    const rowKey = 'tc_origination|'+t.name;
    const { label: urgLbl, cls: urgCls } = urgencyLabel(t.nextTouchBase);
    const pillCls = urgCls === 'overdue' ? 'tc-pill--red' : urgCls === 'soon' ? 'tc-pill--amber' : 'tc-pill--slate';
    return `
    <div class="tc-orig-row" onclick="showPriorityTarget('${esc(rowKey)}')">
      <div>
        <div class="tc-orig-name">${esc(t.name)}${t.contact ? ` <span class="tc-orig-sub">${esc(t.contact)}</span>` : ''}</div>
        ${t.takeaway ? `<div class="tc-orig-sub">${esc(t.takeaway)}</div>` : ''}
        ${t.nextStep ? `<div class="tc-orig-next">→ ${esc(t.nextStep)}</div>` : ''}
      </div>
      <div style="text-align:right">
        ${urgLbl ? `<span class="tc-pill ${pillCls}">${esc(urgLbl)}</span>` : ''}
        ${t.owner ? `<div style="font-family:var(--font-data);font-size:9px;letter-spacing:0.14em;color:var(--ink-faint);margin-top:4px;text-transform:uppercase">${esc(t.owner)}</div>` : ''}
      </div>
    </div>`;
  }

  return `
  <div style="max-width:1100px;margin:0 auto;padding:0 12px 40px">
    <div class="tc-mini-header" style="margin-bottom:18px">
      <div class="tc-mini-header-line">
        <span class="tc-mh-num">${deals.length}</span> live deals
        <span class="tc-mh-sep">·</span>
        <span class="tc-mh-num">${fmtM(capitalInPlay)}</span> capital in play
        <span class="tc-mh-sep">·</span>
        <span class="tc-mh-num">${fmtM(midProfit)}</span> GP profit (fees+carry)
        ${criticalCount > 0 ? `<span class="tc-mh-sep">·</span><span class="tc-mh-crit">${criticalCount} critical</span>` : ''}
      </div>
    </div>

    <div class="card" style="margin-bottom:18px">
      <div class="card-title"><div class="dot" style="background:#0ea5e9"></div>Live Deals
        <span class="card-count">${deals.length}</span>
        <span style="margin-left:auto;font-size:10px;color:#94a3b8">Click tile to jump to details</span>
      </div>
      <div class="tc-mini-grid" style="display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:10px;padding:8px 0">
        ${deals.length > 0 ? deals.map(miniCardTC).join('') : '<div class="no-items">No live deals.</div>'}
      </div>
    </div>

    <div class="card" style="margin-bottom:18px">
      <div class="card-title"><div class="dot" style="background:#2563eb"></div>Dealflow Details
        <span class="card-count">${tomac.length}</span>
      </div>
      ${tomac.length > 0 ? detailRows : '<div class="no-items">No deal data available.</div>'}
    </div>

    <div class="card" style="margin-bottom:18px">
      <div class="card-title"><div class="dot" style="background:#16a34a"></div>Originating Deals
        <span class="card-count">${origItems.length}</span>
      </div>
      ${origItems.length > 0 ? origItems.map(origRow).join('') : '<div class="no-items">No origination items.</div>'}
    </div>
  </div>`;
}

// Scroll to and flash a Dealflow Details row matching the given name slug.
function scrollToTCDeal(slug) {
  const el = document.getElementById('tcflow-' + slug);
  if (!el) {
    // Try substring match: find first row whose id contains slug or vice versa
    const all = document.querySelectorAll('[id^="tcflow-"]');
    let best = null;
    for (const row of all) {
      const rowSlug = row.id.replace('tcflow-', '');
      if (rowSlug.includes(slug) || slug.includes(rowSlug)) { best = row; break; }
    }
    if (!best) return;
    _flashTCRow(best);
  } else {
    _flashTCRow(el);
  }
}
function _flashTCRow(el) {
  el.scrollIntoView({ behavior: 'smooth', block: 'center' });
  el.style.transition = 'background 0.2s';
  el.style.background = 'rgba(14,165,233,0.18)';
  setTimeout(() => { el.style.background = ''; }, 1800);
}

function buildFocusedLayout(focus, calls, fus, tomac, showRec) {
  const tomacAll = (Array.isArray(DATA.tomac) ? DATA.tomac : []);
  switch (focus) {
    case 'deals':
      return tomac.length > 0
        ? `<div id="section-tomac">${buildTomacSection(tomac)}</div>`
        : '<div class="card" style="margin-bottom:18px"><div class="no-items">No active deals in current filter.</div></div>';
    case 'fundraising':
      return tomacAll.length > 0
        ? `<div id="section-tomac">${buildTomacSection(tomacAll)}</div>`
        : '<div class="card" style="margin-bottom:18px"><div class="no-items">No fundraising data available.</div></div>';
    case 'awaiting':
      return `<div id="section-awaiting">${buildAwaitingExternal('tc-only')}</div>`;
    case 'todos':
      return `<div id="section-todos">${buildTodos('tomac')}</div>`;
    case 'recruiting':
      return `<div id="section-recruiting">${buildPriorityTargets()}</div>`;
    default:
      return '';
  }
}

// Trigger deal system compile via the dashboard server (non-blocking, ~5s)
function compileDealSystem() {
  const btn = event && event.target;
  if (btn) { btn.textContent = '…'; btn.disabled = true; }
  fetch('/compile-deals', { method: 'POST' })
    .then(r => r.json())
    .then(d => {
      if (btn) { btn.textContent = '↻'; btn.disabled = false; }
      if (d.status === 'already_running') {
        console.log('[compile-deals] already running');
      } else {
        // Server will push SSE refresh when done; nothing else needed here
        console.log('[compile-deals] started');
      }
    })
    .catch(e => {
      if (btn) { btn.textContent = '↻'; btn.disabled = false; }
      console.error('[compile-deals] error:', e);
    });
}

function dismissAction(key, srvKey) {
  if (!state.dismissedActions.includes(key)) {
    state.dismissedActions.push(key);
    localStorage.setItem('cos_dismissed_actions', JSON.stringify(state.dismissedActions));
  }
  // Also remove from immediate if it was promoted
  state.immediateActions = state.immediateActions.filter(k => k !== key);
  localStorage.setItem('cos_immediate_actions', JSON.stringify(state.immediateActions));
  // Persist server-side so dismissal survives browser/localStorage clear
  if (srvKey) {
    fetch('/data', {
      method: 'PATCH',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({_hiddenItems: {add: [srvKey]}})
    }).catch(() => {});
  }
  // Tombstone — survives the next upstream sync that rewrites dashboard-data.json.
  if (typeof window.__deleteItem === 'function') {
    window.__deleteItem('followup', key, key);
  }
  render();
}

function queueCorrection() {
  const input = document.getElementById('correction-input');
  const text = input ? input.value.trim() : '';
  if (!text) return;
  const entry = { date: DATA.today, text };
  // POST to server (persists to corrections-queue.json for pickup by 7:29am pipeline)
  fetch(''+window.location.origin+'/queue-correction', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify(entry),
  }).then(r => r.json()).then(d => {
    if (!d.ok) console.warn('queue-correction failed:', d.error);
  }).catch(e => console.warn('queue-correction unreachable:', e));
  // Also update local display immediately
  state.corrections.push(entry);
  localStorage.setItem('cos_corrections', JSON.stringify(state.corrections));
  if (input) input.value = '';
  render();
}

var _ptDrag = { sk: null, name: null };

function ptDragStart(e, sk, name) {
  _ptDrag.sk = sk; _ptDrag.name = name;
  e.currentTarget.classList.add('dragging');
  e.dataTransfer.effectAllowed = 'move';
}

function ptDragEnd(e) {
  e.currentTarget.classList.remove('dragging');
  document.querySelectorAll('.pt-row.drag-over').forEach(el => el.classList.remove('drag-over'));
}

function ptDragOver(e) {
  e.preventDefault();
  e.dataTransfer.dropEffect = 'move';
  document.querySelectorAll('.pt-row.drag-over').forEach(el => el.classList.remove('drag-over'));
  e.currentTarget.classList.add('drag-over');
}

function ptDrop(e, sk, targetName) {
  e.preventDefault();
  e.currentTarget.classList.remove('drag-over');
  if (!_ptDrag.name || _ptDrag.name === targetName) return;
  const dragSk = _ptDrag.sk;
  const dragName = _ptDrag.name;
  _ptDrag.sk = null; _ptDrag.name = null;

  if (!state.targetOrder) state.targetOrder = {};
  if (!state.targetSection) state.targetSection = {};

  // Only allow cross-section moves within the same group. Job Search
  // (disc/wait/chase) is a single group; Personal (personal_items/claude_code)
  // is another. Reject mismatched cross-group drops silently.
  const GROUPS = {
    disc:'job', wait:'job', chase:'job',
    personal_items:'personal', claude_code:'personal'
  };
  if (dragSk !== sk && GROUPS[dragSk] !== GROUPS[sk]) return;

  // Cross-section within same group: record new section assignment, remove from source order
  if (dragSk !== sk) {
    state.targetSection[dragName] = sk;
    localStorage.setItem('cos_target_section', JSON.stringify(state.targetSection));
    if (state.targetOrder[dragSk]) {
      state.targetOrder[dragSk] = state.targetOrder[dragSk].filter(n => n !== dragName);
    }
  }

  // Insert dragName before targetName in target section's order
  const existing = (state.targetOrder[sk] && state.targetOrder[sk].length > 0)
    ? [...state.targetOrder[sk]]
    : [];
  const filtered = existing.filter(n => n !== dragName);
  const toIdx = filtered.indexOf(targetName);
  if (toIdx >= 0) {
    filtered.splice(toIdx, 0, dragName);
  } else {
    filtered.push(dragName);
  }
  state.targetOrder[sk] = filtered;
  localStorage.setItem('cos_target_order', JSON.stringify(state.targetOrder));
  saveOrderToServer(sk);
  if (dragSk !== sk) saveOrderToServer(dragSk);
  render();
}

function queueModalNote(entityName) {
  const input = document.getElementById('modal-note-input');
  const text = input ? input.value.trim() : '';
  if (!text) return;
  const entry = { date: DATA.today, text: '[Note: ' + entityName + '] ' + text };
  fetch(''+window.location.origin+'/queue-correction', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify(entry),
  }).then(r => r.json()).then(d => {
    if (!d.ok) console.warn('queue-correction failed:', d.error);
  }).catch(e => console.warn('queue-correction unreachable:', e));
  state.corrections.push(entry);
  localStorage.setItem('cos_corrections', JSON.stringify(state.corrections));
  if (input) { input.value = ''; input.placeholder = 'Saved ✓'; }
  const btn = input && input.nextElementSibling;
  if (btn) { btn.textContent = 'Saved'; btn.disabled = true; }
}

function clearCorrections() {
  state.corrections = [];
  localStorage.removeItem('cos_corrections');
  render();
}

function processQueueNow(btn) {
  const status = document.getElementById('queue-status');
  if (btn) { btn.disabled = true; btn.textContent = 'Starting…'; }
  if (status) status.textContent = 'Firing inbox-capture…';
  fetch(window.location.origin + '/run-pipeline', { method: 'POST', credentials: 'include' })
    .then(r => r.json().then(d => ({ ok: r.ok, code: r.status, d })))
    .then(({ ok, code, d }) => {
      if (code === 202 || d.status === 'started') {
        if (status) status.textContent = 'Pipeline running — page will refresh when done.';
        if (btn) btn.textContent = 'Running…';
        pollPipelineStatus(btn, status);
      } else if (code === 409 || d.status === 'already_running') {
        if (status) status.textContent = 'Pipeline already running — polling…';
        if (btn) btn.textContent = 'Running…';
        pollPipelineStatus(btn, status);
      } else {
        if (status) status.textContent = 'Error: ' + (d.error || ('HTTP ' + code));
        if (btn) { btn.disabled = false; btn.textContent = 'Process queue now'; }
      }
    })
    .catch(e => {
      if (status) status.textContent = 'Unreachable: ' + e.message;
      if (btn) { btn.disabled = false; btn.textContent = 'Process queue now'; }
    });
}

function pollPipelineStatus(btn, status) {
  let tries = 0;
  const iv = setInterval(() => {
    tries++;
    fetch(window.location.origin + '/pipeline-status', { credentials: 'include' })
      .then(r => r.json())
      .then(s => {
        if (!s.running) {
          clearInterval(iv);
          if (status) status.textContent = 'Done. Refreshing…';
          if (btn) btn.textContent = 'Done';
          setTimeout(() => window.location.reload(), 1200);
        }
      })
      .catch(() => {});
    if (tries > 180) { clearInterval(iv); if (status) status.textContent = 'Timed out polling — refresh manually.'; }
  }, 4000);
}

function downloadState() {
  const payload = {
    lastUpdated: DATA.today,
    resolvedFollowUps: [],
    stageChanges: [],
    newFollowUps: [],
    notes: [],
    corrections: state.corrections.map(c => ({ date: c.date, text: c.text }))
  };
  const blob = new Blob([JSON.stringify(payload, null, 2)], { type: 'application/json' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'dashboard-state.json';
  a.click();
}

// ══════════════════════════════════════════════════════
// INIT
// ══════════════════════════════════════════════════════
document.addEventListener('DOMContentLoaded', () => {
  render();

  // ── Keyboard shortcuts ──────────────────────────────
  document.addEventListener('keydown', e => {
    // Ignore when typing in inputs/textareas
    if (['INPUT', 'TEXTAREA'].includes(e.target.tagName)) return;
    if (e.metaKey || e.ctrlKey || e.altKey) return;

    switch (e.key) {
      case 'a': setFilter('all');         break;
      case 'f': setFilter('fundraising'); break;
      case 't': setFilter('tomac');       break;
      case 'p': window.location.href = '/personal/'; break;
      case 'j': window.location.href = '/personal/'; break;
      case '1': clickStat('deals');       break;
      case '2': clickStat('fundraising'); break;
      case '3': clickStat('awaiting');    break;
      case '4': clickStat('todos');       break;
      case '5': clickStat('recruiting');  break;
      case 'Escape':
        state.statFocus = null;
        state.filter    = 'all';
        render();
        break;
    }
  });
});
