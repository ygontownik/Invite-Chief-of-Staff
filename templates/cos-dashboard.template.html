  <div class="card synopsis-card" style="margin-bottom:18px;border-left:3px solid #c9973a">
    <div class="card-title card-title-btn" onclick="collapseToggle('${sid}')">
      <div class="dot" style="background:#c9973a;box-shadow:0 0 8px rgba(201,151,58,0.4)"></div>
      ${esc(s.label || 'Morning Briefing')}
      <span class="card-count">${esc(s.date || DATA.today)}</span>
      <span class="collapse-chevron ${sc ? 'closed' : 'open'}" style="margin-left:auto;font-size:11px;color:#475569">${sc ? '▸' : '▾'}</span>
    </div>
    ${sc ? '' : `<div class="syn-bullets">${bullets}</div>${footerLinks}`}
  </div>`;
}

// ── Daily layout: executive ledger of state ──────────────────────────────
// Tab-aware layout (2026-04-28 restructure):
//
//   Status (/)      → 3-col top row (TC Overview + Fundraising + Team Actions)
//                     + Awaiting External (TC Cove only)
//                     + Today's To-Do (deal workstream only)
//   Personal (/personal/) → Priority Panels rendered ABOVE Topics in render()
//                           + Awaiting External (Recruiting then TC Cove)
//                           + Today's To-Do (personal/job workstreams)
//
// `calls` and `fus` params kept for buildFocusedLayout compatibility.
function buildDailyLayout(calls, fus, tomac, showRec) {
  const f = state.filter;
  const isPersonal = location.pathname.indexOf('/personal') === 0;

  // Status: 3-col top row replaces the old Dealflow/Fundraising/Portfolio sub-tab card.
  const showStatusTop = !isPersonal && !state.statFocus;

  // Awaiting External: TC-only on Status, Recruiting+TC on Personal.
  const showAwait = true;
  const awaitFilter = isPersonal ? 'job-tc' : 'tc-only';

  // Todos: deal workstream only on Status; natural personal/job filter on Personal.
  const showTodos = true;
  const todosForceWs = isPersonal ? null : 'tomac';

  return `
    ${buildBriefingSynopsis()}
    ${showStatusTop ? `<div id="section-status-top">${buildStatusTopRow()}</div>` : ''}
    ${showStatusTop ? `<div id="section-costs">${renderCostsTile(window.DATA && window.DATA.costs)}</div>` : ''}
    ${showAwait ? `<div id="section-awaiting">${buildAwaitingExternal(awaitFilter)}</div>` : ''}
    ${showTodos ? `<div id="section-todos">${buildTodos(todosForceWs)}</div>` : ''}
    ${showRec   ? `<div id="section-recruiting">${buildPriorityTargets()}</div>` : ''}
  `;
}

// ── Weekly layout: strategic review ──────────────────────────────────────
// ── Costs / Quota tile (Track G) ─────────────────────────────────────────
// Source: DATA.costs (built by costs_aggregator.format_for_tile).
// Shape: { summary, totalUsd, lookbackDays, topModels:[[name,usd],...],
//          topPasses, topRoutines, dailyChart:[{date,usd}], filesSeen, linesRead }
function renderCostsTile(costs) {
  if (!costs || typeof costs !== 'object') {
    return ''; // tile is opt-in; render nothing if data absent
  }
  const total   = (costs.totalUsd || 0).toFixed(2);
  const lookback= costs.lookbackDays || 30;
  const lines   = costs.linesRead   || 0;
  const files   = costs.filesSeen   || 0;

  const fmtRow = (pair) => {
    const name = esc(String(pair[0]));
    const usd  = Number(pair[1] || 0).toFixed(2);
    return `<tr><td style="padding:2px 8px 2px 0;color:#334155">${name}</td>
            <td style="padding:2px 0;text-align:right;font-variant-numeric:tabular-nums;color:#0f1e38">$${usd}</td></tr>`;
  };
  const tbl = (rows) => rows.length
    ? `<table style="width:100%;border-collapse:collapse;font-size:11px">${rows.map(fmtRow).join('')}</table>`
    : `<div style="color:#94a3b8;font-size:11px">no data</div>`;

  // Sparkline: inline SVG, no JS deps. Light cream background.
  const daily = Array.isArray(costs.dailyChart) ? costs.dailyChart : [];
  const max   = daily.reduce((m,d) => Math.max(m, d.usd||0), 0) || 1;
  const w = 120, h = 24;
  const pts = daily.map((d,i) => {
    const x = daily.length > 1 ? (i / (daily.length - 1)) * w : 0;
    const y = h - ((d.usd || 0) / max) * h;
    return `${x.toFixed(1)},${y.toFixed(1)}`;
  }).join(' ');
  const spark = daily.length
    ? `<svg width="${w}" height="${h}" style="display:block">
         <polyline fill="none" stroke="#0f1e38" stroke-width="1.2" points="${pts}"/>
       </svg>`
    : '';

  return `
  <div class="tc-card tile" id="costs-tile" style="margin:0 0 18px;padding:14px 16px;background:var(--paper, #fdfaf3)">
    <div style="display:flex;align-items:baseline;justify-content:space-between;margin-bottom:8px">
      <div style="font-size:10px;font-weight:700;letter-spacing:0.12em;text-transform:uppercase;color:#64748b;font-family:var(--font-data, monospace)">Anthropic Spend — Last ${lookback}d</div>
      <div style="font-size:18px;font-weight:600;color:#0f1e38;font-variant-numeric:tabular-nums">$${total}</div>
    </div>

// Pipeline freshness chip — visible at-a-glance trust signal.
// Reads pipelineStatus.lastFullRunAt + pipelineStatus.lastMiniRunAt and the
// length of routingExceptions to gauge whether the data is current and clean.
//   Green  → last full run < 6h ago AND <= 15 routing exceptions
//   Amber  → last full run 6-24h ago, OR 16-30 exceptions
//   Red    → last full run > 24h ago, OR > 30 exceptions, OR no run on record
// Click the chip → /admin/#tab-status (Dashboard Status tab) for detail.
function buildFreshnessChip() {
  const ps = DATA.pipelineStatus || {};
  const ageHours = (iso) => {
    if (!iso) return null;
    try {
      const t = new Date(iso).getTime();
      if (!isFinite(t)) return null;
      return (Date.now() - t) / 3600000;
    } catch { return null; }
  };
  const fullAge  = ageHours(ps.lastFullRunAt);
  const miniAge  = ageHours(ps.lastMiniRunAt);
  // lastFetchAt is written by cos-dashboard-fetch.py on every Pull Fresh Data / warmup.
  // It reflects when the Google Docs were last read — independent of the heavier Gmail pipeline.
  const fetchAge = ageHours(ps.lastFetchAt);
  const ages     = [fullAge, miniAge, fetchAge].filter(a => a != null);
  const lastAge  = ages.length ? Math.min(...ages) : null;
  const exc = Array.isArray(DATA.routingExceptions) ? DATA.routingExceptions.length : 0;

  let level, msg;
  if (lastAge == null)        { level = 'red';   msg = 'No pipeline run on record'; }
  else if (lastAge > 24)      { level = 'red';   msg = `Stale ${lastAge.toFixed(0)}h — pipeline may be failing`; }
  else if (exc > 30)          { level = 'red';   msg = `${exc} routing exceptions — extractor needs attention`; }
  else if (lastAge > 6)       { level = 'amber'; msg = `Last sync ${lastAge.toFixed(0)}h ago`; }
  else if (exc > 15)          { level = 'amber'; msg = `${exc} routing exceptions`; }
  else                        { level = 'green'; msg = lastAge < 1 ? 'Fresh — synced just now' : `Fresh — synced ${lastAge.toFixed(1)}h ago`; }

  const colors = {
    green: { bg: 'rgba(34,197,94,0.10)',  fg: '#15803d', border: 'rgba(34,197,94,0.35)', dot: '#22c55e' },
    amber: { bg: 'rgba(245,158,11,0.10)', fg: '#b45309', border: 'rgba(245,158,11,0.40)', dot: '#f59e0b' },
    red:   { bg: 'rgba(220,38,38,0.10)',  fg: '#b91c1c', border: 'rgba(220,38,38,0.40)', dot: '#dc2626' },
  }[level];

  return `<a href="/admin/" title="Pipeline health — click for Dashboard Status detail"
    style="display:inline-flex;align-items:center;gap:6px;padding:4px 10px;border-radius:999px;background:${colors.bg};color:${colors.fg};border:1px solid ${colors.border};font-size:11px;font-weight:600;letter-spacing:0.04em;text-decoration:none;font-family:var(--font-data);text-transform:uppercase">
    <span style="display:inline-block;width:7px;height:7px;border-radius:50%;background:${colors.dot};box-shadow:0 0 6px ${colors.dot}80"></span>
    ${esc(msg)}
  </a>`;
}

// ══════════════════════════════════════════════════════
// AWAITING EXTERNAL — commitments others owe us
// ══════════════════════════════════════════════════════
// Envelope-writer items with content_type=awaiting_external land in
// DATA.awaitingExternal. Schema: {id, counterparty, content, due,
// context, dashboard_path, source_ref:{type,title,url,doc_id}}.
// Dismissal reuses the existing action-dismiss tombstone (server side
// treats the item id as the action key).
// Normalize a counterparty string to a clustering key. Strips everything
// after the first separator (— – / , «of») so "Project Alpha — <contact-1>",
// "Project Beta / Project Alpha — <contact-1>", and "Project Alpha Sub — <contact-1>"
// all resolve to a single firm identity.
// Counterparty aliases — different spellings of the same deal collapse to a
// canonical name so the awaiting-external UI doesn't show the same deal twice
// (e.g. "Project Beta / Project Alpha — <contact-1>" and "Project Alpha" are the same deal).
// Loaded from firm_context.yaml (counterparty_aliases) via window.__CP_ALIASES__
// injected server-side. Falls back to [] — no aliases — if not configured.
const __CP_ALIASES = window.__CP_ALIASES__ || [];
function __cpClusterKey(raw) {
  if (!raw) return '';
  const low = String(raw).toLowerCase();
  for (const [needle, canon] of __CP_ALIASES) {
    if (low.indexOf(needle) !== -1) return canon;
  }
  let s = String(raw).split(/[—–\/,]| of /)[0].trim();
  // Strip leading stopwords and common descriptors
  s = s.replace(/^(re:|fwd:)\s*/i, '').trim();
  return s;
}
function __cpDisplayFromKey(key) {
  // Reasonable display casing — leave user input alone, just trim
  return key.replace(/\s+/g, ' ').trim();
}
// Signature for detecting near-duplicate content across items targeting
// the same counterparty. First 60 alphanumeric chars, lowercased.
// Cheap, exact-prefix dedupe — useful when two items are nearly verbatim.
function __contentSignature(s) {
  return (s || '')
    .toLowerCase()
    .replace(/[^a-z0-9 ]/g, '')
    .replace(/\s+/g, ' ')
    .trim()
    .slice(0, 60);
}

// Token-set similarity for catching paraphrase duplicates within a
// counterparty cluster (e.g. four rephrasings of "send the principal
// the Project Alpha teaser"). Word-bag of tokens length >=4, Jaccard
// overlap. Threshold 0.55 catches obvious paraphrases without
// merging legitimately distinct items.
function __tokenSet(s) {
  return new Set(
    (s || '')
      .toLowerCase()
      .replace(/[^a-z0-9 ]/g, ' ')
      .split(/\s+/)
      .filter(t => t.length >= 4)
  );
}
function __jaccard(a, b) {
  if (!a.size || !b.size) return 0;
  let inter = 0;
  for (const t of a) if (b.has(t)) inter++;
  return inter / (a.size + b.size - inter);
}
const __DEDUPE_THRESHOLD = 0.55;

// Strip Otter ───padding─── and file suffixes from source titles so chips are readable.
function _cleanSrcTitle(t) {
  return (t || '').replace(/^─+\s*|\s*─+$/g, '').replace(/_[Oo]tter_[Aa]i/g, '').replace(/\.(txt|docx?)$/i, '').trim();
}

// Classify a cluster as 'fundraising' or 'deal' based on item workstream/path signals.
function _clusterCategory(c) {
  for (const it of c.items) {
    const ws = (it.workstream || '').toLowerCase();
    const dp = (it.dashboard_path || '').toLowerCase();
    if (ws === 'fundraising' || ws === 'capital' ||
        dp.includes('fundrais') || dp.includes(' lp ') || dp.includes('capital raising')) {
      return 'fundraising';
    }
  }
  return 'deal';
}

// filter: 'tc-only'  → deal-workstream items only (Status tab)
//         'job-tc'   → Recruiting + TC Cove, displayed in that order (Personal tab)
//         'all'      → no workstream filter (default / legacy)
function buildAwaitingExternal(filter) {
  filter = filter || 'all';
  const items = Array.isArray(DATA.awaitingExternal) ? DATA.awaitingExternal : [];
  let visible = items.filter(i => {
    const k = i.id || '';
    return k && !state.dismissedActions.includes(k) && !__isDel('followup', k);
  });
  // Apply workstream filter using _itemWorkstream()
  if (filter === 'tc-only') {
    visible = visible.filter(i => _itemWorkstream(i) === 'tomac');
  } else if (filter === 'job-tc') {
    visible = visible.filter(i => { const ws = _itemWorkstream(i); return ws === 'tomac' || ws === 'job'; });
  }
  const today = DATA.today;

  const aeid = 'awaiting-external';
  const aec  = state.collapsed[aeid];

  // Group by normalized counterparty; within a group, drop near-duplicate
  // content using two layers: (1) exact prefix-signature match, (2) Jaccard
  // token-set similarity for paraphrase detection.
  const clusters = new Map();  // key -> {display, items, seenSigs, seenSets}
  for (const it of visible) {
    const raw = it.counterparty || '—';
    const key = __cpClusterKey(raw).toLowerCase() || '—';
    if (!clusters.has(key)) {
      clusters.set(key, {
        display:  __cpDisplayFromKey(__cpClusterKey(raw) || raw),
        items:    [],
        seenSigs: new Set(),
        seenSets: [],
      });
    }
    const c = clusters.get(key);
    const sig = __contentSignature(it.content || '');
    if (sig && c.seenSigs.has(sig)) continue;  // exact-prefix duplicate
    const tset = __tokenSet(it.content || '');
    let isParaphrase = false;
    for (const seen of c.seenSets) {
      if (__jaccard(tset, seen) >= __DEDUPE_THRESHOLD) { isParaphrase = true; break; }
    }
    if (isParaphrase) continue;  // paraphrased duplicate
    c.seenSigs.add(sig);
    c.seenSets.push(tset);
    c.items.push(it);
  }

  // Sort clusters: most overdue first, then most items, then alpha
  const clusterList = Array.from(clusters.values()).sort((a, b) => {
    const ao = a.items.filter(i => i.due && i.due <= today).length;
    const bo = b.items.filter(i => i.due && i.due <= today).length;
    if (ao !== bo) return bo - ao;
    if (a.items.length !== b.items.length) return b.items.length - a.items.length;
    return a.display.localeCompare(b.display);
  });

  const rawCount   = visible.length;
  const uniqueCount = clusterList.reduce((s, c) => s + c.items.length, 0);

  const renderCluster = (c) => {
    const overdueItems = c.items.filter(i => i.due && i.due <= today);
    const earliest = c.items.map(i => i.due).filter(Boolean).sort()[0] || '';
    // Pick most salient item: overdue first, else earliest due, else first
    const lead = overdueItems[0] || c.items.find(i => i.due) || c.items[0];
    const overdue = lead.due && lead.due <= today;
    const dueColor = overdue ? '#dc2626' : '#64748b';
    const dueText = lead.due ? `${overdue ? '🔴 ' : ''}${esc(lead.due)}` : '';
    const extra = c.items.length > 1 ? `<span style="color:#94a3b8;font-size:10px"> +${c.items.length - 1} more</span>` : '';
    const key = esc(lead.id || '');
    const srvKey = esc(((lead.counterparty || '') + '|' + (lead.content || '').slice(0, 40)).replace(/"/g, ''));
    return `
      <div style="padding:8px 12px;border-bottom:1px solid rgba(148,163,184,0.12);display:flex;gap:8px;align-items:flex-start">
        <div style="flex:1">
          <div style="display:flex;justify-content:space-between;align-items:baseline;gap:8px;margin-bottom:2px">
            <span style="font-weight:600;color:#0f1e38;font-size:12px">${esc(c.display)}</span>
            <span style="font-size:10px;color:${dueColor};white-space:nowrap;flex-shrink:0">${dueText}${extra}</span>
          </div>
          <div style="font-size:11px;color:#475569;line-height:1.4">${esc(lead.content || '')}</div>
          ${(()=>{ const r=lead.source_ref; if(!r||!r.title) return ''; const t=_cleanSrcTitle(r.title); const d=r.date?` · ${esc(r.date)}`:''; return `<div style="font-size:10px;color:#94a3b8;margin-top:3px">${r.doc_url?`<a href="${esc(r.doc_url)}" target="_blank" rel="noopener" style="color:#94a3b8;text-decoration:none">↗ ${esc(t)}</a>`:esc(t)}${d}</div>`; })()}
        </div>
        <button class="dismiss-btn" onclick="dismissAction('${key}','${srvKey}')" title="Dismiss" style="flex-shrink:0;margin-top:2px">×</button>
      </div>`;
  };

  const dedupedCount = rawCount - uniqueCount;
  const dedupeBadge = dedupedCount > 0
    ? ` <span style="color:#94a3b8;font-weight:400">(${dedupedCount} dup${dedupedCount === 1 ? '' : 's'} merged)</span>`
    : '';

  // Shared helper: render a labeled sub-section of clusters with a dismiss button per row.
  function renderSection(label, color, clusters, cap, expandKey) {
    if (clusters.length === 0) return '';
    const expanded = !!state.expanded[expandKey];
    const visible  = (cap && !expanded) ? clusters.slice(0, cap) : clusters;
    const overflow = clusters.length - visible.length;
    const moreLink = (overflow > 0 || (expanded && clusters.length > cap))
      ? `<div style="padding:6px 12px;text-align:center;border-top:1px solid rgba(148,163,184,0.08)">
           <a href="#" onclick="event.preventDefault();expandToggle('${expandKey}')" style="font-size:11px;color:#a78bfa;font-weight:600;text-decoration:none">
             ${expanded ? `▴ Show fewer` : `▾ +${overflow} more`}
           </a>
         </div>`
      : '';
    return `<div style="margin-bottom:4px">
      <div style="font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:0.08em;color:${color};padding:6px 12px 4px;border-bottom:2px solid ${color}20">${esc(label)}</div>
      ${visible.map(c => {
        const overdueItems = c.items.filter(i => i.due && i.due <= today);
        const lead = overdueItems[0] || c.items.find(i => i.due) || c.items[0];
        const overdue = lead.due && lead.due <= today;
        const dueText = lead.due ? `${overdue ? '🔴 ' : ''}${esc(lead.due)}` : '';
        const extra = c.items.length > 1 ? ` +${c.items.length - 1}` : '';
        const key = esc(lead.id || '');
        const srvKey = esc(((lead.counterparty||'')+'|'+(lead.content||'').slice(0,40)).replace(/"/g,''));
        return `<div style="padding:7px 12px;border-bottom:1px solid rgba(148,163,184,0.1);display:flex;gap:8px;align-items:flex-start">
          <div style="flex:1">
            <div style="display:flex;justify-content:space-between;align-items:baseline;gap:8px;margin-bottom:2px">
              <span style="font-weight:600;font-size:12px;color:#0f1e38">${esc(c.display)}</span>
              <span style="font-size:10px;color:${overdue ? '#dc2626' : '#64748b'};white-space:nowrap;flex-shrink:0">${dueText}${extra ? `<span style="color:#94a3b8"> ${extra}</span>` : ''}</span>
            </div>
            <div style="font-size:11px;color:#475569;line-height:1.4">${esc(lead.content||'')}</div>
            ${(()=>{ const r=lead.source_ref; if(!r||!r.title) return ''; const t=_cleanSrcTitle(r.title); const d=r.date?` · ${esc(r.date)}`:''; return `<div style="font-size:10px;color:#94a3b8;margin-top:3px">${r.doc_url?`<a href="${esc(r.doc_url)}" target="_blank" rel="noopener" style="color:#94a3b8;text-decoration:none">↗ ${esc(t)}</a>`:esc(t)}${d}</div>`; })()}
          </div>
          <button class="dismiss-btn" onclick="dismissAction('${key}','${srvKey}')" title="Dismiss" style="flex-shrink:0;margin-top:2px">×</button>
        </div>`;
      }).join('')}
      ${moreLink}
    </div>`;
  }

  let body;

  if (filter === 'job-tc') {
    // Personal tab: Recruiting | Deals | Fundraising
    const jobClusters = clusterList.filter(c => c.items.some(i => _itemWorkstream(i) === 'job'));
    const tcClusters  = clusterList.filter(c => !jobClusters.includes(c) && c.items.some(i => _itemWorkstream(i) === 'tomac'));
    const tcDealClusters  = tcClusters.filter(c => _clusterCategory(c) === 'deal');
    const tcFundClusters  = tcClusters.filter(c => _clusterCategory(c) === 'fundraising');

    const grouped = renderSection('Recruiting', '#2563eb', jobClusters, 0, aeid+'-job')
      + renderSection('Deals', '#16a34a', tcDealClusters, 0, aeid+'-tcdeal')
      + renderSection('Fundraising', '#d97706', tcFundClusters, 0, aeid+'-tcfund');
    body = (jobClusters.length + tcClusters.length) === 0
      ? '<div class="no-items">Nothing pending from counterparties.</div>'
      : grouped;
  } else {
    // Status tab / all: split TC clusters into Deals and Fundraising
    const dealClusters = clusterList.filter(c => _clusterCategory(c) === 'deal');
    const fundClusters = clusterList.filter(c => _clusterCategory(c) === 'fundraising');
    const CAP = 6;
    if (dealClusters.length === 0 && fundClusters.length === 0) {
      body = '<div class="no-items">Nothing pending from counterparties.</div>';
    } else if (fundClusters.length === 0) {
      // All deals — no split header needed, fall back to flat list
      const expanded = !!state.expanded[aeid];
      const vis = expanded ? dealClusters : dealClusters.slice(0, CAP);
      const overflow = dealClusters.length - vis.length;
      const moreLink = (overflow > 0 || (expanded && dealClusters.length > CAP))
        ? `<div style="padding:10px 12px;border-top:1px solid rgba(148,163,184,0.12);text-align:center">
             <a href="#" onclick="event.preventDefault();expandToggle('${aeid}')" style="font-size:11px;color:#a78bfa;font-weight:600;text-decoration:none;letter-spacing:0.04em">
               ${expanded ? `▴ Show top ${CAP}` : `▾ Show all ${dealClusters.length} (+${overflow} more)`}
             </a>
           </div>`
        : '';
      body = vis.map(renderCluster).join('') + moreLink;
    } else {
      body = renderSection('Deals', '#16a34a', dealClusters, CAP, aeid+'-deal')
           + renderSection('Fundraising', '#d97706', fundClusters, CAP, aeid+'-fund');
    }
  }

  const titleLabel = filter === 'job-tc'
    ? 'Awaiting External · Recruiting &amp; TC'
    : filter === 'tc-only'
    ? `Awaiting External · ${FIRM_LABEL}`
    : 'Awaiting External';

  return `
  <div class="card" style="margin-bottom:18px">
    <div class="card-title card-title-btn" onclick="collapseToggle('${aeid}')">
      <div class="dot" style="background:#a78bfa"></div>${titleLabel}
      <span class="card-count">${clusterList.length} counterpart${clusterList.length === 1 ? 'y' : 'ies'} · ${uniqueCount} item${uniqueCount === 1 ? '' : 's'}${dedupeBadge}</span>
      <span class="collapse-chevron ${aec ? 'closed' : 'open'}" style="margin-left:auto;font-size:11px;color:#cbd5e1">${aec ? '▸' : '▾'}</span>
    </div>
    ${aec ? '' : body}
  </div>`;
}

// STATUS TOP ROW — 3-col: TC Overview | Fundraising | Team Actions
// Replaces the old Dealflow/Fundraising/Portfolio sub-tab card on Status.

// Workstream classifier for awaitingExternal items — used by
// buildAwaitingExternal() and here for team action filtering.
// Returns 'tomac', 'job', or 'other'.
function _itemWorkstream(item) {
  const ws = (item.workstream || '').toLowerCase();
  if (ws === 'tomac' || ws === 'capital' || ws === 'fundraising') return 'tomac';
  if (ws === 'job' || ws === 'recruiting') return 'job';
  if (ws) return ws;
  const path = (item.dashboard_path || '').toLowerCase();
  const cp   = (item.counterparty   || '').toLowerCase();
  if (path.includes('recruit') || path.includes('job search') ||
      cp.includes('recruiter')  || cp.includes('search partner')) return 'job';
  if (path.includes('tomac') || path.includes('pipeline') ||
      path.includes('deal pipeline') || path.includes('fundrais') ||
      path.includes('lp ') || cp.length > 0) return 'tomac';
  return 'other';
}

function buildStatusTopRow() {
  return `
  <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:16px;margin-bottom:18px;align-items:start">
    ${buildTomacPanel()}
    ${buildFundraisingCard()}
    ${buildTeamActionsCard()}
  </div>`;
}

// ── Fundraising card (Status top-row col 2) ──────────────────────────────
// Shows Capital Raising Advisors + Prospective Investors from TOMAC_CONFIG,
// plus a count chip from DATA.lpData. Compact — no LP table (that's on /tomac-cove/).
function buildFundraisingCard() {
  const tc     = TOMAC_CONFIG;
  const today  = DATA.today;
  const lps    = Array.isArray(DATA.lpData) ? DATA.lpData : [];
  const lpCount = lps.length;
  const advisors  = tc.capitalRaisingAdvisors  || [];
  const investors = tc.prospectiveInvestors    || [];
  const { urgencyLabel } = _ptHelpers(today);

  function fRow(t) {
    const { label: urgLbl, cls: urgCls } = urgencyLabel(t.nextTouchBase);
    const urgColor = urgCls === 'overdue' ? '#dc2626' : urgCls === 'soon' ? '#f59e0b' : '#64748b';
    return `
    <div style="padding:7px 0;border-bottom:1px solid rgba(148,163,184,0.12);display:flex;justify-content:space-between;align-items:flex-start;gap:8px">
      <div style="flex:1;min-width:0">
        <div style="font-size:12px;font-weight:600;color:#0f1e38">${esc(t.name)}</div>
        <div style="font-size:10px;color:#64748b;margin-top:1px">
          ${t.contact ? esc(t.contact) : ''}${t.sourcedBy ? ` <span style="color:#a78bfa">· via ${esc(t.sourcedBy)}</span>` : ''}
        </div>
        ${t.nextStep ? `<div style="font-size:10.5px;color:#475569;margin-top:3px">→ ${esc(t.nextStep)}</div>` : ''}
      </div>
      <div style="text-align:right;flex-shrink:0">
        ${urgLbl ? `<span style="font-size:9px;font-weight:700;color:${urgColor};white-space:nowrap;letter-spacing:0.05em;text-transform:uppercase">${esc(urgLbl)}</span>` : ''}
        ${t.owner ? `<div style="font-size:9px;color:#94a3b8;font-family:var(--font-data);letter-spacing:0.1em;text-transform:uppercase;margin-top:2px">${esc(t.owner)}</div>` : ''}
      </div>
    </div>`;
  }

  function subHeader(label, color, bg, count) {
    return `<div style="font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:0.1em;color:${color};padding:8px 14px 5px;margin:4px -14px 0;background:${bg};border-top:1px solid ${color}22;border-bottom:1px solid ${color}11">${esc(label)} <span style="font-weight:400;opacity:0.55">(${count})</span></div>`;
  }

  const placementAdvisors = advisors.filter(t => (t.group || 'placement') === 'placement');
  const gpSeedAdvisors    = advisors.filter(t => t.group === 'gp_seed');

  const fid = 'fundraising-card';
  const fc  = state.collapsed[fid];
  const totalRows = advisors.length + investors.length;
  return `
  <div class="card">
    <div class="card-title card-title-btn" onclick="collapseToggle('${fid}')">
      <div class="dot" style="background:#7c3aed"></div>Fundraising
      <span class="card-count">${lpCount} LP${lpCount !== 1 ? 's' : ''} tracked</span>
      <a href="/tomac-cove/" style="margin-left:auto;margin-right:8px;font-size:10px;color:#7c3aed;text-decoration:none;font-weight:600">Full LP tracker →</a>
      <span class="collapse-chevron ${fc ? 'closed' : 'open'}" style="font-size:11px;color:var(--ink-ghost)">${fc ? '▸' : '▾'}</span>
    </div>
    ${fc ? '' : `
    ${placementAdvisors.length > 0 ? subHeader('Placement Agents', '#7c3aed', 'rgba(124,58,237,0.03)', placementAdvisors.length) + `<div style="padding:0 0 4px">${placementAdvisors.map(fRow).join('')}</div>` : ''}
    ${gpSeedAdvisors.length > 0 ? subHeader('GP Seed / Stakes', '#0ea5e9', 'rgba(14,165,233,0.03)', gpSeedAdvisors.length) + `<div style="padding:0 0 4px">${gpSeedAdvisors.map(fRow).join('')}</div>` : ''}
    ${investors.length > 0 ? subHeader('Direct LPs / Co-Invest', '#16a34a', 'rgba(22,163,74,0.03)', investors.length) + `<div style="padding:0 0 4px">${investors.map(fRow).join('')}</div>` : ''}
    ${totalRows === 0 ? '<div class="no-items">No fundraising contacts tracked.</div>' : ''}
    `}
  </div>`;
}

// ── Team Actions card (Status top-row col 3) ─────────────────────────────
// Shows open actions from TOMAC_CONFIG grouped by TC team member
// (team members), each row indicating the portfolio company or
// fundraising context. Only rows where myAction is non-empty are shown.
function buildTeamActionsCard() {
  const tc    = TOMAC_CONFIG;
  const today = DATA.today;
  const { urgencyLabel } = _ptHelpers(today);

  // Collect all action-carrying items from every TOMAC_CONFIG section
  const allItems = [
    ...(tc.liveDeals             || []).map(t => ({ ...t, category: 'Live Deal' })),
    ...(tc.dealOrigination       || []).map(t => ({ ...t, category: 'Origination' })),
    ...(tc.capitalRaisingAdvisors|| []).map(t => ({ ...t, category: 'Fundraising' })),
    ...(tc.prospectiveInvestors  || []).map(t => ({ ...t, category: 'LP' })),
  ].filter(t => (t.myAction && t.myAction.trim()) || (t.nextStep && t.nextStep.trim()));

  // Group by owner: principal first, then team[] in firm_context order, then others
  const MEMBER_ORDER = TEAM_FIRST_NAMES;
  const byOwner = {};
  for (const t of allItems) {
    const owner = t.owner || PRINCIPAL_FIRST;
    const key = MEMBER_ORDER.find(m => owner.toLowerCase().includes(m.toLowerCase())) || owner;
    if (!byOwner[key]) byOwner[key] = [];
    byOwner[key].push(t);
  }
  const owners = [...MEMBER_ORDER.filter(m => byOwner[m]), ...Object.keys(byOwner).filter(k => !MEMBER_ORDER.includes(k))];

  const _OWNER_PALETTE = ['#0f1e38','#0ea5e9','#16a34a','#a855f7','#f59e0b','#dc2626']; const OWNER_COLOR = TEAM_FIRST_NAMES.reduce((m,n,i)=>{m[n]=_OWNER_PALETTE[i % _OWNER_PALETTE.length]; return m;}, {});

  // Tier 1/2/3 classification — combines urgency (date-based) with source
  // category so the visual prioritisation reflects both "act now" timing AND
  // "is this an external commitment vs. internal admin." Tier wins by max:
  //   1 (red)   → overdue / today                      OR Live Deal commitment
  //   2 (amber) → due within ~7 days                   OR Origination / Fundraising / LP
  //   3 (grey)  → everything else (batch / advisory)
  // Palette uses design-system tokens (--red, --amber, --ink-ghost) so this
  // reads consistently against the cream-paper aesthetic.
  function fuTier(t, urgCls) {
    const cat = (t.category || '').toLowerCase();
    if (urgCls === 'overdue' || cat === 'live deal') return 1;
    if (urgCls === 'soon'    || cat === 'origination' || cat === 'fundraising' || cat === 'lp') return 2;
    return 3;
  }
  const TIER_DOT = { 1: '#7A2020', 2: '#8B5A0E', 3: '#BEB8AD' };
  const TIER_BG  = { 1: 'rgba(122,32,32,0.05)', 2: 'transparent', 3: 'transparent' };

  function actionRow(t) {
    const { label: urgLbl, cls: urgCls } = urgencyLabel(t.nextTouchBase);
    const urgColor = urgCls === 'overdue' ? '#dc2626' : urgCls === 'soon' ? '#f59e0b' : '#64748b';
    const actionText = (t.myAction && t.myAction.trim()) ? t.myAction : t.nextStep;
    const tier = fuTier(t, urgCls);
    const dot  = `<span title="Tier ${tier}" style="flex-shrink:0;width:6px;height:6px;border-radius:50%;background:${TIER_DOT[tier]};margin-top:6px;display:inline-block"></span>`;
    return `
    <div style="padding:5px 0 5px 6px;border-bottom:1px solid rgba(148,163,184,0.1);background:${TIER_BG[tier]};display:flex;gap:8px;align-items:flex-start">
      ${dot}
      <div style="flex:1">
        <div style="font-size:10.5px;color:#1e293b">${esc(actionText)}</div>
        <div style="font-size:9px;color:#94a3b8;margin-top:1px">${esc(t.name)} · <span style="color:#64748b">${esc(t.category)}</span></div>
      </div>
      ${urgLbl ? `<span style="font-size:9px;font-weight:700;color:${urgColor};white-space:nowrap;letter-spacing:0.05em;text-transform:uppercase;flex-shrink:0">${esc(urgLbl)}</span>` : ''}
    </div>`;
  }

  const taid = 'team-actions-card';
  const tac  = state.collapsed[taid];
  const totalActions = allItems.length;
  return `
  <div class="card">
    <div class="card-title card-title-btn" onclick="collapseToggle('${taid}')">
      <div class="dot" style="background:#f59e0b"></div>Team Actions
      <span class="card-count">${totalActions} open</span>
      <span class="collapse-chevron ${tac ? 'closed' : 'open'}" style="margin-left:auto;font-size:11px;color:var(--ink-ghost)">${tac ? '▸' : '▾'}</span>
    </div>
    ${tac ? '' : `
    ${owners.length === 0 ? '<div class="no-items">No open team actions.</div>' : owners.map(owner => {
      const items = byOwner[owner] || [];
      const color = OWNER_COLOR[owner] || '#64748b';
      return `
      <div style="margin-bottom:10px">
        <div style="font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:0.1em;color:${color};padding:6px 0 4px;border-bottom:2px solid ${color}20">${esc(owner)}</div>
        ${items.map(actionRow).join('')}
      </div>`;
    }).join('')}
    `}
  </div>`;
}

// (Intel Card — Deal Intel / Origination / Themes — retired 2026-04-27.

// Status > Deal card. Sub-tabs kept as reference but no longer called from

function buildTomacSection(deals) {

  const inner = isDeals ? buildTomacDealsInner(deals)
              : isFund  ? buildFundraisingInner()
              :           buildPortfolioInner(portfolioDeals);

  return `
  <div class="card" style="margin-bottom:18px">
    <div class="tc-tabs" style="display:flex;align-items:center">
      <div class="tc-tab${isDeals ? ' active-deal' : ''}" onclick="setTcTab('deal')">
        Dealflow <span style="font-weight:400;opacity:0.6">(${dealCount})</span>
      </div>
      <div class="tc-tab${isFund ? ' active-fund' : ''}" onclick="setTcTab('fund')">
        Fundraising <span style="font-weight:400;opacity:0.6">(${fundCount})</span>
      </div>
      <div class="tc-tab${isPort ? ' active-port' : ''}" onclick="setTcTab('portfolio')">
        Portfolio <span style="font-weight:400;opacity:0.6">(${portCount})</span>
      </div>
      ${makeSectionRefreshBtn()}
      <div onclick="collapseToggle('${tcid}')" style="margin-left:6px;padding:0 4px;cursor:pointer;color:#cbd5e1;font-size:12px;line-height:1" title="Collapse">${tcc ? '▸' : '▾'}</div>
    </div>
    ${tcc ? '' : inner}
  </div>`;
}

// Portfolio sub-tab — drill-through to /tomac-cove/, not a duplicate inline view.
function buildPortfolioInner(portfolioDeals) {
  const count = portfolioDeals.length;
  return `
    <div style="padding:24px 16px;text-align:center">
      <div style="font-size:13px;color:#475569;margin-bottom:8px">
        Live portfolio lives at <strong>/tomac-cove/</strong>
      </div>
      <div style="font-size:11px;color:#94a3b8;margin-bottom:18px">
        ${count} deal${count === 1 ? '' : 's'} — health scores, milestones, capital in play, profit ranges.
      </div>
      <a href="/tomac-cove/" style="display:inline-block;padding:8px 18px;background:#0f1e38;color:#ffffff;text-decoration:none;font-size:11px;font-weight:600;letter-spacing:0.04em;border-radius:5px;text-transform:uppercase">
        Open TC Pipeline →
      </a>
    </div>`;
}

function buildTomacDealsInner(deals) {
  // Cross-reference dealPortfolio.deals[] to pull user-editable fields
  // (potential_partner, deck_url, model_url) that live on the deal-system
  // schema, not the transcript-derived tomac[] schema. Match by normalized
  // name or ticker (lowercase + alphanumeric only) with substring fallback.
  const _normName = (s) => (s || '').toLowerCase().replace(/[^a-z0-9]/g, '');
  const portfolioDeals = (typeof DATA !== 'undefined' && DATA.dealPortfolio && DATA.dealPortfolio.deals) || [];
  const portfolioByName = {};
  portfolioDeals.forEach(p => {
    const n = _normName(p.name);   if (n) portfolioByName[n] = p;
    const t = _normName(p.ticker); if (t) portfolioByName[t] = p;
  });
  const _findPortfolio = (d) => {
    const n = _normName(d.name);
    if (n && portfolioByName[n]) return portfolioByName[n];
    for (const k in portfolioByName) {
      if (k && n && (k.indexOf(n) >= 0 || n.indexOf(k) >= 0)) return portfolioByName[k];
    }
    return null;
  };

  const items = deals.map((d, i) => {
    const stCls = {Sourcing:'sourcing',Diligence:'diligence','IC Memo':'memo',Closed:'pass',Pass:'pass'}[d.stage] || 'sourcing';
    // Gap B: render "Latest:" strip + fresh badge when the fetch step found a
    // fresher signal than the doc's static "Next step" field.
    const lu = d.latestUpdate;
    const freshBadge = d.freshSignal
      ? `<span style="display:inline-block;padding:1px 6px;margin-left:6px;font-size:0.62rem;background:#2e7d32;color:#fff;border-radius:3px;font-weight:600;letter-spacing:0.3px">FRESH</span>`
      : '';
    const autoBadge = d._synthesized
      ? `<span style="display:inline-block;padding:1px 6px;margin-left:6px;font-size:0.62rem;background:#8e24aa;color:#fff;border-radius:3px;font-weight:600;letter-spacing:0.3px" title="Auto-promoted from origination after fundraising signal detected">AUTO</span>`
      : '';
    const latestStrip = lu && lu.text
      ? `<div class="deal-latest" style="font-size:0.72rem;color:var(--ink-mid);margin-top:2px;padding-left:4px;border-left:2px solid #2e7d32"><span style="color:#2e7d32;font-weight:600">Latest${lu.date ? ' ('+esc(lu.date)+')' : ''}:</span> ${esc(lu.text)}</div>`
      : '';
    const portfolio = _findPortfolio(d);
    const partnerLine = portfolio && portfolio.potential_partner
      ? `<div class="deal-partner" style="font-size:0.72rem;color:var(--ink-mid);margin-top:3px"><span style="color:var(--ink-faint);font-family:var(--font-data);text-transform:uppercase;letter-spacing:0.06em;font-size:0.62rem">Partner</span> <span style="font-weight:600">${esc(portfolio.potential_partner)}</span></div>`
      : '';
    const deckUrl  = portfolio && portfolio.deck_url;
    const modelUrl = portfolio && portfolio.model_url;
    const deckLink  = deckUrl
      ? `<a href="${esc(deckUrl)}" target="_blank" rel="noreferrer" onclick="event.stopPropagation()" style="color:var(--navy);text-decoration:none;font-family:var(--font-data);font-size:0.66rem;letter-spacing:0.04em">📄 Deck</a>`

    const modelLink = modelUrl
      ? `<a href="${esc(modelUrl)}" target="_blank" rel="noreferrer" onclick="event.stopPropagation()" style="color:var(--navy);text-decoration:none;font-family:var(--font-data);font-size:0.66rem;letter-spacing:0.04em">📊 Model</a>`
      : `<span style="color:var(--ink-ghost);font-family:var(--font-data);font-size:0.66rem;letter-spacing:0.04em" title="No model URL set">📊 Model</span>`;
    const docsLine  = `<div class="deal-docs" style="display:flex;gap:14px;margin-top:5px">${deckLink}${modelLink}</div>`;
    return `
    <div class="deal-row" onclick="showDeal(${i})">

      <div class="deal-info" style="flex:1">

const _FR_STATUSES = ['Introduced', 'In Discussion', 'Committed', 'Passed'];

function _frActiveCount(entries) {
  return (entries || []).filter(e => (e.status || '') !== 'Passed').length;

function _frStatusChip(s) {
  const v = (s || '').toLowerCase();
  let bg = '#e2e8f2', fg = '#475569';

  else if (v === 'in discussion') { bg = 'rgba(167,139,250,0.18)'; fg = '#6d28d9'; }
  else if (v === 'introduced')    { bg = 'rgba(96,165,250,0.18)';  fg = '#1e40af'; }
  else if (v === 'passed')        { bg = '#f1f5f9';                fg = '#94a3b8'; }

          <span style="font-size:11px;color:#64748b;font-style:italic;flex:1">${esc(p.desc)}</span>
        </div>
        <button onclick="event.stopPropagation();expandToggle('${cid}-add')" style="margin-right:8px;padding:3px 10px;font-size:10px;border:1px solid #c9973a;background:transparent;color:#c9973a;border-radius:4px;cursor:pointer;font-weight:600;letter-spacing:0.04em;font-family:inherit">+ Add</button>
        <span onclick="collapseToggle('${cid}')" style="cursor:pointer;font-size:11px;color:#cbd5e1">${collapsed ? '▸' : '▾'}</span>
      </div>
      ${collapsed ? '' : `
        <div style="padding:0 14px 12px">

// Inline-form save → POST /fundraising/add → reload page so all consumers
// (LP table, fund stats, etc.) see the new entry.
function frSave(pathId, btn) {
  const firm   = (document.getElementById('fr-' + pathId + '-firm').value || '').trim();
  const name   = (document.getElementById('fr-' + pathId + '-name').value || '').trim();
  const last   = (document.getElementById('fr-' + pathId + '-last').value || '').trim();
  const status = document.getElementById('fr-' + pathId + '-status').value;
  const notes  = (document.getElementById('fr-' + pathId + '-notes').value || '').trim();
  if (!firm && !name) { alert('Need at least a firm or a name.'); return; }
  btn.disabled = true; btn.textContent = 'Saving…';
  fetch('/fundraising/add', {
    method: 'POST',
    headers: {'Content-Type': 'application/json'},
    body: JSON.stringify({path: pathId, firm, name, last_contact: last, status, notes}),
  })
  .then(r => r.json())
  .then(d => {
    if (d.ok) { window.location.reload(); }
    else { btn.disabled = false; btn.textContent = 'Save'; alert('Save failed: ' + (d.error || 'unknown')); }
  })
  .catch(e => { btn.disabled = false; btn.textContent = 'Save'; alert('Save failed — check network'); });
}

function buildFundraisingInner() {
  const fr = (DATA.fundraising && typeof DATA.fundraising === 'object' && !Array.isArray(DATA.fundraising))
    ? DATA.fundraising : {};

  // Strategy + competitive context line.
  const strategyText = fr.currentFocus || fr.approach || '';
  const strategyLine = strategyText
    ? `<div style="font-size:0.78rem;color:#475569;margin:4px 0 12px;padding:8px 10px;background:#f8fafc;border-radius:5px;border:1px solid #e2e8f2">${esc(strategyText.slice(0,220))}${strategyText.length>220?'…':''}</div>`
    : '';
  const competitive = Array.isArray(fr.competitive) ? fr.competitive.filter(Boolean) : [];
  const competitiveLine = competitive.length > 0
    ? `<div style="font-size:10px;color:#94a3b8;margin:0 0 14px 0;padding:6px 10px;border-left:2px solid #e2e8f2;line-height:1.5"><span style="color:#64748b;font-weight:600;text-transform:uppercase;letter-spacing:0.06em;font-size:9px">Competitive</span> · ${competitive.map(esc).join(' · ')}</div>`
    : '';

  // Total counters across all buckets.
  let total = 0, committed = 0, inDisc = 0;
  for (const p of _FR_PATHS) {
    const b = fr[p.id] || [];
    total += b.length;
    for (const e of b) {
      const s = (e.status || '').toLowerCase();
      if (s === 'committed') committed++;
      if (s === 'in discussion') inDisc++;
    }
  }
  const meta = `${total} conversation${total === 1 ? '' : 's'} · ${committed} committed · ${inDisc} in discussion`;

  // Order buckets by active-conversation count desc, ties broken by spec order.
  const orderedPaths = _FR_PATHS.slice().sort((a, b) => {
    const ac = _frActiveCount(fr[a.id]);
    const bc = _frActiveCount(fr[b.id]);
    return bc - ac;
  });

  const cards = orderedPaths.map(p => _frBucketCard(p, fr[p.id])).join('');

  return `
    <div class="tc-section-label" style="margin-top:4px;display:flex;align-items:baseline;gap:8px">
      <span>FUNDRAISING</span>
      <span class="tc-port-header-meta">${meta}</span>
    </div>
    ${strategyLine}
    ${competitiveLine}
    ${cards}`;
}

// Tier classification for priority-target rows. Used by targetRow() inside
// _ptHelpers() — extracted at module scope so the helper is callable from
// inside _ptHelpers without re-binding `today`. Inputs:
//   t     — target object {nextTouchBase, myAction, nextStep, ...}
//   sk    — section key ('chase' | 'disc' | 'wait' | 'personal_items' | ...)
//   today — ISO date string (DATA.today)
// Returns 1/2/3.
function ptTier(t, sk, today) {
  const ntb = t && t.nextTouchBase;
  if (ntb) {
    const diff = Math.round((new Date(ntb) - new Date(today)) / 86400000);
    if (diff < 0) return 1;        // overdue
    if (diff <= 1) return 1;        // today or tomorrow
    if (diff <= 7) return 2;        // this week
  }
  if (sk === 'chase') return 1;     // chasing = urgent regardless of date
  if (sk === 'disc' || sk === 'wait') return 2;  // active conversations
  return 3;                         // batch / archive
}

function _ptHelpers(today) {
  function xrefBadge(names) {
    const lcs = names.map(n => (n||'').toLowerCase()).filter(Boolean);
    const hasFU   = DATA.followUps.some(f =>
      !(f.what || '').startsWith('[RESOLVED]') &&
      f.who && lcs.some(n => f.who.toLowerCase().includes(n)) &&
      !state.dismissedActions.includes(actionKey(f)) &&
      !__isDel('followup', actionKey(f))
    );
    const hasCall = DATA.upcomingCalls.some(c =>
      lcs.some(n => (c.who && c.who.toLowerCase().includes(n)) || (c.with && c.with.toLowerCase().includes(n)))
    );
    return (hasFU  ? `<span class="pt-badge pt-badge-action">Action</span>` : '')
         + (hasCall ? `<span class="pt-badge pt-badge-call">Call</span>` : '');
  }

  // Compute urgency label + CSS class from a YYYY-MM-DD date string
  function urgencyLabel(ntb) {
    if (!ntb) return { label: '', cls: '' };
    const diff = Math.round((new Date(ntb) - new Date(today)) / 86400000);
    if (diff < 0)   return { label: 'OVERDUE',  cls: 'overdue' };
    if (diff === 0) return { label: 'TODAY',     cls: 'overdue' };
    if (diff === 1) return { label: 'TOMORROW',  cls: 'soon'    };
    if (diff <= 7)  return { label: diff + 'd',  cls: 'soon'    };
    return { label: ntb, cls: '' };
  }

  // Action + due date as text, with permanent delete ×
  function actionCol(myAction, ntb, dismissKey) {
    const dKey = esc(dismissKey);
    const delBtn = `<button class="pt-del-btn" onclick="event.stopPropagation();dismissRecruit('${dKey}')" title="Remove permanently">×</button>`;
    if (!myAction) {
      return `<div class="pt-act-cell"><div class="pt-act-body"><span class="pt-act-none">—</span></div>${delBtn}</div>`;
    }
    const { label, cls } = urgencyLabel(ntb);
    const dateHtml = label
      ? `<div class="pt-act-date${cls ? ' ' + cls : ''}">${label}</div>`
      : '';
    return `<div class="pt-act-cell"><div class="pt-act-body"><div class="pt-act-text">${esc(myAction)}</div>${dateHtml}</div>${delBtn}</div>`;
  }

  function ntbLabel(ntb) {
    if (!ntb) return '';
    const { label, cls } = urgencyLabel(ntb);
    const color = cls === 'overdue' ? '#dc2626' : cls === 'soon' ? '#f59e0b' : '#94a3b8';
    return `<span class="pt-ntb-inline" style="color:${color}">· ${label}</span>`;
  }

  function targetRow(t, sk, idx, total) {
    const rowKey = sk + '|' + t.name;
    const stricken = !!state.struckthroughRecruit[rowKey];
    const badge = xrefBadge([t.name, t.contact || '']);
    const isToday = t.nextTouchBase === today;
    const reorderable = ['disc','wait','chase','personal_items','claude_code'].includes(sk);
    const dragAttrs = reorderable ? `draggable="true" ondragstart="ptDragStart(event,'${sk}','${esc(t.name)}')" ondragend="ptDragEnd(event)" ondragover="ptDragOver(event)" ondrop="ptDrop(event,'${sk}','${esc(t.name)}')"` : '';
    const moveBtns = reorderable
      ? `<div class="pt-move" onclick="event.stopPropagation()">
           <button class="pt-move-btn" onclick="ptMove('${sk}','${esc(t.name)}',-1)" title="Move up" aria-label="Move up">▲</button>
           <button class="pt-move-btn" onclick="ptMove('${sk}','${esc(t.name)}',1)" title="Move down" aria-label="Move down">▼</button>
         </div>`
      : '';
    // Tier 1/2/3 — combines urgency (date) with section-context (chase = act now,
    // disc/wait = active conversation, others = batch). Adds an inline dot before
    // the firm name; tier-1 also tints the row via [data-tier="1"] CSS.
    const tier = ptTier(t, sk, today);
    const tierDot = `<span class="pt-tier-dot pt-tier-dot--${tier}" title="Tier ${tier}"></span>`;
    return `
    <div class="pt-row${isToday ? ' pt-row-today' : ''}${stricken ? ' item-stricken' : ''}" data-tier="${tier}" ${dragAttrs} data-pt-name="${esc(t.name)}" onclick="showPriorityTarget('${esc(rowKey)}')">
      <div>
        ${tierDot}<span class="pt-firm">${esc(t.name)}</span>${t.contact ? `<br><span class="pt-paren">${esc(t.contact)}</span>` : ''}
        ${ntbLabel(t.nextTouchBase)} ${badge}
        ${moveBtns}
      </div>
      <div class="pt-nextstep">${sk === 'claude_code' ? esc(t.myAction || t.nextStep || '—') : esc(t.nextStep || '—')}</div>
      ${sk === 'claude_code' ? `<div></div>` : actionCol(t.myAction, t.nextTouchBase, rowKey)}
      ${taskBtn(t.task || '', t.taskUrl || '', rowKey)}
    </div>`;
  }

  function subSection(sk, label, color, items, rowFn) {
    const sid  = 'pt_' + sk;
    const coll = !!state.collapsed[sid];
    const visible = items.filter(t => { const k = sk + '|' + (t.name || t.firm || ''); return !state.dismissedRecruit.includes(k) && !__isDel('recruit', k); });
    const reorderable = ['disc','wait','chase','personal_items','claude_code'].includes(sk);
    let ordered = visible;
    if (reorderable) {
      const stored = (state.targetOrder || {})[sk];
      if (stored && stored.length > 0) {
        const orderMap = new Map(stored.map((n, i) => [n, i]));
        ordered = [...visible].sort((a, b) => {
          const ai = orderMap.has(a.name) ? orderMap.get(a.name) : 999;
          const bi = orderMap.has(b.name) ? orderMap.get(b.name) : 999;
          return ai - bi;
        });
      }
    }
    return `
    <div class="pt-subsection" data-pt-sk="${sk}">
      <div class="pt-sub-hdr" style="color:${color};border-color:${color}35" onclick="collapseToggle('${sid}')">
        ${label} <span style="font-weight:400;opacity:0.65">(${ordered.length})</span>
        <span style="margin-left:auto;font-size:10px;color:#cbd5e1">${coll ? '▸' : '▾'}</span>
      </div>
      ${coll ? '' : (ordered.length === 0
        ? '<div class="no-items" style="padding:6px 4px;font-size:11px">None.</div>'
        : ordered.map((t, i) => rowFn(t, i, ordered.length)).join('')
      )}
    </div>`;
  }

  function taskBtn(label, url, rowKey) {
    if (!label) return '<div></div>';
    const l = label.toLowerCase();
    const cls = (l.includes('linkedin') || l.includes('💼'))
      ? 'linkedin'
      : (l.includes('text') || l.includes('whatsapp') || l.includes('💬'))
      ? 'msg'
      : (l.includes('schedule') || l.includes('book') || l.includes('coffee') || l.includes('tennis') || l.includes('📅') || l.includes('✈'))
      ? 'schedule'
      : (l.includes('register') || l.includes('file') || l.includes('verify') || l.includes('✓'))
      ? 'complete'
      : (l.includes('plan') || l.includes('write') || l.includes('draft doc') || l.includes('📝'))
      ? 'write'
      : 'email';
    if (url) {
      return `<a class="pt-task-btn pt-task-${cls}" href="${resolveMailto(url)}" target="_blank" rel="noopener" onclick="event.stopPropagation()">${esc(label)}</a>`;
    }
    // Recruiter rows use showRecruiterModal; all others use showPriorityTarget
    const callbackFn = rowKey.startsWith('rec|')
      ? `showRecruiterModal('${esc(rowKey.replace('rec|',''))}')`
      : `showPriorityTarget('${esc(rowKey)}')`;
    return `<button class="pt-task-btn pt-task-${cls}" onclick="event.stopPropagation();${callbackFn}" title="Open task">${esc(label)}</button>`;
  }

  return { xrefBadge, actionCol, ntbLabel, urgencyLabel, taskBtn, targetRow, subSection };
}

function buildJobSearchPanel() {
  const pt   = RECRUIT_CONFIG.priorityTargets;
  const recs = RECRUIT_CONFIG.recruiters;
  const today = DATA.today;
  const { actionCol, ntbLabel, taskBtn, targetRow, subSection, xrefBadge } = _ptHelpers(today);

  // Apply cross-section overrides from drag-and-drop
  const sectionOvr = state.targetSection || {};
  const allPT = [
    ...(pt.inDiscussion||[]).map(t => ({ t, home: 'disc' })),
    ...(pt.waitingToHear||[]).map(t => ({ t, home: 'wait' })),
    ...(pt.doIChase||[]).map(t => ({ t, home: 'chase' })),
  ];
  const ptDisc  = allPT.filter(({ t, home }) => (sectionOvr[t.name] || home) === 'disc').map(x => x.t);
  const ptWait  = allPT.filter(({ t, home }) => (sectionOvr[t.name] || home) === 'wait').map(x => x.t);
  const ptChase = allPT.filter(({ t, home }) => (sectionOvr[t.name] || home) === 'chase').map(x => x.t);

  function recruiterRow(r) {
    const rowKey = 'rec|' + r.firm;
    const stricken = !!state.struckthroughRecruit[rowKey];
    const names = [r.firm, ...r.individuals.map(i => i.name)];
    const badge = xrefBadge(names);
    const dim = !r.nextStep || r.nextStep.startsWith('Tracking') ? 'opacity:0.45;' : '';
    const isToday = r.nextTouchBase === today;
    // Stage-coded contact tags
    const stageCls = s => {
      if (!s) return '';
      const sl = s.toLowerCase();
      if (sl.includes('they owe')) return 'owe-me';
      if (sl.includes('i owe'))    return 'i-owe';
      if (sl.includes('no response')) return 'no-resp';
      return '';
    };
    const tags = r.individuals.map(i =>
      `<span class="pt-rec-tag ${stageCls(i.role)}">${esc(i.name)}</span>`
    ).join('');
    const statusHtml = r.employers
      ? `<div class="pt-rec-employer">${esc(r.employers)}</div><div class="pt-nextstep" style="font-size:10px;margin-top:2px">${esc(r.nextStep || '')}</div>`
      : `<div class="pt-nextstep">${esc(r.nextStep || '—')}</div>`;
    return `
    <div class="pt-row${isToday ? ' pt-row-today' : ''}${stricken ? ' item-stricken' : ''}" style="${dim}" onclick="showRecruiterModal('${esc(r.firm)}')">
      <div>
        <span class="pt-firm">${esc(r.firm)}</span>
        ${tags ? `<div style="margin-top:3px">${tags}</div>` : ''}
        ${ntbLabel(r.nextTouchBase)} ${badge}
      </div>
      ${statusHtml}
      ${actionCol(r.myAction, r.nextTouchBase, rowKey)}
      ${taskBtn(r.task || '', r.taskUrl || '', rowKey)}
    </div>`;
  }

  const sorted = [...recs].sort((a, b) => {
    if (!a.nextTouchBase && !b.nextTouchBase) return 0;
    if (!a.nextTouchBase) return 1;
    if (!b.nextTouchBase) return -1;
    return a.nextTouchBase < b.nextTouchBase ? -1 : 1;
  });

  const totalCount = (pt.inDiscussion?.length||0) + (pt.waitingToHear?.length||0)
                   + (pt.doIChase?.length||0) + recs.length;
  const rid = 'recruiting';
  const rc  = state.collapsed[rid];

  return `
  <div class="card">
    <div class="card-title card-title-btn" onclick="collapseToggle('${rid}')">
      <div class="dot dot-blue"></div>Job Search
      <span class="card-count">${totalCount} tracked</span>
      <span class="collapse-chevron ${rc ? 'closed' : 'open'}" style="margin-left:auto;font-size:11px;color:#cbd5e1">${rc ? '▸' : '▾'}</span>
    </div>
    ${rc ? '' : `
    <div class="pt-col-hdr">
      <span>Target</span><span>Status</span><span>Action</span><span>Task</span>
    </div>
    ${subSection('disc',  'In Discussion',               '#22c55e', ptDisc,  (t,i,n) => targetRow(t,'disc',i,n))}
    ${subSection('wait',  'Waiting to Hear',              '#f59e0b', ptWait,  (t,i,n) => targetRow(t,'wait',i,n))}
    ${subSection('chase', 'Do I Chase?',                  '#ef4444', ptChase, (t,i,n) => targetRow(t,'chase',i,n))}
    <hr class="pt-divider">
    ${subSection('rec',   'Recruiters · By Next Action',  '#64748b', sorted,               r => recruiterRow(r))}
    `}
  </div>`;
}

// ── Panel 2: Deal panel ────────────────────────────────────────────────────
// Redesigned as mini deal cards, sourced from DATA.dealPortfolio.deals
// (the compiled deal-system-data.json baked into the page).
function buildTomacPanel() {
  const tc = TOMAC_CONFIG;
  const today = DATA.today;
  const { urgencyLabel } = _ptHelpers(today);

  // ── Deal data source ──────────────────────────────────────────────
  const dp    = DATA.dealPortfolio || {};
  // Filter origination-only deals that live in dealOrigination (not live deals)
  const ORIGINATION_ONLY = [];
  const deals = ((dp && dp.deals) ? dp.deals : []).filter(d =>
    !ORIGINATION_ONLY.some(n => (d.name||'').toLowerCase().includes(n))
  );
  const dealsCount = deals.length;

  // Capital in play; TCIP GP profit = fee_income + carry_income + upside (excludes LP co-invest)
  const tcipGpMid = d => {
    const p = d.tcip_profit || {};
    return ((p.fee_income&&p.fee_income.mid)||0) + ((p.carry_income&&p.carry_income.mid)||0) + ((p.upside&&p.upside.mid)||0);
  };
  let capitalInPlay = 0, midProfit = 0, criticalCount = 0;
  deals.forEach(d => {
    const cap = (d.capital_summary && d.capital_summary.immediate_high) || 0;
    capitalInPlay += cap;
    const mid = tcipGpMid(d);
    midProfit += mid;
    const acts = d.actions || [];
    criticalCount += acts.filter(a => a.priority === 'Critical' && a.status === 'Open').length;
  });

  const fmtM = n => '$' + (n / 1e6).toFixed(0) + 'M';

  // ── Stage → semantic class mapping ───────────────────────────────
  function stageClass(stage, stageIndex) {
    const s = (stage || '').toLowerCase();
    const idx = typeof stageIndex === 'number' ? stageIndex : null;
    if (idx !== null) {
      if (idx <= 1) return 'tc-mini-stage--slate';
      if (idx <= 3) return 'tc-mini-stage--navy';
      return 'tc-mini-stage--gold';
    }
    if (s.includes('sourc') || s.includes('watch')) return 'tc-mini-stage--slate';
    if (s.includes('dilig') || s.includes('advis')) return 'tc-mini-stage--navy';
    if (s.includes('memo') || s.includes('ic') || s.includes('closed') || s.includes('active')) return 'tc-mini-stage--gold';
    return 'tc-mini-stage--slate';
  }

  function daysSince(dateStr) {
    if (!dateStr) return null;
    try { return Math.round((new Date(today) - new Date(dateStr)) / 86400000); }
    catch (e) { return null; }
  }

  // ── Mini deal card ───────────────────────────────────────────────
  function miniCard(d) {
    const h = d.health || 0;
    const hClass = h >= 85 ? 'tc-fill--green' : h >= 70 ? '' : h >= 55 ? 'tc-fill--amber' : 'tc-fill--red';
    const pc = (d.phase_capital && d.phase_capital[0]) || {};
    const cs = d.capital_summary || {};
    const amount = cs.immediate_amount || pc.amount_display || '';
    const timing = cs.immediate_timing || pc.timing || '';
    const ds = daysSince(d.last_activity);
    const staleCls = (ds !== null && ds > 10) ? ' is-stale' : '';
    const nextLabel = d.next_milestone ? esc(d.next_milestone) : '';
    const { label: urgLbl } = urgencyLabel(d.next_milestone_due);
    const nextSuffix = urgLbl ? ` <span style="color:var(--ink-faint);font-family:var(--font-data);font-size:10px;letter-spacing:0.1em">· ${esc(urgLbl)}</span>` : '';
    const stageCls = stageClass(d.stage, d.stage_index);
    const href = '/portfolio/?deal=' + encodeURIComponent(d.id || '');

    return `
    <a class="tc-mini-card" href="${href}" target="_blank" rel="noopener">
      <div class="tc-mini-card-head">
        <div>
          <div class="tc-mini-name">${esc(d.name)}</div>
          ${d.sector ? `<div class="tc-mini-sector">${esc(d.sector)}${d.geography ? ' · ' + esc(d.geography) : ''}</div>` : ''}
        </div>
        <span class="tc-mini-stage ${stageCls}">${esc(d.stage || '')}</span>
      </div>
      ${amount ? `
      <div class="tc-mini-strip-capital">
        <span class="tc-mini-cap-label">CAPITAL</span>
        <span class="tc-mini-cap-value">${esc(amount)}</span>
        ${timing ? `<span class="tc-mini-cap-timing">${esc(timing)}</span>` : ''}
      </div>` : ''}
      <div class="tc-mini-health-row">
        <div class="tc-track"><div class="tc-fill ${hClass}" style="width:${h}%"></div></div>
        <span class="tc-score">${h}</span>
        <span class="tc-owner">${esc(d.owner || '—')}</span>
        <span class="tc-days${staleCls}">${ds !== null ? ds + 'd' : '—'}</span>
      </div>
      ${nextLabel ? `<div class="tc-mini-next">${nextLabel}${nextSuffix}</div>` : ''}
    </a>`;
  }

  // ── Deal Origination (kept from TOMAC_CONFIG) ────────────────────
  const origItems = (tc.dealOrigination || []).filter(t => {
    const k = 'tc_origination|' + (t.name || '');
    return !state.dismissedRecruit.includes(k) && !__isDel('recruit', k);
  });
  function origRow(t) {
    const rowKey = 'tc_origination|' + t.name;
    const { label: urgLbl, cls: urgCls } = urgencyLabel(t.nextTouchBase);
    const pillCls = urgCls === 'overdue' ? 'tc-pill--red' : urgCls === 'soon' ? 'tc-pill--amber' : 'tc-pill--slate';
    return `
    <div class="tc-orig-row" onclick="showPriorityTarget('${esc(rowKey)}')">
      <div>
        <div class="tc-orig-name">${esc(t.name)}${t.contact ? ` <span class="tc-orig-sub">${esc(t.contact)}</span>` : ''}</div>
        ${t.takeaway ? `<div class="tc-orig-sub">${esc(t.takeaway)}</div>` : ''}
        ${t.nextStep ? `<div class="tc-orig-next">→ ${esc(t.nextStep)}</div>` : ''}
      </div>
      <div style="text-align:right">
        ${urgLbl ? `<span class="tc-pill ${pillCls}">${esc(urgLbl)}</span>` : ''}
        ${t.owner ? `<div style="font-family:var(--font-data);font-size:9px;letter-spacing:0.14em;color:var(--ink-faint);margin-top:4px;text-transform:uppercase">${esc(t.owner)}</div>` : ''}
      </div>
    </div>`;
  }

  const tid = 'tc-panel';
  const tcc = state.collapsed[tid];

  return `
  <div class="card">
    <div class="card-title card-title-btn" onclick="collapseToggle('${tid}')">
      ${esc(FIRM_LABEL)}
      <span class="card-count">${dealsCount} live</span>
      <span class="collapse-chevron ${tcc ? 'closed' : 'open'}" style="margin-left:auto;font-size:11px;color:var(--ink-ghost)">${tcc ? '▸' : '▾'}</span>
    </div>
    ${tcc ? '' : `
    <div class="tc-mini-header">
      <div class="tc-mini-header-line">
        <span class="tc-mh-num">${dealsCount}</span> deals
        <span class="tc-mh-sep">·</span>
        <span class="tc-mh-num">${fmtM(capitalInPlay)}</span> capital in play
        <span class="tc-mh-sep">·</span>
        <span class="tc-mh-num">${fmtM(midProfit)}</span> GP profit (fees+carry)
        ${criticalCount > 0 ? `<span class="tc-mh-sep">·</span><span class="tc-mh-crit">${criticalCount} critical</span>` : ''}
      </div>
    </div>

    <div class="tc-section-label">LIVE DEALS (${dealsCount})</div>
    ${dealsCount > 0 ? deals.map(miniCard).join('') : '<div class="no-items">No live deals.</div>'}

    <div class="tc-section-label" style="margin-top:18px">DEAL ORIGINATION (${origItems.length})</div>
    ${origItems.length > 0 ? origItems.map(origRow).join('') : '<div class="no-items">No origination items.</div>'}

    <a class="tc-orig-full-link" href="/tomac-cove/" target="_blank" rel="noopener">Open full deal pipeline →</a>
    `}
  </div>`;
}

// ══════════════════════════════════════════════════════
// RELATIONSHIP HEALTH
// ══════════════════════════════════════════════════════
function buildRelHealth() {
  const f = state.filter;
  let contacts = DATA.staleContacts && DATA.staleContacts.length > 0
    ? DATA.staleContacts.filter(c => f === 'all' || c.workstream === f)
    : buildStaleContactsFallback();

  // Always include warm contacts (not duplicative with recruiting — these are broader network)
  const warmToMerge = (DATA.warmContacts || []).filter(c => {
    if (state.dismissedRel.includes(c.name) || state.struckthroughRel[c.name] || __isDel('rel', c.name)) return false;
    if (f === 'tomac') return false; // warm contacts are job/personal — hide in tomac-only view
    return true;
  }).map(c => ({
    name: c.name,
    company: c.company || '',
    lastContact: c.lastContact || null,
    daysSince: c.lastContact ? daysSince(c.lastContact) : 999,
    workstream: c.workstream || 'job',
    context: c.context || ''
  }));

  // Merge, dedup by name
  const existingNames = new Set(contacts.map(c => c.name));
  warmToMerge.forEach(c => { if (!existingNames.has(c.name)) contacts.push(c); });

  if (f === 'tomac' && contacts.length === 0) return '';
  // Filter out dismissed contacts
  contacts = contacts.filter(c => !state.dismissedRel.includes(c.name) && !__isDel('rel', c.name));

  if (!contacts || contacts.length === 0) return '';

  const cards = contacts.map(c => {
    const d = c.daysSince || 0;
    // RAG system: green <14d, amber 14-30d, red >30d; 999 = never contacted
    let cardCls, dayColor, dayLabel;
    if (d >= 999)    { cardCls = 'rel-cold';  dayColor = '#ef4444'; dayLabel = '—'; }
    else if (d > 30) { cardCls = 'rel-cold';  dayColor = '#ef4444'; dayLabel = d + 'd'; }
    else if (d > 14) { cardCls = 'rel-warm';  dayColor = '#f59e0b'; dayLabel = d + 'd'; }
    else             { cardCls = 'rel-green'; dayColor = '#22c55e'; dayLabel = d + 'd'; }

    const wsCls = c.workstream === 'tomac' ? 'ev-ws-tomac' : 'ev-ws-job';
    const wsLbl = c.workstream === 'tomac' ? 'TC' : 'Rec';

    const relStricken = !!state.struckthroughRel[c.name];
    return `
    <div class="rel-card ${cardCls}${relStricken ? ' item-stricken' : ''}">
      <div class="rel-card-top">
        <div style="flex:1">
          <div class="rel-card-name">${esc(c.name)}</div>
          ${c.company ? `<div class="rel-card-meta">${esc(c.company)}</div>` : ''}
          ${relStricken ? `<div class="strike-lbl">marked done · clears tomorrow</div>` : ''}
        </div>
        <div style="display:flex;flex-direction:column;align-items:flex-end;gap:4px">
          ${!relStricken
            ? `<button class="strikethru-btn" onclick="strikeRel('${esc(c.name)}')" title="Mark done — clears tomorrow">✓</button>`
            : `<button class="strikethru-btn active" onclick="unstrikeRel('${esc(c.name)}')" title="Undo">↩</button>`}
          <button class="dismiss-btn" onclick="dismissRel('${esc(c.name)}')" title="Delete now">×</button>
          <div class="rel-days-big" style="color:${relStricken ? '#3f3f46' : dayColor}">${dayLabel}</div>
          <span class="rel-ws-tag ${wsCls}" style="font-size:8px">${wsLbl}</span>
        </div>
      </div>
      ${c.lastContact ? `<div style="font-size:10px;color:#94a3b8;margin-top:4px">Last: ${esc(c.lastContact)}</div>` : ''}
      ${c.context ? `<div class="rel-card-next">${esc(c.context)}</div>` : ''}
    </div>`;
  }).join('');

  const cold  = contacts.filter(c => (c.daysSince||0) > 30).length;
  const warm  = contacts.filter(c => { const d=c.daysSince||0; return d > 14 && d <= 30; }).length;
  const rhid = 'relhealth';
  const rhc  = state.collapsed[rhid];
  return `
  <div class="card" style="margin-bottom:18px">
    <div class="card-title card-title-btn" onclick="collapseToggle('${rhid}')">
      <div class="dot dot-red"></div>Relationship Health
      <span class="card-count">${contacts.length} contacts ·
        ${cold > 0 ? `<span style="color:#ef4444">${cold} cold</span> · ` : ''}
        ${warm > 0 ? `<span style="color:#f59e0b">${warm} cooling</span>` : 'check-in needed'}
      </span>
      <span class="collapse-chevron ${rhc ? 'closed' : 'open'}" style="margin-left:8px;font-size:11px;color:#cbd5e1">${rhc ? '▸' : '▾'}</span>
    </div>
    ${rhc ? '' : `<div class="rel-grid">${cards}</div>`}
  </div>`;
}

function buildStaleContactsFallback() {
  const f = state.filter;
  if (f === 'tomac') return [];
  const today = DATA.today;
  const result = [];
  const pt = RECRUIT_CONFIG.priorityTargets;
  if (pt) {
    const all = [...(pt.inDiscussion||[]), ...(pt.waitingToHear||[]), ...(pt.doIChase||[])];
    for (const t of all) {
      if (!t.lastAction || !t.lastAction.startsWith('202')) continue;
      const ds = Math.floor((new Date(today) - new Date(t.lastAction)) / 86400000);
      if (ds >= 14 && ds <= 90) {
        result.push({ name: t.contact || t.name, company: t.name, lastContact: t.lastAction, daysSince: ds, workstream: 'job', context: t.note || '' });
      }
    }
  } else if (DATA.recruiting.active) {
    // Legacy format
    for (const r of DATA.recruiting.active) {
      if (!r.lastAction || !r.lastAction.startsWith('202')) continue;
      const ds = Math.floor((new Date(today) - new Date(r.lastAction)) / 86400000);
      if (ds >= 14 && ds <= 90) {
        result.push({ name: r.contact || r.name, company: r.name, lastContact: r.lastAction, daysSince: ds, workstream: 'job', context: r.next || '' });
      }
    }
  }
  return result.sort((a,b) => b.daysSince - a.daysSince).slice(0, 12);
}

// ══════════════════════════════════════════════════════
// LP TABLE (for TCIP LP Tracker modal)
// ══════════════════════════════════════════════════════
function lpStatusCls(status) {
  if (!status) return 'lp-tracking';
  const s = status.toLowerCase();
  if (s.includes('commit'))   return 'lp-committed';
  if (s.includes('soft'))     return 'lp-soft';
  if (s.includes('interest')) return 'lp-interested';
  if (s.includes('pass'))     return 'lp-passed';
  return 'lp-tracking';
}

function buildLPFunnel(stats, lpData) {
  // Compute from live lpData if available, else from stats field
  let committed = 0, soft = 0, interested = 0, total = 0;
  if (lpData && lpData.length > 0) {
    total = lpData.length;
    committed  = lpData.filter(l => l.status && l.status.toLowerCase().includes('commit')).length;
    soft       = lpData.filter(l => l.status && l.status.toLowerCase().includes('soft')).length;
    interested = lpData.filter(l => l.status && l.status.toLowerCase().includes('interest')).length;
  } else if (stats && stats.total) {
    total = stats.total; committed = stats.committed || 0;
    soft = stats.softCircle || 0; interested = stats.interested || 0;
  } else {
    return `<div class="modal-section"><div style="font-size:12px;color:#94a3b8;padding:10px 0;font-style:italic">LP pipeline data loads after next 7:22am pipeline run — tracker is in Drive.</div></div>`;
  }
  const warmNet = DATA.lpNetwork.length;
  return `
  <div class="modal-section">
    <div style="display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:4px">
      ${[
        ['Total LPs',   total,       '#a1a1aa', 'rgba(255,255,255,0.06)'],
        ['Committed',   committed,   '#22c55e', 'rgba(63,185,80,0.1)'],
        ['Soft Circle', soft,        '#f59e0b', 'rgba(227,179,65,0.1)'],
        ['Interested',  interested,  '#4a9eff', 'rgba(88,166,255,0.1)'],
      ].map(([label, val, color, bg]) => `
        <div style="background:${bg};border:1px solid ${color}30;border-radius:8px;padding:10px 12px;text-align:center">
          <div style="font-size:22px;font-weight:700;color:${color};line-height:1">${val}</div>
          <div style="font-size:9px;color:#64748b;margin-top:5px;text-transform:uppercase;letter-spacing:0.5px">${label}</div>
        </div>`).join('')}
    </div>
    <div style="font-size:11px;color:#94a3b8;margin-top:8px">+ ${warmNet} warm network contacts available for outreach below</div>
  </div>`;
}

function buildLPNetwork(contacts) {
  if (!contacts || contacts.length === 0) return '';
  const tier1 = contacts.filter(c => c.ranking === 1);
  const rest  = contacts.filter(c => c.ranking !== 1);
  const renderRow = c => `
    <div class="deal-row" style="padding:7px 0;cursor:default;border-radius:0">
      <div style="flex:1">
        <div style="font-size:12px;font-weight:500;color:#1e293b">${esc(c.name)} <span style="color:#94a3b8;font-weight:400">· ${esc(c.firm)}</span></div>
        ${c.email ? `<div style="font-size:11px;color:#4a9eff;margin-top:2px">${esc(c.email)}</div>` : ''}
        ${c.notes ? `<div style="font-size:10px;color:#94a3b8;margin-top:2px">${esc(c.notes)}</div>` : ''}
      </div>
      ${c.ranking === 1 ? `<span class="lp-status lp-interested" style="margin-left:8px">Tier 1</span>` : ''}
    </div>`;

function todoWsTag(ws) {

  if (ws === 'job')   return `<span class="ev-ws ev-ws-job"   style="margin-right:5px">Rec</span>`;

// forceWs: when set (e.g. 'tomac'), overrides state.filter for the visible
// item calculation and label — used by Status tab to show only TC todos
// regardless of which workstream pill is active.
function buildTodos(forceWs) {
  const f = forceWs || state.filter;
  // show all todos when filter='all'; otherwise filter to matching ws OR untagged
  const visible = state.todos.filter(t => f === 'all' || !t.ws || t.ws === f);
  const pending  = visible.filter(t => !t.done);
  const doneVis  = visible.filter(t => t.done);

  const FILTER_DECOR = {
    tomac:       { color: '#16a34a', label: "To-Do · " + FIRM_LABEL,  placeholder: "Add a " + FIRM_LABEL + " task…" },
    job:         { color: '#2563eb', label: "To-Do · Recruiting",   placeholder: "Add a recruiting task…" },
    fundraising: { color: '#7c3aed', label: "To-Do · Fundraising",  placeholder: "Add a fundraising task…" },
    personal:    { color: '#64748b', label: "To-Do · Personal",     placeholder: "Add a personal task…" },
  };
  const decor = FILTER_DECOR[f] || { color: '#d97706', label: "Today's To-Do", placeholder: "Add a task…" };
  const dotColor  = decor.color;
  const labelText = decor.label;
  const placeholder = decor.placeholder;

  const clearBtn = doneVis.length > 0
    ? `<button class="todo-clear" onclick="clearDoneTodos()">Clear ${doneVis.length} done</button>`
    : '';

  // Progressive disclosure: pending items first (top 8), then done items —
  // when expanded, show the full list. Empty state unchanged.
  const tid = 'todos';
  const CAP = 8;
  const expanded = !!state.expanded[tid];
  const ordered = pending.concat(doneVis);
  const shown = expanded ? ordered : ordered.slice(0, CAP);
  const overflow = ordered.length - shown.length;

  const moreLink = (overflow > 0 || (expanded && ordered.length > CAP))
    ? `<div style="padding:8px 0 0;text-align:center">
         <a href="#" onclick="event.preventDefault();expandToggle('${tid}')" style="font-size:11px;color:${dotColor};font-weight:600;text-decoration:none;letter-spacing:0.04em">
           ${expanded ? `▴ Show top ${CAP}` : `▾ Show all ${ordered.length} (+${overflow} more)`}
         </a>
       </div>`
    : '';

  const itemsHtml = visible.length === 0
    ? `<div class="todo-empty">${f === 'all' ? 'Nothing yet — add a task above.' : `No ${f} tasks yet.`}</div>`
    : shown.map(t => `
      <div class="todo-item">
        <div class="todo-check${t.done ? ' done' : ''}" onclick="toggleTodo('${esc(t.id)}')"></div>
        <div class="todo-text${t.done ? ' done' : ''}">${todoWsTag(t.ws)}${esc(t.text)}</div>
      </div>`).join('') + moreLink;

  const tc  = state.collapsed[tid];
  return `
  <div class="card" style="margin-bottom:18px">
    <div class="card-title card-title-btn" onclick="collapseToggle('${tid}')">
      <div class="dot" style="background:${dotColor}"></div>${esc(labelText)}
      <span class="card-count">${pending.length} remaining</span>
      ${clearBtn}
      <span class="collapse-chevron ${tc ? 'closed' : 'open'}" style="margin-left:8px;font-size:11px;color:#cbd5e1">${tc ? '▸' : '▾'}</span>
    </div>
    ${tc ? '' : `
    <div class="todo-input-row">
      <input class="todo-input" id="todo-input" type="text" placeholder="${esc(placeholder)}" onkeydown="if(event.key==='Enter')addTodo()">
      <button class="btn btn-primary" onclick="addTodo()">Add</button>
    </div>
    ${itemsHtml}`}
  </div>`;
}

function addTodo() {
  const input = document.getElementById('todo-input');
  const text = input ? input.value.trim() : '';
  if (!text) return;
  const id = Date.now().toString();
  // tag the todo with the current workstream filter (or null if 'all')
  const ws = state.filter !== 'all' ? state.filter : null;
  state.todos.unshift({ id, text, done: false, date: DATA.today, ws });
  saveTodos();
  render();
  const newInput = document.getElementById('todo-input');
  if (newInput) newInput.focus();
}

function toggleTodo(id) {
  const t = state.todos.find(x => x.id === id);
  if (t) { t.done = !t.done; saveTodos(); render(); }
}

function clearDoneTodos() {
  const f = state.filter;
  // only clear done items that are visible under the current filter
  state.todos = state.todos.filter(t => {
    const visible = f === 'all' || !t.ws || t.ws === f;
    return !(visible && t.done);
  });
  saveTodos();
  render();
}

function saveTodos() {
  localStorage.setItem('cos_todos', JSON.stringify(state.todos));
}

// ── Shared: build interaction timeline for a contact ─────────────────────
function buildInteractionTimeline(searchNames, lastActionDate) {
  const today = DATA.today;
  const lcs = searchNames.map(n => (n||'').toLowerCase()).filter(Boolean);

  // Collect all touchpoints
  const entries = [];

  // Seed with lastAction as a synthetic "Last contact" entry
  if (lastActionDate) {
    entries.push({ date: lastActionDate, type: 'past', text: 'Last contact', isPast: true });
  }

  // Add followUps (pending actions)
  DATA.followUps.forEach(f => {
    if ((f.what || '').startsWith('[RESOLVED]')) return;
    if (!f.who) return;
    if (!lcs.some(n => f.who.toLowerCase().includes(n))) return;
    if (state.dismissedActions.includes(actionKey(f)) || __isDel('followup', actionKey(f))) return;
    const isPast = f.due && f.due < today;
    entries.push({ date: f.due || '', type: isPast ? 'past' : (f.due === today ? 'today' : 'future'),
                   text: f.what, source: f.source, isPast });
  });

  // Add upcoming calls
  DATA.upcomingCalls.forEach(c => {
    if (!lcs.some(n => (c.who && c.who.toLowerCase().includes(n)) || (c.with && c.with.toLowerCase().includes(n)))) return;
    entries.push({ date: c.when, type: 'call', text: (c.who || '') + (c.with ? ` · ${c.with}` : ''), isPast: false });
  });

  if (entries.length === 0) {
    return '<div style="font-size:11px;color:#475569;font-style:italic;padding:4px 0">No interaction history found.</div>';
  }

  // Sort: past entries ascending, then today, then future ascending, undated last
  const order = e => {
    if (e.type === 'past') return '0_' + (e.date || 'zzz');
    if (e.type === 'today') return '1_today';
    if (e.type === 'call' || e.type === 'future') return '2_' + (e.date || 'zzz');
    return '9_' + e.date;
  };
  entries.sort((a, b) => order(a) < order(b) ? -1 : 1);

  return `<div class="itl-list">${entries.map(e => {
    const dateCls = e.type === 'past' ? '' : e.type === 'today' ? ' itl-today' : e.type === 'call' ? ' itl-future' : ' itl-future';
    const badge = e.type === 'call'
      ? `<span class="itl-call-badge">call</span>`
      : (e.type === 'future' || e.type === 'today') && !e.isPast
        ? `<span class="itl-action-badge">action</span>` : '';
    const dateStr = e.date
      ? (e.type === 'call' ? e.date : e.date)
      : '—';
    return `<div class="itl-entry">
      <span class="itl-date${dateCls}">${esc(dateStr)}</span>
      <span class="itl-text">${badge}${esc(e.text)}${e.source ? ` <span style="font-size:9px;color:#475569">· ${esc(e.source)}</span>` : ''}</span>
    </div>`;
  }).join('')}</div>`;
}

    state.statFocus = type;
    const meta = STAT_META[type];
    if (meta.filter) state.filter = meta.filter;
    if (meta.tcTab) {
      state.tcTab = meta.tcTab;
      localStorage.setItem('cos_tc_tab', meta.tcTab);
    }
  }
  render();
  // Scroll to the relevant section after render
  if (state.statFocus) {
    const target = STAT_META[state.statFocus]?.scrollTo;
    if (target) setTimeout(() => {
      const el = document.getElementById(target);
      if (el) el.scrollIntoView({ behavior: 'smooth', block: 'start' });
    }, 60);
  }
}

function clearFocus() {
  state.statFocus = null;
  render();
}

function buildFocusBanner() {
  const meta  = STAT_META[state.statFocus] || { label: state.statFocus, color: '#a1a1aa' };
  const color = meta.color;

  <div class="focus-banner" style="background:${color}0c;border:1px solid ${color}28">
    <span style="width:7px;height:7px;background:${color};border-radius:50%;display:inline-block;box-shadow:0 0 8px ${color}70;flex-shrink:0"></span>
    <span style="font-size:11px;font-weight:700;color:${color};text-transform:uppercase;letter-spacing:0.8px">Focus: ${meta.label}</span>
    <span style="font-size:11px;color:#94a3b8">— showing only related content</span>
    <button class="focus-clear-btn" onclick="clearFocus()" style="color:${color};border-color:${color}35;background:${color}0d">× Clear focus</button>
    <span class="kbd" style="margin-left:0">Esc</span>
