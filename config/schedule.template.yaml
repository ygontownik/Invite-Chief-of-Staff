# ─────────────────────────────────────────────────────────────
# schedule.template.yaml — TEMPLATE for new subscribers
# ─────────────────────────────────────────────────────────────
## STATUS: TEMPLATE — copied to ~/cos-pipeline-config-<slug>/config/schedule.yaml
## by setup.sh at install time. The live tenant copy is what generate.sh reads.
## See ~/dashboards/config/schedule.yaml for Yoni's full live schedule with
## all sources enabled.
##
# Authoritative schedule for routines + always-on daemons. To change a
# schedule: edit this file, then run:
#   ~/cos-pipeline-config-<slug>/config/launchd-plists/generate.sh
# which regenerates the plist and copies it into ~/Library/LaunchAgents/.
#
# Two kinds of entries:
#   - claude_tasks: managed by Claude Code's scheduled tasks UI.
#                   generate.sh prints the cron lines for you to update via
#                   the Claude Code UI; it does NOT edit Claude's task DB.
#   - launchd:      managed by macOS launchd plists. generate.sh writes
#                   these directly.
#
# This template ships only the universal-core routines enabled. Optional
# Yoni-specific blocks are commented out below — uncomment after wiring up
# the relevant data source (e.g. a Jefferies subscription, a Substack RSS
# feed, etc.).
# ─────────────────────────────────────────────────────────────

claude_tasks:

  # ─────────────────────────────────────────────────────────────
  # UNIVERSAL CORE — every subscriber needs these
  # ─────────────────────────────────────────────────────────────

  # Inbox + transcript capture (the COS pipeline's fundamental loop)
  - id: cos-otter-transcripts
    cron: "*/15 8-17 * * 1-5"
    local_time: "Every 15min 8am–6pm ET M–F"
    runner: ~/dashboards/scripts/otter-backfill-runner.sh
    calls: (Python direct — Claude API only when actually processing transcripts)
    group: process
    note: "com.tomaccove.otter-backfill LaunchAgent. No-op exits in <2s when nothing new."

  - id: inbox-capture
    cron: "22 7 * * 1-5"
    local_time: "07:22 M–F"
    skill: ~/.claude/scheduled-tasks/inbox-capture/SKILL.md
    calls: ~/dashboards/routines/process/cos_prefetch_drive.py + cos_batch_write.py
    depends_on: [cos-otter-transcripts]
    group: process

  - id: morning-briefing
    cron: "51 7 * * 1-5"
    local_time: "07:51 M–F"
    skill: ~/.claude/scheduled-tasks/morning-briefing/SKILL.md
    calls: (Claude skill)
    depends_on: [inbox-capture]
    group: brief
    note: "Personal briefing — produces the daily PB log + dashboard refresh."

  # Gmail mini-triage every 2h during business hours
  - id: cos-gmail-mini
    cron: "0 8,10,12,14,16,18 * * 1-5"
    local_time: "08/10/12/14/16/18 M–F"
    skill: ~/.claude/scheduled-tasks/cos-gmail-mini/SKILL.md
    calls: (Gmail MCP + Drive API)
    group: ingest

  # Podcast transcription (the public/research feed loop)
  - id: podcast-processing
    cron: "0 5 * * *"
    local_time: "05:00 daily"
    skill: ~/.claude/scheduled-tasks/podcast-processing/SKILL.md
    calls: ~/dashboards/routines/ingest/podcast_transcribe.py
    group: ingest

  # Compile deal data into the dashboard's JSON contract
  - id: deal-dashboard-compile
    cron: "9 7 * * *"
    local_time: "07:09 daily"
    skill: ~/.claude/scheduled-tasks/deal-dashboard-compile/SKILL.md
    calls: ~/dashboards/routines/compile/deal-system-compile.py
    group: compile

  # Weekly 3-pass deal pipeline scan (the core deal-ideation feature)
  - id: deal-pipeline-scan
    cron: "30 19 * * 0"
    local_time: "19:30 Sun"
    skill: ~/.claude/scheduled-tasks/deal-pipeline-scan/SKILL.md
    calls: ~/dashboards/routines/compile/  (Claude skill, 3-pass)
    group: compile

  # Nightly UI-correction proposer — scans CHANGELOG for repeatable bugs
  - id: dash-corrections-proposer
    cron: "0 22 * * *"
    local_time: "22:00 daily"
    skill: (none — pure Python)
    calls: ~/dashboards/routines/process/dash_corrections_proposer.py
    launchd: com.tomaccove.dash-corrections
    group: process
    status: active

  # ─────────────────────────────────────────────────────────────
  # OPTIONAL — uncomment after wiring up the matching data source
  # ─────────────────────────────────────────────────────────────

  # ── Jefferies research (requires Jefferies subscription + Drive folder) ──
  # - id: jefferies-research-fetch
  #   cron: "10 2 * * *"
  #   local_time: "02:10 daily"
  #   skill: ~/.claude/scheduled-tasks/jefferies-research-fetch/SKILL.md
