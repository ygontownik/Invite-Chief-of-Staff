# ─────────────────────────────────────────────────────────────
# schedule.template.yaml — TEMPLATE for new subscribers
# ─────────────────────────────────────────────────────────────
## STATUS: TEMPLATE — copied to ~/cos-pipeline-config-<slug>/config/schedule.yaml
## by setup.sh at install time. The live tenant copy is what generate.sh reads.
##
# Authoritative schedule for routines + always-on daemons. To change a
# schedule: edit the tenant copy of this file, then run
#   ~/cos-pipeline-config-<slug>/config/launchd-plists/generate.sh
# which regenerates the plist and copies it into ~/Library/LaunchAgents/.
#
# Two kinds of entries:
#   - claude_tasks: managed by Claude Code's scheduled tasks UI.
#                   generate.sh prints the cron lines for you to update via
#                   the Claude Code UI; it does NOT edit Claude's task DB.
#   - launchd:      managed by macOS launchd plists. generate.sh writes
#                   these directly.
#
# This template ships only the universal-core routines enabled. Optional
# blocks (research-PDF ingestion, authenticated-site scrapes, newsletter
# sync, intelligence-digest aggregators, weekly summary email) are
# commented out below — uncomment after wiring up the relevant data
# source. The backing scripts for those optional routines are NOT
# shipped in this public repo; each tenant provides their own
# equivalents.
# ─────────────────────────────────────────────────────────────

claude_tasks:

  # ─────────────────────────────────────────────────────────────
  # UNIVERSAL CORE — every subscriber needs these
  # ─────────────────────────────────────────────────────────────

  # Otter / Drive transcript ingest — every 15 min during business hours
  - id: cos-otter-transcripts
    cron: "*/15 8-17 * * 1-5"
    local_time: "Every 15min 8am–6pm ET M–F"
    calls: ~/cos-pipeline/cos_otter_backfill.py
    group: process
    note: "No-op exit in <2s when nothing new in the configured Drive folder."

  # Inbox capture — daily 7:22 AM weekdays
  - id: inbox-capture
    cron: "22 7 * * 1-5"
    local_time: "07:22 M–F"
    skill: ~/.claude/scheduled-tasks/inbox-capture/SKILL.md
    calls: ~/cos-pipeline/cos_prefetch_drive.py + ~/cos-pipeline/cos_batch_write.py
    depends_on: [cos-otter-transcripts]
    group: process

  # Personal briefing — daily 7:51 AM weekdays
  - id: morning-briefing
    cron: "51 7 * * 1-5"
    local_time: "07:51 M–F"
    skill: ~/.claude/scheduled-tasks/morning-briefing/SKILL.md
    calls: ~/cos-pipeline/cos_personal_briefing.py
    depends_on: [inbox-capture]
    group: brief
    note: "Produces the daily PB log + dashboard refresh."

  # Gmail mini-triage — every 2h during business hours
  - id: cos-gmail-mini
    cron: "0 8,10,12,14,16,18 * * 1-5"
    local_time: "08/10/12/14/16/18 M–F"
    skill: ~/.claude/scheduled-tasks/cos-gmail-mini/SKILL.md
    calls: ~/cos-pipeline/cos_gmail_mini_v2.py
    group: ingest

  # Podcast transcription — daily 5 AM
  - id: podcast-processing
    cron: "0 5 * * *"
    local_time: "05:00 daily"
    skill: ~/.claude/scheduled-tasks/podcast-processing/SKILL.md
    calls: ~/cos-pipeline/podcast_transcribe.py
    group: ingest

  # Compile deal data into the dashboard's JSON contract
  - id: deal-dashboard-compile
    cron: "9 7 * * *"
    local_time: "07:09 daily"
    skill: ~/.claude/scheduled-tasks/deal-dashboard-compile/SKILL.md
    calls: ~/cos-pipeline/deal-system-compile.py
    group: compile

  # Weekly 3-pass deal pipeline scan (the core deal-ideation feature)
  - id: deal-pipeline-scan
    cron: "30 19 * * 0"
    local_time: "19:30 Sun"
    skill: ~/.claude/scheduled-tasks/deal-pipeline-scan/SKILL.md
    calls: (Claude skill, 3-pass)
    group: compile

  # ─────────────────────────────────────────────────────────────
  # OPTIONAL — these routines are NOT shipped in the public repo.
  # Uncomment a block only after providing your own backing script.
  # ─────────────────────────────────────────────────────────────

  # ── Nightly UI-correction proposer ────────────────────────────────────────
  # Scans a CHANGELOG/log file for repeatable UI-correction patterns and
  # proposes additions to dash_corrections.md. Backing script not in public.
  # - id: dash-corrections-proposer
  #   cron: "0 22 * * *"
  #   local_time: "22:00 daily"
  #   calls: <provide your own script>
  #   group: process

  # ── Research-feed ingestion (PDF subscription required) ──────────────────
  # Pattern: download daily PDFs from a research provider, process to memos.
  # - id: research-fetch
  #   cron: "10 2 * * *"
  #   local_time: "02:10 daily"
  #   calls: <provide your own downloader>
  #   group: ingest
  #
  # - id: research-process
  #   cron: "8 3 * * *"
  #   local_time: "03:08 daily"
  #   calls: <provide your own processor>
  #   group: ingest

  # ── Authenticated-site daily scrape (Chrome MCP) ─────────────────────────
  # Pattern: navigate authenticated SPA, extract content, write to Drive Doc.
  # - id: site-daily
  #   cron: "24 6 * * 1-5"
  #   local_time: "06:24 M–F"
  #   calls: (Chrome MCP automation)
  #   group: ingest

  # ── Newsletter / blog feed sync ──────────────────────────────────────────
  # Pattern: pull a list of RSS/Atom feeds, transcribe new items.
  # - id: newsletter-sync
  #   cron: "39 6 * * 1-5"
  #   local_time: "06:39 M–F"
  #   calls: <provide your own fetcher>
  #   group: ingest

  # ── Daily intelligence digest (briefing-style aggregator) ───────────────
  # - id: daily-intelligence-digest
  #   cron: "15 7 * * 1-5"
  #   local_time: "07:15 M–F"
  #   calls: <provide your own aggregator>
  #   depends_on: [newsletter-sync]
  #   group: brief

  # ── Weekly intelligence digest + Sunday summary email ────────────────────
  # - id: weekly-intelligence-digest
  #   cron: "7 18 * * 0"
  #   local_time: "18:07 Sun"
  #   group: brief
  #
  # - id: weekly-summary-email
  #   cron: "0 20 * * 0"
  #   local_time: "20:00 Sun"
  #   calls: <provide your own sender>
  #   depends_on: [deal-pipeline-scan]
  #   group: send

  # ── On-demand orchestrator (manual fallback) ─────────────────────────────
  # - id: master-daily-update
  #   cron: null
  #   local_time: "manual"
  #   group: ingest
  #   status: on_demand


launchd:

  # ─────────────────────────────────────────────────────────────
  # UNIVERSAL CORE
  # ─────────────────────────────────────────────────────────────

  # Always-on dashboard server (the web UI at http://localhost:7777/)
  - label: com.cospipeline.${slug}.dashboard
    program: /opt/homebrew/bin/python3
    args: [~/dashboards/app/cos-dashboard-server.py]
    keep_alive: true
    run_at_load: true
    env: [OWNER_PASSWORD, PARTNER_PASSWORD]
    log: /tmp/cos-dashboard.log
    plist: ~/Library/LaunchAgents/com.cospipeline.${slug}.dashboard.plist

  # ─────────────────────────────────────────────────────────────
  # OPTIONAL — uncomment if using the corresponding feature
  # ─────────────────────────────────────────────────────────────

