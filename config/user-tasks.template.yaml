## STATUS: TEMPLATE — populate per tenant, do not commit live values.
## Live tenant copy lives at: ~/cos-pipeline-config-<slug>/user-tasks.yaml
##
# user-tasks.yaml — which scheduled tasks to install for this user.
#
# Set a task to false to skip installing it. install-skills.sh reads this
# file and only copies enabled tasks into ~/.claude/scheduled-tasks/.
#
# Groups:
#   core     — COS inbox/calendar/transcript/briefing pipeline.
#   research — External content pipelines. Disable any sources you don't use.
#   weekly   — Sunday and deal pipeline tasks.
#
# Note: post run-2 SKILL renames (PLAN v3.2), some keys will change names.
# Keep this file in lockstep with `~/cos-pipeline/routines.yaml`.

# ── Core COS pipeline ──────────────────────────────────────────────
morning-briefing: true
inbox-capture: true
cos-gmail-mini: false               # Replaced by com.<tenant>.gmail-mini daemon
cos-otter-transcripts: false        # Replaced by com.<tenant>.otter-backfill daemon
cos-otter-transcripts-midday: false
cos-otter-transcripts-afternoon: false
cos-otter-transcripts-backfill-now: true   # On-demand only
cos-email-resolver-morning: false   # Replaced by com.<tenant>.email-resolver daemon
cos-email-resolver-evening: false
master-daily-update: false          # Disabled — sub-tasks run individually

# ── Research pipelines (toggle per source) ─────────────────────────
rbn-energy-daily: true
substack-sync: true
daily-intelligence-digest: true
weekly-intelligence-digest: true
podcast-processing: true
gs-research-fetch: true
gs-research-process: true
jefferies-research-fetch: true
jefferies-research-process: true
peakload-weekly: true

# ── Weekly / deal tasks ────────────────────────────────────────────
weekly-summary-email: true
deal-pipeline-scan: true    # Renames to <tenant>-weekly-pipeline post-A-fast.7
deal-dashboard-compile: true            # Renames to deal-compile post-A-fast.7
